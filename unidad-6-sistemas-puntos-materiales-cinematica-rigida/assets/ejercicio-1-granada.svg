<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="600" height="400" fill="#fafafa"/>
  
  <!-- Título -->
  <text x="300" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">
    Ejercicio 1 — Explosión de Granada
  </text>
  <text x="300" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">
    Conservación de la Cantidad de Movimiento Lineal
  </text>
  
  <!-- Eje x -->
  <line x1="50" y1="200" x2="550" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="560" y="205" font-family="Arial, sans-serif" font-size="14" fill="#333">x</text>
  
  <!-- Definición de flecha -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>
  
  <!-- Estado ANTES de la explosión -->
  <text x="150" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">
    ANTES
  </text>
  
  <!-- Granada antes -->
  <circle cx="150" cy="200" r="20" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2"/>
  <text x="150" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">m</text>
  
  <!-- Vector velocidad antes -->
  <line x1="170" y1="200" x2="240" y2="200" stroke="#2c3e50" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="205" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">v₀ = 10 m/s</text>
  
  <!-- Flecha de tiempo -->
  <line x1="280" y1="200" x2="320" y2="200" stroke="#95a5a6" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="300" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">explosión</text>
  
  <!-- Estado DESPUÉS de la explosión -->
  <text x="450" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">
    DESPUÉS
  </text>
  
  <!-- Fragmento mayor (60%) -->
  <circle cx="400" cy="160" r="16" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">m₁=0.6m</text>
  
  <!-- Vector velocidad fragmento mayor -->
  <line x1="416" y1="160" x2="490" y2="160" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead-red)"/>
  <text x="453" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c" font-weight="bold">v₁ = 25 m/s</text>
  
  <!-- Fragmento menor (40%) -->
  <circle cx="400" cy="240" r="12" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="400" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">m₂=0.4m</text>
  
  <!-- Vector velocidad fragmento menor (apunta a la izquierda!) -->
  <line x1="388" y1="240" x2="330" y2="240" stroke="#3498db" stroke-width="3" marker-end="url(#arrowhead-blue)"/>
  <text x="359" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3498db" font-weight="bold">v₂ = ?</text>
  
  <!-- Leyenda -->
  <rect x="50" y="280" width="200" height="100" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/>
  <text x="150" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Datos del problema:</text>
  <text x="70" y="330" font-family="Arial, sans-serif" font-size="11" fill="#333">• m₁ = 60% de m (fragmento mayor)</text>
  <text x="70" y="350" font-family="Arial, sans-serif" font-size="11" fill="#333">• m₂ = 40% de m (fragmento menor)</text>
  <text x="70" y="370" font-family="Arial, sans-serif" font-size="11" fill="#333">• v₀ = 10 m/s (antes)</text>
  
  <!-- Ecuación de conservación -->
  <rect x="280" y="280" width="270" height="100" fill="#e8f4f8" stroke="#3498db" stroke-width="1" rx="5"/>
  <text x="415" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2980b9">Conservación del momento:</text>
  <text x="415" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">m·v₀ = m₁·v₁ + m₂·v₂</text>
  <text x="415" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">(sistema aislado → p se conserva)</text>
</svg>
