<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <!-- Arrowhead markers -->
    <marker id="arrow-red" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#c62828"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#e65100"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#1565c0"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#7b1fa2"/>
    </marker>
    <marker id="arrow-teal" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 12 4, 0 8" fill="#00695c"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect x="0" y="0" width="500" height="400" fill="#fafbfc" rx="8"/>

  <!-- Grilla -->
  <g stroke="#e0e0e0" stroke-width="0.8">
    <line x1="160" y1="40" x2="160" y2="360"/>
    <line x1="240" y1="40" x2="240" y2="360"/>
    <line x1="320" y1="40" x2="320" y2="360"/>
    <line x1="400" y1="40" x2="400" y2="360"/>
    <line x1="20" y1="40" x2="20" y2="360"/>
    <line x1="20" y1="240" x2="460" y2="240"/>
    <line x1="20" y1="160" x2="460" y2="160"/>
    <line x1="20" y1="80" x2="460" y2="80"/>
    <line x1="20" y1="320" x2="460" y2="320"/>
  </g>

  <!-- Ejes cartesianos -->
  <g stroke="#333" stroke-width="1.8">
    <line x1="40" y1="320" x2="460" y2="320" marker-end="url(#arrow-gray)"/>
    <line x1="80" y1="360" x2="80" y2="30" marker-end="url(#arrow-gray)"/>
  </g>

  <!-- Etiquetas de ejes -->
  <text x="465" y="325" font-size="16" font-family="Georgia, serif" font-style="italic" fill="#333">x</text>
  <text x="85" y="25" font-size="16" font-family="Georgia, serif" font-style="italic" fill="#333">y</text>
  <text x="65" y="338" font-size="14" font-family="Georgia, serif" fill="#555">O</text>

  <!-- Marcas y números -->
  <g stroke="#555" stroke-width="1">
    <line x1="160" y1="316" x2="160" y2="324"/>
    <line x1="240" y1="316" x2="240" y2="324"/>
    <line x1="320" y1="316" x2="320" y2="324"/>
    <line x1="400" y1="316" x2="400" y2="324"/>
    <line x1="76" y1="240" x2="84" y2="240"/>
    <line x1="76" y1="160" x2="84" y2="160"/>
  </g>
  <g font-size="12" font-family="sans-serif" fill="#666">
    <text x="156" y="340">1</text>
    <text x="236" y="340">2</text>
    <text x="316" y="340">3</text>
    <text x="396" y="340">4</text>
    <text x="62" y="244">1</text>
    <text x="62" y="164">2</text>
  </g>

  <!-- Trayectoria curvilínea (parábola suave) -->
  <path d="M 120,280 Q 200,180 320,160 T 440,120" fill="none" stroke="#1565c0" stroke-width="2.5" stroke-dasharray="8,6" opacity="0.7"/>

  <!-- Punto P en (3, 2) → SVG (320, 160) -->
  <circle cx="320" cy="160" r="5" fill="#c62828"/>
  <circle cx="320" cy="160" r="3" fill="white"/>
  <circle cx="320" cy="160" r="2" fill="#c62828"/>
  <text x="330" y="155" font-size="16" font-family="Georgia, serif" font-weight="bold" fill="#c62828">P</text>

  <!-- Vector posición r (rojo) - desde O(80,320) hasta P(320,160) -->
  <line x1="80" y1="320" x2="320" y2="160" stroke="#c62828" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="180" y="235" font-size="16" font-family="Georgia, serif" font-style="italic" fill="#c62828">r</text>

  <!-- Versor ê_r (verde) - dirección de r, unitario -->
  <!-- r = (240, -160), |r| = 288.4, ê_r = (0.832, -0.555) -->
  <!-- Largo 60px: (49.9, -33.3) -->
  <line x1="320" y1="160" x2="369.9" y2="126.7" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="375" y="123" font-size="14" font-family="Georgia, serif" fill="#2e7d32">ê<tspan font-size="10" dy="3">r</tspan></text>

  <!-- Versor ê_φ (naranja) - perpendicular a ê_r, sentido antihorario -->
  <!-- ê_φ = (0.555, 0.832), largo 60px: (33.3, 49.9) -->
  <line x1="320" y1="160" x2="353.3" y2="209.9" stroke="#e65100" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <text x="358" y="225" font-size="14" font-family="Georgia, serif" fill="#e65100">ê<tspan font-size="10" dy="3">φ</tspan></text>

  <!-- Vector velocidad v (azul) - tangente a la trayectoria -->
  <!-- Tangente en P: dirección aproximada (0.9, -0.4), largo 80px: (72, -32) -->
  <line x1="320" y1="160" x2="392" y2="128" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="398" y="125" font-size="16" font-family="Georgia, serif" font-style="italic" fill="#1565c0">v</text>

  <!-- Vector aceleración a (violeta) -->
  <!-- a = (0.3, -0.9) normalizado y escalado, largo 70px: (21, -63) -->
  <line x1="320" y1="160" x2="341" y2="97" stroke="#7b1fa2" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <text x="346" y="93" font-size="16" font-family="Georgia, serif" font-style="italic" fill="#7b1fa2">a</text>

  <!-- Componente tangencial a_t (teal) - paralela a v -->
  <!-- a_t = (0.25, -0.11), largo 50px: (12.5, -5.5) -->
  <line x1="320" y1="160" x2="332.5" y2="154.5" stroke="#00695c" stroke-width="2" marker-end="url(#arrow-teal)"/>
  <text x="338" y="152" font-size="13" font-family="Georgia, serif" fill="#00695c">a<tspan font-size="9" dy="3">t</tspan></text>

  <!-- Componente normal a_n (teal oscuro) - perpendicular a v, hacia centro de curvatura -->
  <!-- a_n = (0.05, -0.79), largo 50px: (2.5, -39.5) -->
  <line x1="320" y1="160" x2="322.5" y2="120.5" stroke="#004d40" stroke-width="2" marker-end="url(#arrow-teal)"/>
  <text x="328" y="117" font-size="13" font-family="Georgia, serif" fill="#004d40">a<tspan font-size="9" dy="3">n</tspan></text>

  <!-- Centro de curvatura C (aproximado) -->
  <circle cx="325" cy="100" r="3" fill="#555"/>
  <text x="330" y="98" font-size="13" font-family="Georgia, serif" font-style="italic" fill="#555">C</text>

  <!-- Línea punteada de P a C (radio de curvatura) -->
  <line x1="320" y1="160" x2="325" y2="100" stroke="#999" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Arco del ángulo φ -->
  <path d="M 120,320 A 40,40 0 0,0 112,288" fill="none" stroke="#666" stroke-width="1.5"/>
  <text x="118" y="300" font-size="14" font-family="Georgia, serif" font-style="italic" fill="#666">φ</text>

  <!-- Leyenda -->
  <rect x="10" y="10" width="180" height="145" fill="white" stroke="#ccc" stroke-width="1" rx="6" opacity="0.95"/>
  <text x="25" y="32" font-size="13" font-family="sans-serif" font-weight="bold" fill="#333">Leyenda</text>
  <line x1="25" y1="40" x2="55" y2="40" stroke="#333" stroke-width="1.5"/>
  <text x="65" y="44" font-size="11" font-family="sans-serif" fill="#555">Ejes cartesianos</text>
  
  <line x1="25" y1="60" x2="55" y2="60" stroke="#1565c0" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="65" y="64" font-size="11" font-family="sans-serif" fill="#555">Trayectoria</text>
  
  <line x1="25" y1="80" x2="55" y2="80" stroke="#c62828" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="65" y="84" font-size="11" font-family="sans-serif" fill="#555">Vector posición r</text>
  
  <line x1="25" y1="100" x2="55" y2="100" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="65" y="104" font-size="11" font-family="sans-serif" fill="#555">Versor ê<tspan font-size="9" dy="2">r</tspan></text>
  
  <line x1="25" y1="120" x2="55" y2="120" stroke="#e65100" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <text x="65" y="124" font-size="11" font-family="sans-serif" fill="#555">Versor ê<tspan font-size="9" dy="2">φ</tspan></text>

  <line x1="25" y1="140" x2="55" y2="140" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="65" y="144" font-size="11" font-family="sans-serif" fill="#555">Velocidad v</text>

  <!-- Título -->
  <text x="250" y="22" font-size="15" font-family="sans-serif" font-weight="bold" fill="#222" text-anchor="middle">Ejercicio 12: Movimiento curvilíneo plano</text>
  <text x="250" y="38" font-size="12" font-family="Georgia, serif" font-style="italic" fill="#555" text-anchor="middle">Vectores y componentes en el punto P</text>
</svg>
