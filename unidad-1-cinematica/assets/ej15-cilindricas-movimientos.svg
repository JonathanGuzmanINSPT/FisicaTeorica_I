<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 500" width="750" height="500">
  <!-- Fondo -->
  <rect width="750" height="500" fill="#fafafa"/>

  <!-- Título -->
  <text x="375" y="32" font-family="sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">Movimiento en Coordenadas Cilíndricas — Tres Casos</text>

  <!-- ============================================ -->
  <!-- CASO (a): V_z = 0 — Plano horizontal -->
  <!-- ============================================ -->
  <rect x="15" y="50" width="230" height="200" rx="8" fill="#f0f7ff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="130" y="72" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">(a) V_z = 0</text>
  <text x="130" y="90" font-family="sans-serif" font-size="12" fill="#1565c0" text-anchor="middle">Plano horizontal</text>

  <!-- Ejes 3D someros -->
  <!-- Eje X -->
  <line x1="40" y1="230" x2="190" y2="230" stroke="#999" stroke-width="1.5"/>
  <polygon points="190,230 183,227 183,233" fill="#999"/>
  <text x="195" y="235" font-family="serif" font-size="13" font-style="italic" fill="#999">x</text>

  <!-- Eje Y (con perspectiva) -->
  <line x1="40" y1="230" x2="120" y2="120" stroke="#999" stroke-width="1.5"/>
  <polygon points="120,120 115,127 124,125" fill="#999"/>
  <text x="125" y="118" font-family="serif" font-size="13" font-style="italic" fill="#999">y</text>

  <!-- Eje Z (vertical) -->
  <line x1="40" y1="230" x2="40" y2="70" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="32" y="68" font-family="serif" font-size="13" font-style="italic" fill="#ccc">z</text>

  <!-- Plano horizontal (proyección) -->
  <polygon points="40,230 190,230 160,150 60,150" fill="#e3f2fd" fill-opacity="0.4" stroke="#90caf9" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Trayectoria curva en el plano -->
  <path d="M 60 180 Q 90 150 120 170 Q 150 190 170 170" fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <circle cx="170" cy="170" r="4" fill="#dc2626"/>
  <text x="174" y="166" font-family="serif" font-size="13" fill="#dc2626">P</text>

  <!-- Vector velocidad tangente -->
  <line x1="170" y1="170" x2="195" y2="155" stroke="#1565c0" stroke-width="2"/>
  <polygon points="195,155 186,154 190,163" fill="#1565c0"/>
  <text x="200" y="153" font-family="serif" font-size="13" font-style="italic" fill="#1565c0">v</text>

  <!-- Indicador v_z = 0 -->
  <line x1="170" y1="170" x2="170" y2="135" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="175" y="130" font-family="serif" font-size="12" fill="#999">z = cte</text>

  <!-- ============================================ -->
  <!-- CASO (b): V_ρ = 0, V_φ, V_z ctes — Hélice -->
  <!-- ============================================ -->
  <rect x="260" y="50" width="230" height="200" rx="8" fill="#f0fdf0" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="375" y="72" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">(b) V_ρ = 0, V_φ, V_z ctes</text>
  <text x="375" y="90" font-family="sans-serif" font-size="12" fill="#2e7d32" text-anchor="middle">Hélice cilíndrica uniforme</text>

  <!-- Cilindro (proyección frontal) -->
  <ellipse cx="375" cy="230" rx="70" ry="15" fill="#e8f5e9" fill-opacity="0.3" stroke="#a5d6a7" stroke-width="1"/>

  <!-- Eje Z del cilindro -->
  <line x1="375" y1="230" x2="375" y2="75" stroke="#a5d6a7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="365" y="72" font-family="serif" font-size="13" font-style="italic" fill="#a5d6a7">z</text>

  <!-- Hélice (vista 2D como senoide amortiguada o perspectiva) -->
  <!-- Lado izquierdo del cilindro -->
  <line x1="305" y1="230" x2="305" y2="75" stroke="#a5d6a7" stroke-width="0.8"/>
  <!-- Lado derecho del cilindro -->
  <line x1="445" y1="230" x2="445" y2="75" stroke="#a5d6a7" stroke-width="0.8"/>

  <!-- Hélice 3D simulada -->
  <path d="M 375 230
           Q 400 225 420 215 Q 440 205 440 195
           Q 440 185 420 175 Q 400 165 375 160
           Q 350 155 330 145 Q 310 135 310 125
           Q 310 115 330 105 Q 350 95 375 90"
        fill="none" stroke="#dc2626" stroke-width="2.5"/>

  <!-- Punto sobre la hélice -->
  <circle cx="375" cy="160" r="4" fill="#dc2626"/>
  <text x="380" y="156" font-family="serif" font-size="13" fill="#dc2626">P</text>

  <!-- Componentes de velocidad -->
  <!-- v_phi (tangencial, horizontal) -->
  <line x1="375" y1="160" x2="410" y2="155" stroke="#1565c0" stroke-width="2"/>
  <polygon points="410,155 401,153 406,162" fill="#1565c0"/>
  <text x="412" y="152" font-family="serif" font-size="11" font-style="italic" fill="#1565c0">v_φ</text>

  <!-- v_z (vertical) -->
  <line x1="375" y1="160" x2="375" y2="135" stroke="#e65100" stroke-width="2"/>
  <polygon points="375,135 372,142 378,142" fill="#e65100"/>
  <text x="378" y="132" font-family="serif" font-size="11" font-style="italic" fill="#e65100">v_z</text>

  <!-- ρ constante -->
  <line x1="375" y1="230" x2="375" y2="160" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="360" y="198" font-family="serif" font-size="12" fill="#666">ρ = cte</text>

  <!-- ============================================ -->
  <!-- CASO (c): V_φ = 0, V_ρ, V_z ctes — MRU en plano vertical -->
  <!-- ============================================ -->
  <rect x="505" y="50" width="230" height="200" rx="8" fill="#fef3e2" stroke="#e65100" stroke-width="1.5"/>
  <text x="620" y="72" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">(c) V_φ = 0, V_ρ, V_z ctes</text>
  <text x="620" y="90" font-family="sans-serif" font-size="12" fill="#e65100" text-anchor="middle">MRU en plano vertical</text>

  <!-- Plano vertical (meridiano) -->
  <polygon points="530,230 710,230 680,75 560,75" fill="#fff3e0" fill-opacity="0.4" stroke="#ffcc80" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Ejes -->
  <line x1="530" y1="230" x2="680" y2="230" stroke="#999" stroke-width="1.5"/>
  <polygon points="680,230 673,227 673,233" fill="#999"/>
  <text x="685" y="235" font-family="serif" font-size="13" font-style="italic" fill="#999">ρ</text>

  <line x1="530" y1="230" x2="530" y2="70" stroke="#999" stroke-width="1.5"/>
  <polygon points="530,70 527,77 533,77" fill="#999"/>
  <text x="522" y="68" font-family="serif" font-size="13" font-style="italic" fill="#999">z</text>

  <!-- Trayectoria rectilínea -->
  <line x1="555" y1="210" x2="660" y2="100" stroke="#dc2626" stroke-width="3"/>
  <circle cx="660" cy="100" r="4" fill="#dc2626"/>
  <text x="665" y="96" font-family="serif" font-size="13" fill="#dc2626">P</text>

  <!-- Vector velocidad (resultante) -->
  <line x1="660" y1="100" x2="690" y2="72" stroke="#1565c0" stroke-width="2.5"/>
  <polygon points="690,72 681,72 686,80" fill="#1565c0"/>
  <text x="695" y="70" font-family="serif" font-size="13" font-style="italic" fill="#1565c0">v</text>

  <!-- Descomposición v_rho y v_z -->
  <line x1="660" y1="100" x2="685" y2="100" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="688" y="104" font-family="serif" font-size="11" font-style="italic" fill="#1565c0">v_ρ</text>

  <line x1="685" y1="100" x2="690" y2="72" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="693" y="88" font-family="serif" font-size="11" font-style="italic" fill="#e65100">v_z</text>

  <!-- φ = cte -->
  <path d="M 530 230 Q 540 220 545 215" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="510" y="218" font-family="serif" font-size="11" fill="#666" font-style="italic">φ = cte</text>

  <!-- ============================================ -->
  <!-- TABLA RESUMEN -->
  <!-- ============================================ -->
  <rect x="15" y="270" width="720" height="215" rx="8" fill="#f8f9fa" stroke="#ccc" stroke-width="1"/>

  <text x="375" y="295" font-family="sans-serif" font-size="15" font-weight="bold" fill="#333" text-anchor="middle">📊 Tabla resumen de componentes de velocidad</text>

  <!-- Encabezados de tabla -->
  <rect x="30" y="305" width="140" height="30" rx="4" fill="#e3f2fd"/>
  <text x="100" y="325" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565c0" text-anchor="middle">Componente</text>

  <rect x="175" y="305" width="140" height="30" rx="4" fill="#e3f2fd"/>
  <text x="245" y="325" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565c0" text-anchor="middle">Expresión</text>

  <rect x="320" y="305" width="140" height="30" rx="4" fill="#e3f2fd"/>
  <text x="390" y="325" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565c0" text-anchor="middle">Significado</text>

  <rect x="465" y="305" width="120" height="30" rx="4" fill="#e3f2fd"/>
  <text x="525" y="325" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565c0" text-anchor="middle">Varía cuando…</text>

  <rect x="590" y="305" width="130" height="30" rx="4" fill="#e3f2fd"/>
  <text x="655" y="325" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565c0" text-anchor="middle">Constante =</text>

  <!-- Filas de la tabla -->
  <!-- Fila 1: v_ρ -->
  <line x1="30" y1="338" x2="720" y2="338" stroke="#ddd" stroke-width="0.5"/>
  <text x="45" y="358" font-family="serif" font-size="14" font-style="italic" fill="#333">v_ρ</text>
  <text x="230" y="358" font-family="serif" font-size="14" fill="#333" text-anchor="middle">$\dot{\rho}$</text>
  <text x="390" y="358" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">Rapidez radial</text>
  <text x="525" y="358" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">ρ se aleja/ acerca al eje</text>
  <text x="655" y="358" font-family="serif" font-size="12" fill="#555" text-anchor="middle">$\rho$ = cte</text>

  <!-- Fila 2: v_φ -->
  <line x1="30" y1="368" x2="720" y2="368" stroke="#ddd" stroke-width="0.5"/>
  <text x="45" y="388" font-family="serif" font-size="14" font-style="italic" fill="#333">v_φ</text>
  <text x="230" y="388" font-family="serif" font-size="14" fill="#333" text-anchor="middle">$\rho\,\dot{\phi}$</text>
  <text x="390" y="388" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">Rapidez angular × radio</text>
  <text x="525" y="388" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">φ cambia (gira)</text>
  <text x="655" y="388" font-family="serif" font-size="12" fill="#555" text-anchor="middle">$\phi$ = cte</text>

  <!-- Fila 3: v_z -->
  <line x1="30" y1="398" x2="720" y2="398" stroke="#ddd" stroke-width="0.5"/>
  <text x="45" y="418" font-family="serif" font-size="14" font-style="italic" fill="#333">v_z</text>
  <text x="230" y="418" font-family="serif" font-size="14" fill="#333" text-anchor="middle">$\dot{z}$</text>
  <text x="390" y="418" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">Rapidez vertical</text>
  <text x="525" y="418" font-family="sans-serif" font-size="12" fill="#555" text-anchor="middle">z sube/baja</text>
  <text x="655" y="418" font-family="serif" font-size="12" fill="#555" text-anchor="middle">$z$ = cte</text>

  <!-- Separación inferior tabla -->
  <line x1="30" y1="428" x2="720" y2="428" stroke="#ccc" stroke-width="1"/>
  <line x1="30" y1="305" x2="30" y2="428" stroke="#ccc" stroke-width="1"/>
  <line x1="170" y1="305" x2="170" y2="428" stroke="#ccc" stroke-width="1"/>
  <line x1="315" y1="305" x2="315" y2="428" stroke="#ccc" stroke-width="1"/>
  <line x1="460" y1="305" x2="460" y2="428" stroke="#ccc" stroke-width="1"/>
  <line x1="585" y1="305" x2="585" y2="428" stroke="#ccc" stroke-width="1"/>
  <line x1="720" y1="305" x2="720" y2="428" stroke="#ccc" stroke-width="1"/>

  <!-- Resumen de casos al pie -->
  <rect x="30" y="440" width="220" height="35" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="140" y="462" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1565c0" text-anchor="middle">(a) V_z = 0 → Plano horiz.</text>

  <rect x="265" y="440" width="220" height="35" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="375" y="462" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">(b) V_ρ=0, V_φ,V_z ctes → Hélice</text>

  <rect x="500" y="440" width="220" height="35" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="610" y="462" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">(c) V_φ=0, V_ρ,V_z ctes → MRU</text>

</svg>