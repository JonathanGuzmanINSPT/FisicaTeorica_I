<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Fondo -->
  <rect width="400" height="400" fill="#fafafa"/>
  
  <!-- Ejes coordenados -->
  <line x1="50" y1="200" x2="350" y2="200" stroke="#333" stroke-width="1.5"/>
  <line x1="200" y1="50" x2="200" y2="350" stroke="#333" stroke-width="1.5"/>
  
  <!-- Flechas de ejes -->
  <polygon points="350,200 340,195 340,205" fill="#333"/>
  <polygon points="200,50 195,60 205,60" fill="#333"/>
  
  <!-- Etiquetas de ejes -->
  <text x="355" y="205" font-family="serif" font-size="16" font-style="italic">x</text>
  <text x="205" y="45" font-family="serif" font-size="16" font-style="italic">y</text>
  <text x="185" y="190" font-family="serif" font-size="14">O</text>
  
  <!-- Circunferencia -->
  <circle cx="200" cy="200" r="120" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  
  <!-- Radio A -->
  <line x1="200" y1="200" x2="285" y2="115" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="250" y="145" font-family="serif" font-size="16" fill="#dc2626" font-style="italic">A</text>
  
  <!-- Punto P en la circunferencia -->
  <circle cx="285" cy="115" r="6" fill="#dc2626"/>
  <text x="295" y="110" font-family="serif" font-size="16" font-weight="bold">P</text>
  
  <!-- Vector posición r -->
  <line x1="200" y1="200" x2="280" y2="120" stroke="#16a34a" stroke-width="2.5"/>
  <polygon points="280,120 270,125 275,115" fill="#16a34a"/>
  <text x="245" y="155" font-family="serif" font-size="16" fill="#16a34a" font-style="italic">r</text>
  
  <!-- Vector velocidad v (tangencial) -->
  <line x1="285" y1="115" x2="340" y2="155" stroke="#9333ea" stroke-width="2.5"/>
  <polygon points="340,155 330,150 335,160" fill="#9333ea"/>
  <text x="320" y="145" font-family="serif" font-size="16" fill="#9333ea" font-style="italic">v</text>
  
  <!-- Vector aceleración a (hacia el centro) -->
  <line x1="285" y1="115" x2="210" y2="190" stroke="#ea580c" stroke-width="2.5"/>
  <polygon points="210,190 220,185 215,195" fill="#ea580c"/>
  <text x="235" y="140" font-family="serif" font-size="16" fill="#ea580c" font-style="italic">a</text>
  
  <!-- Ángulo φ -->
  <path d="M 230,200 A 30,30 0 0,0 218,185" fill="none" stroke="#666" stroke-width="1.5"/>
  <text x="235" y="195" font-family="serif" font-size="14" fill="#666" font-style="italic">φ</text>
  
  <!-- Leyenda -->
  <rect x="20" y="320" width="160" height="70" fill="white" stroke="#ccc" stroke-width="1" rx="5"/>
  <circle cx="35" cy="340" r="5" fill="#2563eb"/>
  <text x="45" y="345" font-family="sans-serif" font-size="12">Trayectoria: x²+y²=A²</text>
  <line x1="30" y1="360" x2="40" y2="360" stroke="#16a34a" stroke-width="2"/>
  <text x="45" y="365" font-family="sans-serif" font-size="12">r = posición</text>
  <line x1="30" y1="378" x2="40" y2="378" stroke="#9333ea" stroke-width="2"/>
  <text x="45" y="383" font-family="sans-serif" font-size="12">v = velocidad (tangencial)</text>
</svg>
