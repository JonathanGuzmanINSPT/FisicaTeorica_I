  <text
     x="81"
     y="260"
     font-size="15px"
     fill="#333333"
     font-style="italic"
     id="text4">O</text>
  <!-- ─── Circunferencia de trayectoria de B ───
       Centro en (a, 0) → pixel (160+130, 240) = (290, 240)
       Radio R ~ 65px (proporcional: a=130px, R=12.5/30*130≈54px) -->
  <circle
     cx="227"
     cy="240"
     r="54"
     fill="none"
     stroke="#999999"
     stroke-width="1.2"
     stroke-dasharray="6, 4"
     id="circle4" />
  <circle
     cx="225.93359"
     cy="240.76996"
     r="70.824677"
     fill="none"
     stroke="#999999"
     stroke-width="1.57388"
     stroke-dasharray="6, 4"
     id="circle4-9"
     style="stroke-dasharray:none" />
  <!-- Marca del centro de la circunferencia (punto a,0) -->
  <circle
     cx="227"
     cy="240"
     r="3"
     fill="#888888"
     id="circle5" />
  <!-- Cota 'a' -->
  <line
     x1="97"
     y1="323.58783"
     x2="227"
     y2="323.58783"
     stroke="#888888"
     stroke-width="1"
     marker-start="url(#tick)"
     marker-end="url(#tick)"
     id="line5" />
  <text
     x="156.06065"
     y="333.43707"
     font-size="14px"
     fill="#555555"
     font-style="italic"
     id="text5">a</text>
  <!-- Cota 'R' (desde centro hasta borde derecho) -->
  <line
     x1="300.90421"
     y1="189.23396"
     x2="301.4924"
     y2="240.06882"
     stroke="#888888"
     stroke-width="0.97693"
     marker-start="url(#tick)"
     marker-end="url(#tick)"
     id="line6" />
  <text
     x="309.08014"
     y="219.41353"
     font-size="14px"
     fill="#555555"
     font-style="italic"
     id="text6">R</text>
  <!-- ─── Posición genérica de B sobre la circunferencia (φ ~ 50°) ─── -->
  <!-- B = centro + R*(cos φ, -sin φ) = (290 + 54*cos50°, 240 - 54*sin50°) ≈ (325, 199) -->
  <text
     x="257.1593"
     y="203.67616"
     font-size="15px"
     fill="#c0392b"
     font-style="italic"
     font-weight="bold"
     id="text7">B</text>
  <!-- ─── Barra giratoria OC ───
       Pasa por O(160,240) y B(325,199), se extiende hasta C -->
  <!-- Dirección: (325-160, 199-240) = (165, -41). Extendemos hasta ~370px -->
  <!-- Parametrizamos: t tal que x=370 → t=(370-160)/165=1.273 → y=240-41*1.273≈187 -->
  <!-- Etiqueta C al final de la barra -->
  <text
     x="316.5"
     y="167.5"
     font-size="15px"
     fill="#1a5276"
     font-style="italic"
     font-weight="bold"
     id="text8">C</text>
  <!-- ─── Ángulo θ (entre eje x y barra OC) ─── -->
  <!-- Arco de 0 a ~14° (ángulo real de la barra) desde O, radio 45 -->
  <!-- Arco más visible: desde (205,240) con ángulo pequeño -->
  <path
     d="m 141.02209,239.07863 c 0.1085,-3.76201 -0.3705,-9.24675 -1.63822,-12.7776"
     fill="none"
     stroke="#2980b9"
     stroke-width="1.5"
     id="path9"
     sodipodi:nodetypes="cc" />
  <text
     x="142.99007"
     y="237.5058"
     font-size="14px"
     fill="#2980b9"
     font-style="italic"
     id="text9">θ</text>
  <!-- ─── Ángulo φ (sobre la circunferencia, desde eje x del centro) ─── -->
  <!-- Centro (290,240), arco de 0 a 50°, radio 30 -->
  <text
     x="245.16956"
     y="227.17844"
     font-size="14px"
     fill="#8e44ad"
     font-style="italic"
     id="text10">φ</text>
  <!-- ─── Vector velocidad v₀ en B (tangente a la circunferencia, aprox) ─── -->
  <!-- Tangente en φ=50°: dirección (-sin50°, -cos50°) = (-0.766, -0.643) normalizado -->
  <!-- Flecha desde B(325,199) en dirección (-0.766, -0.643)*40 → (325-30.6, 199-25.7)=(294,173) -->
  <line
     x1="243.12366"
     y1="183.58252"
     x2="222.29523"
     y2="170.10385"
     stroke="#e67e22"
     stroke-width="1.29188"
     marker-end="url(#arrowOrange)"
     id="line10" />
  <text
     x="208.4722"
     y="181.92607"
     font-size="14px"
     fill="#e67e22"
     font-style="italic"
     id="text11">v₀</text>
  <!-- ─── Leyenda ─── -->
  <rect
     x="163.55215"
     y="48.895706"
     width="220"
     height="78"
     rx="6"
     fill="#f0f0f0"
     stroke="#cccccc"
     stroke-width="1"
     id="rect11" />
  <text
     x="179.89571"
     y="63.95092"
     font-size="12px"
     fill="#333333"
     id="text12"><tspan
   font-weight="bold"
   id="tspan11">O</tspan>: pivote fijo de la barra <tspan
   font-style="italic"
   id="tspan12">OC</tspan></text>
  <text
     x="179.89571"
     y="81.95092"
     font-size="12px"
     fill="#c0392b"
     id="text13"><tspan
   font-weight="bold"
   fill="#333333"
   id="tspan13">B</tspan>: perno (se mueve sobre circunf.)</text>
  <text
     x="179.89571"
     y="98.95092"
     font-size="12px"
     fill="#333333"
     id="text16"><tspan
   font-style="italic"
   id="tspan14">θ</tspan>: ángulo de barra <tspan
   font-style="italic"
   id="tspan15">OC</tspan> con eje <tspan
   font-style="italic"
   id="tspan16">x</tspan></text>
  <text
     x="179.89571"
     y="115.95092"
     font-size="12px"
     fill="#333333"
     id="text18"><tspan
   font-style="italic"
   id="tspan17">φ</tspan>: ángulo de <tspan
   font-style="italic"
   id="tspan18">B</tspan> sobre su trayectoria</text>
  <!-- ─── Título ─── -->
  <path
