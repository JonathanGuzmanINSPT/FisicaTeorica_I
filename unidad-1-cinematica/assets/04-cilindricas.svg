<svg viewBox="0 0 540 430" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,'Times New Roman',serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/></marker>
    <marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ea580c"/></marker>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0891b2"/></marker>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/></marker>
    <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/></marker>
  </defs>

  <rect width="540" height="430" fill="white" stroke="#e2e8f0" stroke-width="1.5" rx="6"/>
  <text x="270" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Coordenadas Cilíndricas (ρ, φ, z)</text>

  <!-- Divider -->
  <line x1="270" y1="45" x2="270" y2="340" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- ===== LEFT PANEL: Vista superior (plano xy) ===== -->
  <text x="135" y="58" text-anchor="middle" font-size="13" fill="#475569" font-style="italic">Vista superior — plano x-y</text>

  <!--
    Left origin at (105, 220)
    φ = 38°, ρ = 105px
    cos38=0.788, sin38=0.616
    P_top = (105+105*0.788, 220-105*0.616) = (187.7, 155.3) ≈ (188, 155)
    ê_ρ dir: (0.788,-0.616), len=48 → tip (188+37.8, 155-29.6) = (226, 125)
    ê_φ dir: (-0.616,-0.788), len=48 → tip (188-29.6, 155-37.8) = (158, 117)
    Arc radius-arc for φ at r=40: (105+40*0.788, 220-40*0.616) = (136.5, 195.4)
    Angle arc: M 145 220 A 40 40 0 0 0 137 195
    Arc ρ: M 210 220 A 105 105 0 0 0 188 155
  -->

  <!-- x axis (left panel) -->
  <line x1="40" y1="220" x2="245" y2="220" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="250" y="225" font-size="14" font-style="italic" fill="#6b7280">x</text>

  <!-- y axis (left panel) -->
  <line x1="105" y1="280" x2="105" y2="75" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="94" y="70" font-size="14" font-style="italic" fill="#6b7280">y</text>

  <!-- Origin left -->
  <circle cx="105" cy="220" r="3" fill="#1e293b"/>
  <text x="84" y="236" font-size="13" font-style="italic" fill="#1e293b">O</text>

  <!-- Dashed ρ line -->
  <line x1="105" y1="220" x2="188" y2="155" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="6,4"/>
  <text x="139" y="181" font-size="14" fill="#7c3aed" font-style="italic">ρ</text>

  <!-- Arc for φ -->
  <path d="M 145 220 A 40 40 0 0 0 137 195" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="153" y="210" font-size="13" fill="#f59e0b" font-style="italic">φ</text>

  <!-- ê_ρ at P_top (orange) -->
  <line x1="188" y1="155" x2="224" y2="126" stroke="#ea580c" stroke-width="2.5" marker-end="url(#ao)"/>
  <text x="228" y="122" font-size="13" fill="#ea580c">ê<tspan font-size="10" baseline-shift="sub">ρ</tspan></text>

  <!-- ê_φ at P_top (cyan) -->
  <line x1="188" y1="155" x2="158" y2="118" stroke="#0891b2" stroke-width="2.5" marker-end="url(#ac)"/>
  <text x="138" y="113" font-size="13" fill="#0891b2">ê<tspan font-size="10" baseline-shift="sub">φ</tspan></text>

  <!-- Point P_top -->
  <circle cx="188" cy="155" r="4.5" fill="#7c3aed"/>
  <text x="195" y="151" font-size="13" fill="#1e293b">P'</text>

  <!-- Right angle at P_top -->
  <!-- ê_ρ dir: (0.788,-0.616)×8 = (6.3,-4.9) → a=(194,150) -->
  <!-- ê_φ dir: (-0.616,-0.788)×8 = (-4.9,-6.3) → b=(183,149) -->
  <!-- c = a + ê_φ×8 = (189,143) -->
  <path d="M 194 150 L 189 143 L 183 149" fill="none" stroke="#475569" stroke-width="1.2"/>

  <!-- ===== RIGHT PANEL: Vista lateral (plano ρ-z) ===== -->
  <text x="405" y="58" text-anchor="middle" font-size="13" fill="#475569" font-style="italic">Vista lateral — plano ρ-z</text>

  <!--
    Right origin at (310, 280)
    ρ axis → right, z axis → up
    Same point: ρ=105px, z=100px
    P_side = (310+105, 280-100) = (415, 180)
    ê_ρ at O (orange): (310,280) → (358,280)
    ê_z at P_side (blue): (415,180) → (415,132)
    Dashed vertical from (415,280) to (415,180) — z value
    Dashed horizontal from (310,180) to (415,180) — ρ value
  -->

  <!-- ρ axis (right panel) -->
  <line x1="290" y1="280" x2="510" y2="280" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="516" y="285" font-size="14" font-style="italic" fill="#6b7280">ρ</text>

  <!-- z axis (right panel) -->
  <line x1="310" y1="340" x2="310" y2="75" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="298" y="70" font-size="14" font-style="italic" fill="#6b7280">z</text>

  <!-- Origin right -->
  <circle cx="310" cy="280" r="3" fill="#1e293b"/>
  <text x="290" y="296" font-size="13" font-style="italic" fill="#1e293b">O</text>

  <!-- Dashed projection lines -->
  <line x1="310" y1="180" x2="415" y2="180" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="415" y1="280" x2="415" y2="180" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- ρ dimension label -->
  <text x="360" y="298" text-anchor="middle" font-size="14" fill="#7c3aed" font-style="italic">ρ</text>

  <!-- z dimension label -->
  <text x="430" y="234" font-size="14" fill="#2563eb" font-style="italic">z</text>

  <!-- ê_ρ at origin (orange) -->
  <line x1="310" y1="280" x2="358" y2="280" stroke="#ea580c" stroke-width="2.5" marker-end="url(#ao)"/>
  <text x="362" y="274" font-size="13" fill="#ea580c">ê<tspan font-size="10" baseline-shift="sub">ρ</tspan></text>

  <!-- ê_z at P_side (blue) -->
  <line x1="415" y1="180" x2="415" y2="132" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ab)"/>
  <text x="421" y="129" font-size="13" fill="#2563eb">ê<tspan font-size="10" baseline-shift="sub">z</tspan></text>

  <!-- Point P_side -->
  <circle cx="415" cy="180" r="4.5" fill="#7c3aed"/>
  <text x="422" y="176" font-size="13" fill="#1e293b">P</text>

  <!-- Formula box -->
  <rect x="22" y="348" width="496" height="72" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="270" y="366" text-anchor="middle" font-size="14" fill="#1e293b" font-weight="bold">Cilíndricas: r⃗ = ρ·ê<tspan font-size="11" baseline-shift="sub">ρ</tspan> + z·ê<tspan font-size="11" baseline-shift="sub">z</tspan></text>
  <text x="270" y="386" text-anchor="middle" font-size="13" fill="#475569">ṙ = ρ̇·ê<tspan font-size="10" baseline-shift="sub">ρ</tspan> + ρφ̇·ê<tspan font-size="10" baseline-shift="sub">φ</tspan> + ż·ê<tspan font-size="10" baseline-shift="sub">z</tspan></text>
  <text x="270" y="406" text-anchor="middle" font-size="12" fill="#64748b">r̈ = (ρ̈ − ρφ̇²)·ê<tspan font-size="9" baseline-shift="sub">ρ</tspan> + (ρφ̈ + 2ρ̇φ̇)·ê<tspan font-size="9" baseline-shift="sub">φ</tspan> + z̈·ê<tspan font-size="9" baseline-shift="sub">z</tspan>     (ê<tspan font-size="9" baseline-shift="sub">z</tspan> constante, ê<tspan font-size="9" baseline-shift="sub">ρ</tspan> y ê<tspan font-size="9" baseline-shift="sub">φ</tspan> giran con φ)</text>
</svg>
