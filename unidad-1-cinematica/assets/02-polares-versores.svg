<svg viewBox="0 0 500 420" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,'Times New Roman',serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/></marker>
    <marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/></marker>
    <marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ea580c"/></marker>
    <marker id="ac" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0891b2"/></marker>
  </defs>

  <rect width="500" height="420" fill="white" stroke="#e2e8f0" stroke-width="1.5" rx="6"/>
  <text x="250" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Coordenadas Polares — Versores en el Punto P</text>

  <!-- x axis. Origin O at (150, 320) -->
  <line x1="60" y1="320" x2="440" y2="320" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="448" y="325" font-size="16" font-style="italic" fill="#6b7280">x</text>

  <!-- y axis -->
  <line x1="150" y1="370" x2="150" y2="60" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="139" y="53" font-size="16" font-style="italic" fill="#6b7280">y</text>

  <!-- Origin -->
  <circle cx="150" cy="320" r="3.5" fill="#1e293b"/>
  <text x="128" y="337" font-size="14" font-style="italic" fill="#1e293b">O</text>

  <!--
    φ = 40°, r = 175px
    cos40° = 0.766, sin40° = 0.643
    P = (150 + 175*0.766, 320 - 175*0.643) = (284.1, 207.5) ≈ (284, 208)
    ê_r dir in SVG: (0.766, -0.643), length=68 → tip (284+52.1, 208-43.7) = (336,164)
    ê_φ dir in SVG: (-0.643, -0.766), length=68 → tip (284-43.7, 208-52.1) = (240,156)
    Arc from x-axis point (325,320) to P (284,208), sweep=0 (CCW in screen)
    Right angle mark: scale=10
      a = P + 10*ê_r = (284+7.66, 208-6.43) = (292,202)
      b = P + 10*ê_φ = (284-6.43, 208-7.66) = (278,200)
      c = a + 10*ê_φ = (292-6.43, 202-7.66) = (286,194)
  -->

  <!-- Dashed radius line O -> P -->
  <line x1="150" y1="320" x2="284" y2="208" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="7,4"/>

  <!-- r label at midpoint of radius -->
  <text x="207" y="257" font-size="16" fill="#7c3aed" font-style="italic">r</text>

  <!-- Arc from (325,320) to (284,208), radius=175, sweep=0 -->
  <path d="M 325 320 A 175 175 0 0 0 284 208" fill="none" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- Angle arc for φ (radius=45) -->
  <!-- at φ=40°, mini arc endpoint: (150+45*0.766, 320-45*0.643) = (184.5, 291.1) ≈ (185,291) -->
  <path d="M 195 320 A 45 45 0 0 0 185 291" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- φ label at midpoint ~20° of arc: (150+55*cos20°, 320-55*sin20°) = (202,301) -->
  <text x="205" y="307" font-size="15" fill="#f59e0b" font-style="italic">φ</text>

  <!-- ê_r at P (orange) -->
  <line x1="284" y1="208" x2="330" y2="165" stroke="#ea580c" stroke-width="2.5" marker-end="url(#ao)"/>
  <text x="334" y="161" font-size="15" fill="#ea580c">ê<tspan font-size="12" baseline-shift="sub">r</tspan></text>

  <!-- ê_φ at P (cyan) -->
  <line x1="284" y1="208" x2="240" y2="156" stroke="#0891b2" stroke-width="2.5" marker-end="url(#ac)"/>
  <text x="220" y="150" font-size="15" fill="#0891b2">ê<tspan font-size="12" baseline-shift="sub">φ</tspan></text>

  <!-- Right angle mark at P -->
  <path d="M 292 202 L 285 194 L 278 200" fill="none" stroke="#475569" stroke-width="1.3"/>

  <!-- Point P -->
  <circle cx="284" cy="208" r="5" fill="#7c3aed"/>
  <text x="292" y="204" font-size="14" fill="#1e293b" font-style="italic">P</text>

  <!-- Warning box: versors are at P, not at O -->
  <rect x="298" y="242" width="178" height="58" rx="5" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="387" y="258" text-anchor="middle" font-size="12" fill="#9a3412" font-weight="bold">⚠ ê_r y ê_φ están en P</text>
  <text x="387" y="273" text-anchor="middle" font-size="11" fill="#9a3412">No en el origen O</text>
  <text x="387" y="288" text-anchor="middle" font-size="11" fill="#9a3412">Rotan con φ(t) → no son ctes.</text>

  <!-- Formula box -->
  <rect x="25" y="360" width="450" height="50" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="250" y="377" text-anchor="middle" font-size="14" fill="#475569">ṙ  =  ṙ ê<tspan font-size="11" baseline-shift="sub">r</tspan>  +  rφ̇ ê<tspan font-size="11" baseline-shift="sub">φ</tspan></text>
  <text x="250" y="398" text-anchor="middle" font-size="12" fill="#64748b">dê<tspan font-size="9" baseline-shift="sub">r</tspan>/dt = φ̇ ê<tspan font-size="9" baseline-shift="sub">φ</tspan>       dê<tspan font-size="9" baseline-shift="sub">φ</tspan>/dt = −φ̇ ê<tspan font-size="9" baseline-shift="sub">r</tspan>       (ver diagrama 03)</text>
</svg>
