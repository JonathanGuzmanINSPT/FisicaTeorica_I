<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 580" width="650" height="580">
  <!-- Fondo -->
  <rect width="650" height="580" fill="#fafafa"/>

  <defs>
    <!-- Marcadores de flecha -->
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565c0"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#666"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Título -->
  <text x="325" y="28" font-family="sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">MCU sobre una esfera — Paralelo y Meridiano</text>

  <!-- ============================================ -->
  <!-- PANEL IZQUIERDO: PARALELO -->
  <!-- ============================================ -->

  <!-- Marco izquierdo -->
  <rect x="10" y="45" width="310" height="520" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="165" y="68" font-family="sans-serif" font-size="15" font-weight="bold" fill="#dc2626" text-anchor="middle">(a) Movimiento en un paralelo</text>

  <!-- Centro de la esfera -->
  <circle cx="165" cy="330" r="120" fill="none" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- Ejes -->
  <!-- Eje Z (vertical) -->
  <line x1="165" y1="190" x2="165" y2="470" stroke="#999" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="155" y="185" font-family="serif" font-size="15" font-style="italic" fill="#666">z</text>

  <!-- Eje X (horizontal) -->
  <line x1="25" y1="330" x2="310" y2="330" stroke="#999" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="315" y="335" font-family="serif" font-size="15" font-style="italic" fill="#666">x</text>

  <!-- Eje Y (perspectiva) -->
  <line x1="165" y1="330" x2="85" y2="255" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Centro O -->
  <circle cx="165" cy="330" r="3" fill="#333"/>
  <text x="155" y="350" font-family="serif" font-size="14" font-style="italic" fill="#333">O</text>

  <!-- Círculo del paralelo (a θ₀ ≈ 55° de la vertical) -->
  <!-- El paralelo está en θ₀ ≈ 55°, radio = R·sin(55°) ≈ 0.82R ≈ 98px, altura z = R·cos(55°) ≈ 0.57R ≈ 69px sobre el centro -->
  <!-- altura desde parte superior: 330 - 69 = 261 -->
  <ellipse cx="165" cy="261" rx="98" ry="28" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="5,3"/>

  <!-- Punto P sobre el paralelo -->
  <circle cx="245" cy="250" r="5" fill="#dc2626"/>
  <text x="252" y="246" font-family="serif" font-size="15" font-weight="bold" fill="#dc2626">P</text>

  <!-- Radio R (desde O hasta P) -->
  <line x1="165" y1="330" x2="245" y2="250" stroke="#666" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="195" y="280" font-family="serif" font-size="14" font-style="italic" fill="#666">R</text>

  <!-- Ángulo θ₀ (desde eje z hasta OP) -->
  <path d="M 165 280 Q 185 283 195 290" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="170" y="278" font-family="serif" font-size="14" font-style="italic" fill="#16a34a">θ₀</text>

  <!-- Radio del paralelo R·sin(θ₀) -->
  <line x1="165" y1="261" x2="245" y2="250" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="190" y="247" font-family="serif" font-size="12" font-style="italic" fill="#666">R sin θ₀</text>

  <!-- Indicador eje z -->
  <line x1="165" y1="261" x2="165" y2="250" stroke="#d1d5db" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- Vector velocidad v (tangente al paralelo) -->
  <line x1="245" y1="250" x2="275" y2="230" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="280" y="226" font-family="serif" font-size="15" font-style="italic" fill="#1565c0">v</text>

  <!-- Vector aceleración centrípeta (hacia el eje z) -->
  <line x1="245" y1="250" x2="200" y2="257" stroke="#7b1fa2" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="245" y="272" font-family="serif" font-size="12" font-style="italic" fill="#7b1fa2">a_c</text>

  <!-- Indicador de que ω_φ es constante -->
  <path d="M 165 261 A 10 10 0 0 1 175 263" fill="none" stroke="#e65100" stroke-width="1.5"/>
  <text x="125" y="243" font-family="serif" font-size="12" font-style="italic" fill="#e65100">ω_φ = cte</text>

  <!-- Ecuaciones del paralelo -->
  <rect x="20" y="480" width="290" height="75" rx="6" fill="#fff" stroke="#fca5a5" stroke-width="1"/>
  <text x="165" y="498" font-family="sans-serif" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="middle">Ecuaciones del movimiento:</text>
  <text x="45" y="518" font-family="serif" font-size="13" fill="#333">r(t) = R</text>
  <text x="45" y="538" font-family="serif" font-size="13" fill="#333">θ(t) = θ₀</text>
  <text x="45" y="558" font-family="serif" font-size="13" fill="#333">φ(t) = φ₀ + ω_φ · t</text>

  <!-- ============================================ -->
  <!-- PANEL DERECHO: MERIDIANO -->
  <!-- ============================================ -->

  <!-- Marco derecho -->
  <rect x="330" y="45" width="310" height="520" rx="8" fill="#eff6ff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="485" y="68" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1565c0" text-anchor="middle">(b) Movimiento en un meridiano</text>

  <!-- Centro de la esfera -->
  <circle cx="485" cy="330" r="120" fill="none" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- Ejes -->
  <!-- Eje Z (vertical) -->
  <line x1="485" y1="190" x2="485" y2="470" stroke="#999" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="475" y="185" font-family="serif" font-size="15" font-style="italic" fill="#666">z</text>

  <!-- Eje X (horizontal) -->
  <line x1="345" y1="330" x2="630" y2="330" stroke="#999" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="635" y="335" font-family="serif" font-size="15" font-style="italic" fill="#666">x</text>

  <!-- Centro O -->
  <circle cx="485" cy="330" r="3" fill="#333"/>
  <text x="475" y="350" font-family="serif" font-size="14" font-style="italic" fill="#333">O</text>

  <!-- Arco meridiano (círculo máximo en el plano xz) -->
  <path d="M 365 330 A 120 120 0 0 0 605 330" fill="none" stroke="#1565c0" stroke-width="2.5"/>
  <path d="M 365 330 A 120 120 0 0 1 605 330" fill="none" stroke="#1565c0" stroke-width="2.5" stroke-dasharray="5,3"/>

  <!-- Punto Q sobre el meridiano -->
  <circle cx="435" cy="240" r="5" fill="#1565c0"/>
  <text x="420" y="234" font-family="serif" font-size="15" font-weight="bold" fill="#1565c0">Q</text>

  <!-- Radio R (desde O hasta Q) -->
  <line x1="485" y1="330" x2="435" y2="240" stroke="#666" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="280" font-family="serif" font-size="14" font-style="italic" fill="#666">R</text>

  <!-- Ángulo θ (desde eje z hasta OQ) -->
  <path d="M 475 300 Q 478 295 480 292" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="465" y="290" font-family="serif" font-size="14" font-style="italic" fill="#16a34a">θ(t)</text>

  <!-- Vector velocidad v (tangente al meridiano, perpendicular a R) -->
  <line x1="435" y1="240" x2="405" y2="200" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="388" y="198" font-family="serif" font-size="15" font-style="italic" fill="#1565c0">v</text>

  <!-- Vector aceleración centrípeta (hacia el centro O) -->
  <line x1="435" y1="240" x2="470" y2="298" stroke="#7b1fa2" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="478" y="295" font-family="serif" font-size="13" font-style="italic" fill="#7b1fa2">a_c</text>

  <!-- Indicador de que ω_θ es constante -->
  <path d="M 485 330 A 120 120 0 0 1 510 315" fill="none" stroke="#e65100" stroke-width="1.5"/>
  <text x="518" y="308" font-family="serif" font-size="12" font-style="italic" fill="#e65100">ω_θ = cte</text>

  <!-- Indicador φ = cte -->
  <text x="530" y="355" font-family="serif" font-size="12" font-style="italic" fill="#e65100">φ = φ₀ = cte</text>

  <!-- Ecuaciones del meridiano -->
  <rect x="340" y="480" width="290" height="75" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="485" y="498" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1565c0" text-anchor="middle">Ecuaciones del movimiento:</text>
  <text x="365" y="518" font-family="serif" font-size="13" fill="#333">r(t) = R</text>
  <text x="365" y="538" font-family="serif" font-size="13" fill="#333">θ(t) = θ₀ + ω_θ · t</text>
  <text x="365" y="558" font-family="serif" font-size="13" fill="#333">φ(t) = φ₀</text>

</svg>