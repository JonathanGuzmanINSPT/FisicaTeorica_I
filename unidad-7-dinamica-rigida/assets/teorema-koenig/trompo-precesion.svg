<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <!-- Fondo -->
  <rect width="500" height="400" fill="#fafafa"/>
  
  <!-- Título -->
  <text x="250" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
    Ejemplo: Trompo en Precesión
  </text>
  
  <!-- Trompo -->
  <g transform="translate(250, 220)">
    <!-- Eje vertical (precesión) -->
    <line x1="0" y1="-150" x2="0" y2="150" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="-15" y="-140" font-size="11" fill="#333">eje z</text>
    
    <!-- Punto de apoyo (origen O) -->
    <circle cx="0" cy="100" r="6" fill="#333"/>
    <text x="10" y="115" font-size="12" font-weight="bold" fill="#333">O</text>
    
    <!-- Vector r_CM -->
    <line x1="0" y1="100" x2="-40" y2="40" stroke="#7b1fa2" stroke-width="2"/>
    <polygon points="-40,40 -34,38 -36,46" fill="#7b1fa2"/>
    <text x="-55" y="55" font-size="11" font-weight="bold" fill="#7b1fa2">r_CM</text>
    
    <!-- Trompo (cono) -->
    <polygon points="0,100 -60,-30 60,-30" fill="#e1bee7" stroke="#7b1fa2" stroke-width="2" opacity="0.7"/>
    
    <!-- Eje del trompo (inclinado) -->
    <line x1="-40" y1="40" x2="-40" y2="-50" stroke="#9b59b6" stroke-width="3"/>
    
    <!-- CM -->
    <circle cx="-40" cy="40" r="5" fill="#c62828"/>
    <text x="-55" y="30" font-size="11" font-weight="bold" fill="#c62828">CM</text>
    
    <!-- Velocidad angular de spin (alrededor del eje del trompo) -->
    <path d="M -45,20 A 8,8 0 0,1 -35,20" fill="none" stroke="#7b1fa2" stroke-width="2"/>
    <text x="-25" y="15" font-size="11" font-weight="bold" fill="#7b1fa2">ω_spin</text>
    
    <!-- Velocidad angular de precesión (alrededor del eje z) -->
    <path d="M 20,100 A 25,25 0 0,0 25,75" fill="none" stroke="#1565c0" stroke-width="2"/>
    <text x="35" y="90" font-size="11" font-weight="bold" fill="#1565c0">Ω_prec</text>
    
    <!-- Vector L_spin -->
    <line x1="-40" y1="40" x2="-40" y2="-30" stroke="#9b59b6" stroke-width="2.5"/>
    <polygon points="-40,-30 -45,-22 -35,-22" fill="#9b59b6"/>
    <text x="-65" y="-10" font-size="11" font-weight="bold" fill="#9b59b6">L_spin</text>
  </g>
  
  <!-- Fórmula destacada -->
  <rect x="50" y="340" width="400" height="50" fill="#fff9c4" stroke="#f57f17" stroke-width="2" rx="10"/>
  <text x="250" y="365" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">
    L⃗ = M·Ω·d² + I_CM·ω⃗_spin
  </text>
  <text x="250" y="383" font-size="11" text-anchor="middle" fill="#666">
    (orbital + spin)
  </text>
</svg>
