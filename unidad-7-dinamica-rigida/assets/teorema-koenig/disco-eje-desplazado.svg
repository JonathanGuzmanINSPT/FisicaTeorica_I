<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <!-- Fondo -->
  <rect width="500" height="350" fill="#fafafa"/>
  
  <!-- Título -->
  <text x="250" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
    Ejemplo 2: Disco - Eje en el borde vs CM
  </text>
  
  <!-- Disco -->
  <g transform="translate(250, 170)">
    <!-- Disco -->
    <circle cx="0" cy="0" r="80" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    
    <!-- Centro de masa (en el centro del disco) -->
    <circle cx="0" cy="0" r="6" fill="#c62828"/>
    <text x="0" y="-90" font-size="11" font-weight="bold" text-anchor="middle" fill="#c62828">CM</text>
    
    <!-- Eje baricéntrico (en el centro) -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="#c62828" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="0" y="100" font-size="11" text-anchor="middle" fill="#c62828">eje CM (⊗)</text>
    
    <!-- Eje en el borde (a la derecha) -->
    <g transform="translate(80, 0)">
      <circle cx="0" cy="0" r="6" fill="#2e7d32"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="#2e7d32" stroke-width="2" stroke-dasharray="3,2"/>
      <text x="0" y="40" font-size="11" text-anchor="middle" fill="#2e7d32">eje A (borde)</text>
    </g>
    
    <!-- Radio R -->
    <line x1="0" y1="-110" x2="80" y2="-110" stroke="#7b1fa2" stroke-width="2"/>
    <line x1="0" y1="-115" x2="0" y2="-105" stroke="#7b1fa2" stroke-width="2"/>
    <line x1="80" y1="-115" x2="80" y2="-105" stroke="#7b1fa2" stroke-width="2"/>
    <text x="40" y="-118" font-size="13" font-weight="bold" text-anchor="middle" fill="#7b1fa2">d = R</text>
    
    <!-- Radio del disco -->
    <line x1="0" y1="0" x2="80" y2="0" stroke="#1565c0" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="40" y="-5" font-size="10" text-anchor="middle" fill="#1565c0">R</text>
  </g>
  
  <!-- Cálculos -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="400" height="40" fill="#fff9c4" opacity="0.5" rx="10"/>
    
    <text x="20" y="25" font-size="13" fill="#1565c0">
      <tspan font-weight="bold">Resultado:</tspan> I_A = (1/2)MR² + MR² = (3/2)MR²
    </text>
  </g>
</svg>
