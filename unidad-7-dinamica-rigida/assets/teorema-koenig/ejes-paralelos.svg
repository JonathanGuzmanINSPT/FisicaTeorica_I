<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <!-- Fondo -->
  <rect width="500" height="350" fill="#fafafa"/>
  
  <!-- Título -->
  <text x="250" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
    Teorema de los Ejes Paralelos (König)
  </text>
  
  <!-- Cuerpo rígido (barra inclinada) -->
  <g transform="translate(250, 180)">
    <!-- Barra -->
    <rect x="-150" y="-15" width="300" height="30" 
          fill="#e3f2fd" stroke="#1565c0" stroke-width="2" rx="5"/>
    
    <!-- Centro de masa CM -->
    <circle cx="0" cy="0" r="6" fill="#c62828"/>
    <text x="0" y="-25" font-size="12" font-weight="bold" text-anchor="middle" fill="#c62828">CM</text>
    
    <!-- Eje baricéntrico (perpendicular al papel) -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="#c62828" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="0" y="50" font-size="12" text-anchor="middle" fill="#c62828">eje CM (⊗)</text>
    
    <!-- Eje paralelo (a la derecha) -->
    <g transform="translate(100, 0)">
      <circle cx="0" cy="0" r="6" fill="#2e7d32"/>
      <circle cx="0" cy="0" r="18" fill="none" stroke="#2e7d32" stroke-width="2" stroke-dasharray="3,2"/>
      <text x="0" y="50" font-size="12" text-anchor="middle" fill="#2e7d32">eje O (⊗)</text>
    </g>
    
    <!-- Distancia d entre ejes -->
    <line x1="0" y1="-50" x2="100" y2="-50" stroke="#7b1fa2" stroke-width="2"/>
    <line x1="0" y1="-55" x2="0" y2="-45" stroke="#7b1fa2" stroke-width="2"/>
    <line x1="100" y1="-55" x2="100" y2="-45" stroke="#7b1fa2" stroke-width="2"/>
    <text x="50" y="-58" font-size="14" font-weight="bold" text-anchor="middle" fill="#7b1fa2">d</text>
  </g>
  
  <!-- Fórmula destacada -->
  <rect x="100" y="280" width="300" height="50" fill="#fff9c4" stroke="#f57f17" stroke-width="2" rx="10"/>
  <text x="250" y="305" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
    I = I_CM + M·d²
  </text>
  <text x="250" y="322" font-size="11" text-anchor="middle" fill="#666">
    I: momento respecto al eje O &nbsp;|&nbsp; I_CM: momento baricéntrico
  </text>
</svg>
