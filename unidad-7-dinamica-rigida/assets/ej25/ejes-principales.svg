<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 450" width="450" height="450">
  <!-- Fondo -->
  <rect width="450" height="450" fill="#fafafa"/>

  <!-- Cuadrado rotado 45° para mostrar ejes principales -->
  <g transform="translate(225, 225) rotate(45)">
    <rect x="-120" y="-120" width="240" height="240"
          fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
  </g>

  <!-- Eje principal 1 (diagonal a 45°, momento MÍNIMO I₁) -->
  <line x1="105" y1="105" x2="345" y2="345" stroke="#c62828" stroke-width="3"/>
  <polygon points="345,345 335,340 340,335" fill="#c62828"/>
  <text x="350" y="350" font-size="16" font-weight="bold" fill="#c62828">eje 1</text>
  <text x="355" y="370" font-size="12" fill="#c62828">I₁ = Ma²/12</text>

  <!-- Eje principal 2 (diagonal a -45°, momento MÁXIMO I₂) -->
  <line x1="105" y1="345" x2="345" y2="105" stroke="#2e7d32" stroke-width="3"/>
  <polygon points="345,105 340,115 335,110" fill="#2e7d32"/>
  <text x="350" y="100" font-size="16" font-weight="bold" fill="#2e7d32">eje 2</text>
  <text x="355" y="80" font-size="12" fill="#2e7d32">I₂ = 7Ma²/12</text>

  <!-- Eje principal 3 (perpendicular, sale de la pantalla) -->
  <circle cx="225" cy="225" r="8" fill="#7b1fa2"/>
  <circle cx="225" cy="225" r="15" fill="none" stroke="#7b1fa2" stroke-width="2"/>
  <circle cx="225" cy="225" r="22" fill="none" stroke="#7b1fa2" stroke-width="1" opacity="0.5"/>
  <text x="245" y="230" font-size="16" font-weight="bold" fill="#7b1fa2">eje 3 (⊗)</text>
  <text x="245" y="248" font-size="12" fill="#7b1fa2">I₃ = 2Ma²/3</text>

  <!-- Centro de masa -->
  <circle cx="225" cy="225" r="4" fill="#333"/>
  <text x="235" y="222" font-size="11" fill="#333">CM</text>

  <!-- Ejes x, y originales (referencia, más finos) -->
  <g opacity="0.4" stroke-dasharray="5,3">
    <line x1="105" y1="225" x2="345" y2="225" stroke="#666" stroke-width="1"/>
    <line x1="225" y1="105" x2="225" y2="345" stroke="#666" stroke-width="1"/>
  </g>
  <text x="350" y="230" font-size="11" fill="#666" font-style="italic">x</text>
  <text x="215" y="100" font-size="11" fill="#666" font-style="italic">y</text>

  <!-- Leyenda -->
  <g transform="translate(20, 400)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#c62828" stroke-width="3"/>
    <text x="25" y="4" font-size="11" fill="#333">Eje 1: diagonal (I mín)</text>
    <line x1="200" y1="0" x2="220" y2="0" stroke="#2e7d32" stroke-width="3"/>
    <text x="225" y="4" font-size="11" fill="#333">Eje 2: ⊥ diagonal (I máx)</text>
  </g>

  <!-- Título -->
  <text x="225" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Ejes Principales de Inercia</text>
  <text x="225" y="50" font-size="12" text-anchor="middle" fill="#666">Rotados 45° respecto a ejes x, y originales</text>
</svg>
