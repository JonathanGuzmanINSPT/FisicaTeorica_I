<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Fondo -->
  <rect width="400" height="400" fill="#fafafa"/>

  <!-- Cuadrado (chapón) -->
  <rect x="80" y="80" width="240" height="240"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>

  <!-- Patrón de masa (puntos) -->
  <g fill="#1565c0" opacity="0.4">
    <circle cx="100" cy="100" r="2"/><circle cx="140" cy="100" r="2"/><circle cx="180" cy="100" r="2"/><circle cx="220" cy="100" r="2"/><circle cx="260" cy="100" r="2"/><circle cx="300" cy="100" r="2"/>
    <circle cx="100" cy="140" r="2"/><circle cx="140" cy="140" r="2"/><circle cx="180" cy="140" r="2"/><circle cx="220" cy="140" r="2"/><circle cx="260" cy="140" r="2"/><circle cx="300" cy="140" r="2"/>
    <circle cx="100" cy="180" r="2"/><circle cx="140" cy="180" r="2"/><circle cx="180" cy="180" r="2"/><circle cx="220" cy="180" r="2"/><circle cx="260" cy="180" r="2"/><circle cx="300" cy="180" r="2"/>
    <circle cx="100" cy="220" r="2"/><circle cx="140" cy="220" r="2"/><circle cx="180" cy="220" r="2"/><circle cx="220" cy="220" r="2"/><circle cx="260" cy="220" r="2"/><circle cx="300" cy="220" r="2"/>
    <circle cx="100" cy="260" r="2"/><circle cx="140" cy="260" r="2"/><circle cx="180" cy="260" r="2"/><circle cx="220" cy="260" r="2"/><circle cx="260" cy="260" r="2"/><circle cx="300" cy="260" r="2"/>
    <circle cx="100" cy="300" r="2"/><circle cx="140" cy="300" r="2"/><circle cx="180" cy="300" r="2"/><circle cx="220" cy="300" r="2"/><circle cx="260" cy="300" r="2"/><circle cx="300" cy="300" r="2"/>
  </g>

  <!-- Vértices etiquetados -->
  <circle cx="80" cy="80" r="5" fill="#c62828"/>
  <text x="30" y="75" font-size="14" font-weight="bold" fill="#c62828">(0,0)</text>

  <circle cx="320" cy="80" r="5" fill="#c62828"/>
  <text x="325" y="75" font-size="14" font-weight="bold" fill="#c62828">(a,0)</text>

  <circle cx="80" cy="320" r="5" fill="#c62828"/>
  <text x="20" y="345" font-size="14" font-weight="bold" fill="#c62828">(0,a)</text>

  <circle cx="320" cy="320" r="5" fill="#c62828"/>
  <text x="325" y="345" font-size="14" font-weight="bold" fill="#c62828">(a,a)</text>

  <!-- Eje x -->
  <line x1="80" y1="80" x2="370" y2="80" stroke="#2e7d32" stroke-width="2"/>
  <polygon points="370,80 360,75 360,85" fill="#2e7d32"/>
  <text x="375" y="85" font-size="16" font-weight="bold" fill="#2e7d32">x</text>

  <!-- Eje y -->
  <line x1="80" y1="80" x2="80" y2="370" stroke="#2e7d32" stroke-width="2"/>
  <polygon points="80,370 75,360 85,360" fill="#2e7d32"/>
  <text x="65" y="385" font-size="16" font-weight="bold" fill="#2e7d32">y</text>

  <!-- Etiqueta del lado -->
  <text x="200" y="70" font-size="14" text-anchor="middle" fill="#1565c0" font-style="italic">lado = a</text>
  <text x="55" y="200" font-size="14" text-anchor="middle" fill="#1565c0" font-style="italic" transform="rotate(-90, 55, 200)">lado = a</text>

  <!-- Título -->
  <text x="200" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">Chapón cuadrado en el plano xy</text>
  <text x="200" y="50" font-size="12" text-anchor="middle" fill="#666">Densidad superficial: σ = M/a²</text>
</svg>
