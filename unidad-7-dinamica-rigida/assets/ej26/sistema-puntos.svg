<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <!-- Fondo -->
  <rect width="500" height="400" fill="#fafafa"/>
  
  <!-- Ejes coordenados (perspectiva isométrica simplificada) -->
  <g transform="translate(100, 300)">
    <!-- Eje x (hacia la derecha) -->
    <line x1="0" y1="0" x2="200" y2="-60" stroke="#e74c3c" stroke-width="2"/>
    <polygon points="200,-60 190,-55 195,-65" fill="#e74c3c"/>
    <text x="210" y="-55" font-size="14" font-weight="bold" fill="#e74c3c">x</text>
    
    <!-- Eje y (hacia arriba) -->
    <line x1="0" y1="0" x2="0" y2="-200" stroke="#2ecc71" stroke-width="2"/>
    <polygon points="0,-200 -5,-190 5,-190" fill="#2ecc71"/>
    <text x="-15" y="-205" font-size="14" font-weight="bold" fill="#2ecc71">y</text>
    
    <!-- Eje z (hacia la izquierda) -->
    <line x1="0" y1="0" x2="-150" y2="50" stroke="#3498db" stroke-width="2"/>
    <polygon points="-150,50 -140,45 -145,55" fill="#3498db"/>
    <text x="-165" y="55" font-size="14" font-weight="bold" fill="#3498db">z</text>
    
    <!-- Punto 1: masa 2 en (1, -1, 1) -->
    <g transform="translate(100, -30)">
      <circle cx="0" cy="0" r="8" fill="#e74c3c" opacity="0.8"/>
      <text x="15" y="5" font-size="12" fill="#333">m₁=2</text>
      <text x="15" y="20" font-size="11" fill="#666">(1, -1, 1)</text>
    </g>
    
    <!-- Punto 2: masa 1 en (2, 0, 2) -->
    <g transform="translate(200, -60)">
      <circle cx="0" cy="0" r="6" fill="#2ecc71" opacity="0.8"/>
      <text x="15" y="5" font-size="12" fill="#333">m₂=1</text>
      <text x="15" y="20" font-size="11" fill="#666">(2, 0, 2)</text>
    </g>
    
    <!-- Punto 3: masa 4 en (-1, 1, 0) -->
    <g transform="translate(-50, 150)">
      <circle cx="0" cy="0" r="12" fill="#3498db" opacity="0.8"/>
      <text x="15" y="5" font-size="12" fill="#333">m₃=4</text>
      <text x="15" y="20" font-size="11" fill="#666">(-1, 1, 0)</text>
    </g>
    
    <!-- Origen -->
    <circle cx="0" cy="0" r="3" fill="#333"/>
    <text x="10" y="15" font-size="11" fill="#333">O (0,0,0)</text>
  </g>
  
  <!-- Título -->
  <text x="250" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
    Sistema de 3 puntos materiales
  </text>
  <text x="250" y="50" font-size="12" text-anchor="middle" fill="#666">
    Tensor de inercia respecto al origen O
  </text>
</svg>
