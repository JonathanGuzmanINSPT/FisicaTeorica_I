<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <!-- Fondo -->
  <rect width="500" height="350" fill="#fafafa"/>
  
  <!-- Relación L = I · Ω -->
  <g transform="translate(50, 80)">
    <text x="200" y="-20" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
      Relación fundamental
    </text>
    
    <!-- Vector Ω -->
    <rect x="50" y="0" width="100" height="60" fill="#3498db" opacity="0.3" rx="5"/>
    <text x="100" y="25" font-size="14" text-anchor="middle" fill="#333">Ω</text>
    <text x="100" y="45" font-size="11" text-anchor="middle" fill="#666">(3, -2, 4)</text>
    
    <!-- Matriz I -->
    <rect x="200" y="0" width="100" height="60" fill="#9b59b6" opacity="0.3" rx="5"/>
    <text x="250" y="25" font-size="14" text-anchor="middle" fill="#333">I</text>
    <text x="250" y="45" font-size="11" text-anchor="middle" fill="#666">3×3</text>
    
    <!-- Signo de multiplicación -->
    <text x="170" y="35" font-size="20" font-weight="bold" fill="#333">×</text>
    
    <!-- Flecha hacia abajo -->
    <line x1="250" y1="70" x2="250" y2="100" stroke="#333" stroke-width="2"/>
    <polygon points="250,100 245,90 255,90" fill="#333"/>
    
    <!-- Vector L resultante -->
    <rect x="150" y="110" width="200" height="60" fill="#e74c3c" opacity="0.3" rx="5"/>
    <text x="250" y="135" font-size="14" text-anchor="middle" fill="#333">L₀ = I · Ω</text>
    <text x="250" y="155" font-size="11" text-anchor="middle" fill="#666">(0, -6, 42)</text>
  </g>
  
  <!-- Explicación -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="400" height="100" fill="#fff9c4" opacity="0.5" rx="10"/>
    <text x="20" y="25" font-size="13" fill="#333">
      <tspan font-weight="bold">¿Son colineales L₀ y Ω?</tspan>
    </text>
    <text x="20" y="50" font-size="12" fill="#333">
      No, porque L₀ = (0, -6, 42) y Ω = (3, -2, 4)
    </text>
    <text x="20" y="70" font-size="12" fill="#333">
      No existe un escalar k tal que L₀ = k·Ω
    </text>
    <text x="20" y="90" font-size="12" fill="#e74c3c">
      En ejes principales SÍ serían colineales.
    </text>
  </g>
  
  <!-- Título -->
  <text x="250" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
    Cálculo del Momento Angular
  </text>
</svg>
