<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <!-- Fondo -->
  <rect width="500" height="400" fill="#fafafa"/>
  
  <!-- Explicación de ejes principales -->
  <g transform="translate(50, 50)">
    <text x="200" y="-10" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
      Ejes Principales de Inercia
    </text>
    
    <!-- Matriz original (no diagonal) -->
    <g transform="translate(0, 20)">
      <text x="0" y="0" font-size="13" fill="#333">Matriz original (tiene elementos fuera de la diagonal):</text>
      <rect x="0" y="10" width="200" height="80" fill="#fff9c4" opacity="0.5" rx="5"/>
      <text x="100" y="35" font-size="11" text-anchor="middle" fill="#333">┌                ┐</text>
      <text x="100" y="50" font-size="11" text-anchor="middle" fill="#333">│ 12  -6   6 │</text>
      <text x="100" y="65" font-size="11" text-anchor="middle" fill="#333">│ -6  16   2 │</text>
      <text x="100" y="80" font-size="11" text-anchor="middle" fill="#333">│  6   2  16 │</text>
      <text x="100" y="95" font-size="11" text-anchor="middle" fill="#333">└                ┘</text>
    </g>
    
    <!-- Flecha de diagonalización -->
    <g transform="translate(220, 60)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#9b59b6" stroke-width="2"/>
      <polygon points="50,0 40,-5 40,5" fill="#9b59b6"/>
      <text x="10" y="-10" font-size="11" fill="#9b59b6">Diagonalizar</text>
    </g>
    
    <!-- Matriz diagonalizada -->
    <g transform="translate(280, 20)">
      <text x="100" y="0" font-size="13" fill="#333">Matriz diagonal (ejes principales):</text>
      <rect x="0" y="10" width="200" height="80" fill="#e8f5e9" opacity="0.5" rx="5"/>
      <text x="100" y="35" font-size="11" text-anchor="middle" fill="#333">┌                ┐</text>
      <text x="100" y="50" font-size="11" text-anchor="middle" fill="#2ecc71">│ I₁  0   0 │</text>
      <text x="100" y="65" font-size="11" text-anchor="middle" fill="#2ecc71">│  0  I₂   0 │</text>
      <text x="100" y="80" font-size="11" text-anchor="middle" fill="#2ecc71">│  0   0  I₃ │</text>
      <text x="100" y="95" font-size="11" text-anchor="middle" fill="#333">└                ┘</text>
    </g>
  </g>
  
  <!-- Momentos principales -->
  <g transform="translate(50, 180)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#333">Momentos principales (autovalores):</text>
    
    <rect x="0" y="10" width="400" height="80" fill="#e3f2fd" opacity="0.5" rx="5"/>
    <text x="20" y="35" font-size="12" fill="#333">
      <tspan font-weight="bold">I₁ = 18</tspan> (momento máximo)
    </text>
    <text x="20" y="55" font-size="12" fill="#333">
      <tspan font-weight="bold">I₂ = 13 - √73 ≈ 4.46</tspan> (momento intermedio)
    </text>
    <text x="20" y="75" font-size="12" fill="#333">
      <tspan font-weight="bold">I₃ = 13 + √73 ≈ 21.54</tspan> (momento mínimo)
    </text>
  </g>
  
  <!-- Direcciones de ejes principales -->
  <g transform="translate(50, 290)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#333">Direcciones (autovectores):</text>
    
    <rect x="0" y="10" width="400" height="80" fill="#fce4ec" opacity="0.5" rx="5"/>
    <text x="20" y="35" font-size="11" fill="#333">
      v₁ = (0, 1, 1)  (dirección del eje con I₁)
    </text>
    <text x="20" y="55" font-size="11" fill="#333">
      v₂ = (-12/(1-√73), 1, -1)  (dirección del eje con I₂)
    </text>
    <text x="20" y="75" font-size="11" fill="#333">
      v₃ = (-12/(1+√73), 1, -1)  (dirección del eje con I₃)
    </text>
  </g>
  
  <!-- Título -->
  <text x="250" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
    Diagonalización del Tensor de Inercia
  </text>
</svg>
