<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <!-- Fondo -->
  <rect width="500" height="350" fill="#fafafa"/>
  
  <!-- Título -->
  <text x="250" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
    Evolución temporal hasta la rodadura pura
  </text>
  
  <!-- Eje temporal -->
  <line x1="80" y1="200" x2="450" y2="200" stroke="#333" stroke-width="2"/>
  <polygon points="450,200 442,195 442,205" fill="#333"/>
  <text x="455" y="205" font-size="12" font-weight="bold" fill="#333">t</text>
  
  <!-- Marcas de tiempo -->
  <line x1="80" y1="195" x2="80" y2="205" stroke="#333" stroke-width="2"/>
  <text x="75" y="220" font-size="11" fill="#666">t=0</text>
  
  <line x1="240" y1="195" x2="240" y2="205" stroke="#333" stroke-width="2"/>
  <text x="220" y="220" font-size="11" fill="#666">t=t₁</text>
  <text x="195" y="240" font-size="11" font-weight="bold" fill="#9b59b6">rodadura</text>
  
  <line x1="450" y1="195" x2="450" y2="205" stroke="#333" stroke-width="2"/>
  
  <!-- Curva v_CM (lineal creciente) -->
  <line x1="80" y1="180" x2="240" y2="100" stroke="#2e7d32" stroke-width="2.5"/>
  <circle cx="80" cy="180" r="4" fill="#2e7d32"/>
  <circle cx="240" cy="100" r="4" fill="#2e7d32"/>
  <text x="50" y="185" font-size="13" font-weight="bold" fill="#2e7d32">v_CM</text>
  <text x="50" y="200" font-size="10" fill="#666">v_CM = a_CM·t</text>
  
  <!-- Curva omega R (lineal creciente, llega al mismo punto) -->
  <line x1="80" y1="180" x2="240" y2="100" stroke="#7b1fa2" stroke-width="2.5" stroke-dasharray="5,3"/>
  <circle cx="80" cy="180" r="4" fill="#7b1fa2"/>
  <text x="50" y="160" font-size="13" font-weight="bold" fill="#7b1fa2">ω·R</text>
  <text x="40" y="145" font-size="10" fill="#666">(lineal también)</text>
  
  <!-- Curva omega (decreciente) -->
  <line x1="80" y1="100" x2="240" y2="100" stroke="#e74c3c" stroke-width="2.5" stroke-dasharray="3,2"/>
  <circle cx="80" cy="100" r="4" fill="#e74c3c"/>
  <circle cx="240" cy="100" r="4" fill="#e74c3c"/>
  <text x="260" y="105" font-size="13" font-weight="bold" fill="#e74c3c">ω(t)</text>
  <text x="260" y="120" font-size="10" fill="#666">disminuye</text>
  
  <!-- Condición de encuentro -->
  <line x1="240" y1="100" x2="240" y2="200" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <circle cx="240" cy="100" r="8" fill="none" stroke="#333" stroke-width="2"/>
  <text x="255" y="95" font-size="12" font-weight="bold" fill="#333">v_CM = ω·R</text>
  
  <!-- Texto inferior -->
  <rect x="80" y="260" width="370" height="70" fill="#fff9c4" stroke="#f57f17" stroke-width="2" rx="5"/>
  <text x="265" y="285" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">
    Condición de rodadura sin deslizamiento:
  </text>
  <text x="265" y="310" font-size="13" text-anchor="middle" fill="#c62828">
    v_CM(t₁) = ω(t₁)·R
  </text>
</svg>
