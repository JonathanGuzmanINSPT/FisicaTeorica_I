<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <!-- Fondo -->
  <rect width="500" height="350" fill="#fafafa"/>
  
  <!-- Título -->
  <text x="250" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
    Situación Inicial: Disco girando en el aire
  </text>
  
  <!-- Superficie horizontal -->
  <line x1="50" y1="250" x2="450" y2="250" stroke="#333" stroke-width="3"/>
  <text x="450" y="270" font-size="12" fill="#666">superficie con rozamiento</text>
  
  <!-- Patrón de rozamiento -->
  <g stroke="#999" stroke-width="1">
    <line x1="60" y1="260" x2="70" y2="250"/>
    <line x1="90" y1="260" x2="100" y2="250"/>
    <line x1="120" y1="260" x2="130" y2="250"/>
    <line x1="150" y1="260" x2="160" y2="250"/>
    <line x1="180" y1="260" x2="190" y2="250"/>
    <line x1="210" y1="260" x2="220" y2="250"/>
    <line x1="240" y1="260" x2="250" y2="250"/>
    <line x1="270" y1="260" x2="280" y2="250"/>
    <line x1="300" y1="260" x2="310" y2="250"/>
    <line x1="330" y1="260" x2="340" y2="250"/>
    <line x1="360" y1="260" x2="370" y2="250"/>
    <line x1="390" y1="260" x2="400" y2="250"/>
    <line x1="420" y1="260" x2="430" y2="250"/>
  </g>
  
  <!-- Disco (en el aire, antes de tocar la superficie) -->
  <g transform="translate(250, 130)">
    <circle cx="0" cy="0" r="60" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
    <circle cx="0" cy="0" r="5" fill="#c62828"/>
    <text x="0" y="-75" font-size="12" font-weight="bold" text-anchor="middle" fill="#c62828">CM</text>
    
    <!-- Vector velocidad angular inicial -->
    <path d="M -45,-30 A 50,50 0 1,1 45,-30" fill="none" stroke="#7b1fa2" stroke-width="2.5"/>
    <polygon points="45,-30 38,-38 35,-28" fill="#7b1fa2"/>
    <text x="0" y="-90" font-size="14" font-weight="bold" text-anchor="middle" fill="#7b1fa2">ω₀ = 6 s⁻¹</text>
  </g>
  
  <!-- Flecha "se pone en contacto" -->
  <line x1="250" y1="195" x2="250" y2="225" stroke="#333" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="250,225 245,217 255,217" fill="#333"/>
  <text x="265" y="215" font-size="11" fill="#666">toca la superficie</text>
  
  <!-- Texto descriptivo -->
  <text x="250" y="310" font-size="12" text-anchor="middle" fill="#333">
    v₀(CM) = 0 &nbsp;|&nbsp; ω₀ ≠ 0 &nbsp;|&nbsp; Hay deslizamiento
  </text>
</svg>
