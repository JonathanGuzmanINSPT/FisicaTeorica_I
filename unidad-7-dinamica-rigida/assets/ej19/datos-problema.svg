<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <!-- Fondo -->
  <rect width="500" height="350" fill="#fafafa"/>
  
  <!-- Título -->
  <text x="250" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
    Resumen de Datos del Problema
  </text>
  
  <!-- Caja de datos -->
  <rect x="40" y="60" width="420" height="270" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" rx="10"/>
  
  <!-- Datos del disco -->
  <g transform="translate(60, 85)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#1565c0">📋 Datos:</text>
    
    <text x="20" y="25" font-size="13" fill="#333">• Masa del disco: m = 5 kg</text>
    <text x="20" y="50" font-size="13" fill="#333">• Radio: R = 50 cm = 0,5 m</text>
    <text x="20" y="75" font-size="13" fill="#333">• Velocidad angular inicial: ω₀ = 6 s⁻¹</text>
    <text x="20" y="100" font-size="13" fill="#333">• Velocidad inicial del CM: v₀ = 0 (parte a, b, c)</text>
    <text x="20" y="125" font-size="13" fill="#333">• Coeficiente de roce cinético: μc = 0,2</text>
    <text x="20" y="150" font-size="13" fill="#333">• g = 10 m/s² (asumido)</text>
  </g>
  
  <!-- Separador -->
  <line x1="60" y1="250" x2="440" y2="250" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Fórmulas útiles -->
  <g transform="translate(60, 270)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#7b1fa2">📐 Fórmulas:</text>
    <text x="20" y="20" font-size="12" fill="#333">I_CM = ½mR² (disco sólido)</text>
    <text x="20" y="40" font-size="12" fill="#333">f = μc·N = μc·m·g</text>
  </g>
</svg>
