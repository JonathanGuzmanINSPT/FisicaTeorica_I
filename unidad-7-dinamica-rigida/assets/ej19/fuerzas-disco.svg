<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <!-- Fondo -->
  <rect width="500" height="350" fill="#fafafa"/>
  
  <!-- Título -->
  <text x="250" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">
    Diagrama de Cuerpo Libre (DCL) del Disco
  </text>
  
  <!-- Superficie -->
  <line x1="50" y1="280" x2="450" y2="280" stroke="#333" stroke-width="3"/>
  <g stroke="#999" stroke-width="1">
    <line x1="60" y1="290" x2="70" y2="280"/>
    <line x1="100" y1="290" x2="110" y2="280"/>
    <line x1="140" y1="290" x2="150" y2="280"/>
    <line x1="180" y1="290" x2="190" y2="280"/>
    <line x1="220" y1="290" x2="230" y2="280"/>
    <line x1="260" y1="290" x2="270" y2="280"/>
    <line x1="300" y1="290" x2="310" y2="280"/>
    <line x1="340" y1="290" x2="350" y2="280"/>
    <line x1="380" y1="290" x2="390" y2="280"/>
    <line x1="420" y1="290" x2="430" y2="280"/>
  </g>
  
  <!-- Disco -->
  <g transform="translate(250, 200)">
    <circle cx="0" cy="0" r="60" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
    <circle cx="0" cy="0" r="5" fill="#c62828"/>
    <text x="0" y="-75" font-size="12" font-weight="bold" text-anchor="middle" fill="#c62828">CM</text>
  </g>
  
  <!-- Peso (hacia abajo desde CM) -->
  <line x1="250" y1="200" x2="250" y2="245" stroke="#2e7d32" stroke-width="2.5"/>
  <polygon points="250,245 245,237 255,237" fill="#2e7d32"/>
  <text x="260" y="225" font-size="14" font-weight="bold" fill="#2e7d32">mg</text>
  
  <!-- Normal (hacia arriba desde contacto) -->
  <line x1="250" y1="260" x2="250" y2="220" stroke="#e74c3c" stroke-width="2.5"/>
  <polygon points="250,220 245,228 255,228" fill="#e74c3c"/>
  <text x="195" y="245" font-size="14" font-weight="bold" fill="#e74c3c">N = mg</text>
  
  <!-- Fuerza de rozamiento (horizontal) -->
  <line x1="190" y1="260" x2="140" y2="260" stroke="#9b59b6" stroke-width="2.5"/>
  <polygon points="140,260 148,255 148,265" fill="#9b59b6"/>
  <text x="100" y="265" font-size="13" font-weight="bold" fill="#9b59b6">f</text>
  <text x="100" y="280" font-size="10" fill="#9b59b6">rozamiento</text>
  
  <!-- Vector aceleración CM -->
  <line x1="250" y1="170" x2="220" y2="170" stroke="#e67e22" stroke-width="2" stroke-dasharray="3,2"/>
  <polygon points="220,170 228,165 228,175" fill="#e67e22"/>
  <text x="180" y="165" font-size="12" font-weight="bold" fill="#e67e22">a_CM</text>
  
  <!-- Vector aceleración angular -->
  <path d="M 310,180 A 30,30 0 0,0 310,220" fill="none" stroke="#1565c0" stroke-width="2" stroke-dasharray="3,2"/>
  <polygon points="310,220 305,213 315,215" fill="#1565c0"/>
  <text x="325" y="205" font-size="12" font-weight="bold" fill="#1565c0">α</text>
</svg>
