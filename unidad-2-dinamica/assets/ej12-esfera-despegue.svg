<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0c5460">Ejercicio 12 — Despegue de partícula sobre esfera lisa</text>

  <!-- Centro de la esfera -->
  <circle cx="350" cy="380" r="2.5" fill="#000"/>
  <text x="350" y="370" text-anchor="middle" font-size="11" font-style="italic" fill="#666">O (centro)</text>

  <!-- Esfera (arco) -->
  <path d="M 150 380 A 200 200 0 0 1 550 380" fill="#e3f2fd" fill-opacity="0.4" stroke="#0d47a1" stroke-width="2.5"/>
  <path d="M 150 380 A 200 200 0 0 0 550 380" fill="none" stroke="#0d47a1" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Radio b (vertical desde el centro a la cima) -->
  <line x1="350" y1="380" x2="350" y2="180" stroke="#888" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="358" y="280" font-size="14" font-style="italic" font-weight="600" fill="#666">b</text>

  <!-- Punto de partida (cúspide, theta=0) -->
  <circle cx="350" cy="180" r="9" fill="#bbdefb" stroke="#0d47a1" stroke-width="2"/>
  <text x="375" y="178" font-size="11" font-weight="600" fill="#0d47a1">inicio (θ=0)</text>

  <!-- Posición genérica en la esfera (theta arbitrario) -->
  <!-- theta = 48° (despegue canónico): x = b sin(48°) = 0.743·b, y = -b cos(48°) = -0.669·b -->
  <!-- En pixeles (b = 200, centro en (350, 380)): x = 350 + 148.6 = 498.6, y = 380 - 133.8 = 246.2 -->
  <line x1="350" y1="380" x2="499" y2="246" stroke="#888" stroke-width="1.2" stroke-dasharray="3 3"/>
  <circle cx="499" cy="246" r="11" fill="#ffecb3" stroke="#e65100" stroke-width="2.5"/>
  <text x="510" y="240" font-size="11" font-weight="600" fill="#e65100">despegue (θ ≈ 48°)</text>

  <!-- Arco del ángulo theta -->
  <path d="M 350 280 A 100 100 0 0 0 374 264" fill="none" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="365" y="295" font-size="14" font-style="italic" font-weight="700" fill="#7b1fa2">θ</text>

  <!-- En el punto de despegue: vectores -->
  <!-- Peso (vertical hacia abajo) -->
  <line x1="499" y1="258" x2="499" y2="320" stroke="#2e7d32" stroke-width="3" marker-end="url(#arr-green)"/>
  <text x="475" y="295" font-size="13" font-weight="700" fill="#2e7d32">P = m g</text>

  <!-- Componente radial del peso (proyección) -->
  <line x1="499" y1="258" x2="459" y2="282" stroke="#2e7d32" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arr-green)"/>
  <text x="430" y="280" font-size="11" font-style="italic" fill="#2e7d32">mg cos θ</text>

  <!-- Componente tangencial del peso (proyección) -->
  <line x1="499" y1="258" x2="528" y2="218" stroke="#2e7d32" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arr-green)"/>
  <text x="528" y="215" font-size="11" font-style="italic" fill="#2e7d32">mg sin θ</text>

  <!-- Normal N (radial hacia afuera, perpendicular a la superficie) -->
  <line x1="499" y1="246" x2="540" y2="220" stroke="#c62828" stroke-width="3" marker-end="url(#arr-red)"/>
  <text x="546" y="220" font-size="14" font-weight="700" fill="#c62828">N = 0</text>
  <text x="546" y="238" font-size="10" font-style="italic" fill="#c62828">(en despegue)</text>

  <!-- Velocidad tangencial -->
  <line x1="488" y1="246" x2="455" y2="232" stroke="#1565c0" stroke-width="3" marker-end="url(#arr-blue)"/>
  <text x="420" y="230" font-size="13" font-weight="700" fill="#1565c0">v(t)</text>

  <!-- Indicación del centro de la trayectoria circular -->
  <text x="350" y="540" text-anchor="middle" font-size="12" font-style="italic" fill="#555">
    Condición de despegue: $N = 0 \Rightarrow mg\cos\theta = mv²/b \Rightarrow \cos\theta = 2/3$, $\theta \approx 48{,}19°$
  </text>
</svg>
