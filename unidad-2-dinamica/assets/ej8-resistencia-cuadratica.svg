<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e65100"/>
    </marker>
  </defs>

  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0c5460">Ejercicio 8 — Fuerza resistente $F = -k v^2$</text>

  <!-- Eje x -->
  <line x1="60" y1="350" x2="650" y2="350" stroke="#222" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="660" y="355" font-size="14" font-style="italic" fill="#222">x</text>

  <!-- Eje vertical con marcas -->
  <line x1="80" y1="430" x2="80" y2="50" stroke="#222" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="65" y="50" font-size="14" font-style="italic" fill="#222">v</text>

  <!-- Cuerpo en posición inicial -->
  <circle cx="120" cy="350" r="14" fill="#bbdefb" stroke="#0d47a1" stroke-width="2"/>
  <text x="120" y="354" text-anchor="middle" font-size="12" font-weight="700" fill="#0d47a1">m</text>

  <!-- Vector velocidad inicial (hacia la derecha) -->
  <line x1="138" y1="350" x2="200" y2="350" stroke="#1565c0" stroke-width="3" marker-end="url(#arr-blue)"/>
  <text x="170" y="340" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">v₀</text>

  <!-- Vector fuerza resistente (opuesto a v) -->
  <line x1="120" y1="334" x2="80" y2="334" stroke="#e65100" stroke-width="3" marker-end="url(#arr-orange)"/>
  <text x="80" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">F = −k v²</text>

  <!-- Cuerpo en posición avanzada (mostrar la desaceleración) -->
  <circle cx="380" cy="350" r="14" fill="#bbdefb" stroke="#0d47a1" stroke-width="2"/>
  <line x1="398" y1="350" x2="438" y2="350" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <text x="420" y="340" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">v(t) &lt; v₀</text>
  <line x1="380" y1="334" x2="350" y2="334" stroke="#e65100" stroke-width="2.5" marker-end="url(#arr-orange)"/>

  <!-- Curva de v(t) (decae) -->
  <path d="M 120 220 Q 250 230 380 280 Q 480 320 600 345" fill="none" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="600" y="340" font-size="12" font-weight="600" fill="#2e7d32">v(t)</text>

  <!-- Grilla -->
  <line x1="80" y1="220" x2="650" y2="220" stroke="#ddd" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="120" y1="220" x2="120" y2="350" stroke="#ddd" stroke-width="0.5" stroke-dasharray="2 3"/>
  <text x="118" y="218" font-size="10" text-anchor="end" fill="#666">v₀</text>

  <!-- Caption -->
  <text x="350" y="450" text-anchor="middle" font-size="11" font-style="italic" fill="#555">
    DCL: la única fuerza horizontal es la resistencia opuesta al movimiento.
  </text>
</svg>
