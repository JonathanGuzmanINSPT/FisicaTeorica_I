<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" width="700" height="420">
  <rect width="700" height="420" fill="#fafafa"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c62828"/>
    </marker>
    <marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565c0"/>
    </marker>
    <marker id="ar3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2e7d32"/>
    </marker>
  </defs>

  <text x="350" y="28" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">Fuerzas Dependientes de la Velocidad y Fuerza de Lorentz</text>

  <!-- ====== PANEL IZQUIERDO: F(v) partícula con resistencia ====== -->
  <rect x="10" y="42" width="330" height="370" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="175" y="65" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">Partícula en medio resistivo</text>

  <!-- Partícula -->
  <circle cx="175" cy="130" r="20" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="175" y="136" font-family="serif" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">m</text>

  <!-- Velocidad v -->
  <line x1="195" y1="130" x2="250" y2="130" stroke="#1565c0" stroke-width="2.5" marker-end="url(#ar2)"/>
  <text x="260" y="135" font-family="serif" font-size="14" font-style="italic" fill="#1565c0">v</text>

  <!-- Fuerza resistente -->
  <line x1="175" y1="130" x2="130" y2="130" stroke="#c62828" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="80" y="135" font-family="serif" font-size="13" font-style="italic" fill="#c62828">F_res(v)</text>

  <!-- Etiqueta -->
  <text x="175" y="170" font-family="serif" font-size="12" fill="#333" text-anchor="middle">m dv/dt = −F_res(v)</text>

  <!-- Tabla de casos -->
  <rect x="25" y="185" width="300" height="100" rx="5" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="175" y="203" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">Casos de F(v)</text>

  <!-- Caso lineal -->
  <rect x="35" y="212" width="280" height="24" rx="4" fill="#e3f2fd"/>
  <text x="45" y="229" font-family="serif" font-size="12" fill="#1565c0">F = −kv</text>
  <text x="175" y="229" font-family="serif" font-size="12" fill="#555" text-anchor="middle">v(t) = v₀ e^{−(k/m)t}</text>

  <!-- Caso cuadrático -->
  <rect x="35" y="240" width="280" height="24" rx="4" fill="#fff3e0"/>
  <text x="45" y="257" font-family="serif" font-size="12" fill="#e65100">F = −kv²</text>
  <text x="175" y="257" font-family="serif" font-size="12" fill="#555" text-anchor="middle">v(t) = v₀/(1 + kv₀t/m)</text>

  <!-- Caso exponencial -->
  <rect x="35" y="268" width="280" height="24" rx="4" fill="#fce4ec"/>
  <text x="45" y="285" font-family="serif" font-size="12" fill="#c62828">F = −b e^{av}</text>
  <text x="175" y="285" font-family="serif" font-size="11" fill="#555" text-anchor="middle">v(t) = −(1/a) ln(e^{−av₀} − abt/m)</text>

  <!-- Gráfico v vs t -->
  <text x="175" y="320" font-family="sans-serif" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">Velocidad vs tiempo (esquemático)</text>
  <line x1="40" y1="395" x2="290" y2="395" stroke="#333" stroke-width="1.5"/>
  <line x1="40" y1="350" x2="40" y2="395" stroke="#333" stroke-width="1.5"/>
  <text x="30" y="348" font-family="serif" font-size="11" font-style="italic" fill="#333">v</text>
  <text x="295" y="400" font-family="serif" font-size="11" font-style="italic" fill="#333">t</text>

  <!-- Curva decaimiento exponencial -->
  <path d="M 40 365 Q 100 370 150 380 Q 200 388 280 395" fill="none" stroke="#1565c0" stroke-width="2"/>
  <text x="160" y="375" font-family="serif" font-size="9" fill="#1565c0">v₀e^{−kt/m}</text>

  <!-- Curva decaimiento 1/t -->
  <path d="M 60 360 Q 100 370 150 385 Q 200 392 280 395" fill="none" stroke="#c62828" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="70" y="360" font-family="serif" font-size="9" fill="#c62828">v₀/(1+kt/m)</text>

  <!-- ====== PANEL DERECHO: Fuerza de Lorentz ====== -->
  <rect x="350" y="42" width="340" height="200" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="520" y="65" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">Fuerza de Lorentz — Campos E ⟂ B (Ej 11)</text>

  <!-- Ejes -->
  <line x1="420" y1="200" x2="670" y2="200" stroke="#999" stroke-width="1.5"/>
  <text x="675" y="205" font-family="serif" font-size="12" font-style="italic" fill="#666">z</text>
  <line x1="520" y1="120" x2="520" y2="230" stroke="#999" stroke-width="1.5"/>
  <text x="510" y="115" font-family="serif" font-size="12" font-style="italic" fill="#666">x</text>

  <!-- Campo E (vertical, +z) -->
  <line x1="560" y1="80" x2="560" y2="120" stroke="#c62828" stroke-width="2" marker-end="url(#arr)"/>
  <text x="565" y="100" font-family="serif" font-size="14" font-weight="bold" fill="#c62828">E</text>

  <!-- Campo B (saliendo, dirección −y) -->
  <circle cx="620" cy="160" r="8" fill="none" stroke="#1565c0" stroke-width="2"/>
  <text x="630" y="155" font-family="serif" font-size="13" font-weight="bold" fill="#1565c0">B</text>
  <text x="620" y="200" font-family="serif" font-size="11" fill="#1565c0" text-anchor="middle">B: −ŷ (entrante)</text>

  <!-- Partícula -->
  <circle cx="520" cy="200" r="8" fill="#e65100"/>
  <text x="520" y="228" font-family="serif" font-size="12" fill="#e65100" text-anchor="middle">q, m</text>

  <!-- Trayectoria cicloide -->
  <path d="M 520 200 Q 530 185 540 195 Q 550 210 560 200 Q 570 185 580 195 Q 590 210 600 200 Q 610 185 620 195 Q 630 210 640 200 Q 650 185 660 195" fill="none" stroke="#1565c0" stroke-width="2.5"/>
  <text x="590" y="175" font-family="serif" font-size="11" fill="#1565c0" text-anchor="middle">Trayectoria cicloide</text>

  <!-- Fuerzas -->
  <line x1="520" y1="200" x2="520" y2="175" stroke="#c62828" stroke-width="1.5"/>
  <text x="505" y="175" font-family="serif" font-size="10" fill="#c62828">qE</text>

  <line x1="520" y1="200" x2="540" y2="185" stroke="#1565c0" stroke-width="1.5"/>
  <text x="545" y="188" font-family="serif" font-size="9" fill="#1565c0">q v×B</text>

  <!-- Fuerza total -->
  <text x="520" y="148" font-family="serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">F = q(E + v×B)</text>

  <!-- ====== PANEL DERECHO INFERIOR: Esfera lisa ====== -->
  <rect x="350" y="252" width="340" height="160" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="520" y="275" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">Despegue de esfera lisa (Ej 12)</text>

  <!-- Esfera -->
  <circle cx="520" cy="350" r="50" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="520" cy="350" r="50" fill="#e8f5e9" fill-opacity="0.3" stroke="#2e7d32" stroke-width="1.5"/>

  <!-- Centro -->
  <circle cx="520" cy="350" r="2" fill="#666"/>
  <text x="515" y="370" font-family="serif" font-size="10" fill="#666">O</text>

  <!-- Partícula en θ -->
  <circle cx="490" cy="310" r="6" fill="#c62828"/>
  <text x="480" y="305" font-family="serif" font-size="12" font-weight="bold" fill="#c62828">m</text>

  <!-- Ángulo θ -->
  <path d="M 520 345 Q 515 335 508 328" fill="none" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#ar3)"/>
  <text x="510" y="335" font-family="serif" font-size="13" font-style="italic" fill="#2e7d32">θ</text>

  <!-- Radio -->
  <line x1="520" y1="350" x2="490" y2="310" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="505" y="328" font-family="serif" font-size="11" font-style="italic" fill="#666">b</text>

  <!-- Fuerzas -->
  <!-- mg -->
  <line x1="490" y1="310" x2="490" y2="335" stroke="#c62828" stroke-width="2" marker-end="url(#arr)"/>
  <text x="480" y="340" font-family="serif" font-size="10" font-style="italic" fill="#c62828">mg</text>
  <!-- N -->
  <line x1="490" y1="310" x2="505" y2="325" stroke="#1565c0" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="508" y="322" font-family="serif" font-size="10" font-style="italic" fill="#1565c0">N</text>

  <!-- Condición de despegue -->
  <rect x="380" y="370" width="280" height="30" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="520" y="390" font-family="serif" font-size="12" fill="#e65100" text-anchor="middle">Despegue: N = 0 → cos θ = 2/3 → θ ≈ 48°</text>

</svg>