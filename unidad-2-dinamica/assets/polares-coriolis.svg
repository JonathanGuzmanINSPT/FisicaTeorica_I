<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Fondo -->
  <rect width="1200" height="800" fill="#f8f9fa"/>

  <!-- Título -->
  <text x="600" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Coordenadas Polares: 4 Componentes de la Aceleración
  </text>

  <!-- Panel 1: Sistema de coordenadas y vectores unitarios -->
  <rect x="20" y="70" width="560" height="380" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="300" y="100" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Vectores Unitarios y Posición
  </text>

  <!-- Origen O -->
  <circle cx="200" cy="280" r="4" fill="#333"/>
  <text x="185" y="300" font-size="14" fill="#333">O</text>

  <!-- Posición de la partícula -->
  <circle cx="420" cy="180" r="20" fill="#2196f3" opacity="0.8"/>
  <text x="420" y="187" font-size="14" text-anchor="middle" fill="white" font-weight="bold">P</text>

  <!-- Vector r -->
  <line x1="200" y1="280" x2="420" y2="180" stroke="#1565c0" stroke-width="3"/>
  <text x="290" y="225" font-size="16" fill="#1565c0" font-weight="bold">r</text>

  <!-- Vector unitario r_hat (radial) -->
  <line x1="420" y1="180" x2="475" y2="138" stroke="#4caf50" stroke-width="3" marker-end="url(#arrowgreen)"/>
  <text x="475" y="130" font-size="14" fill="#4caf50" font-weight="bold">r̂</text>

  <!-- Vector unitario phi_hat (tangencial, perpendicular) -->
  <line x1="420" y1="180" x2="478" y2="222" stroke="#ff9800" stroke-width="3" marker-end="url(#arroworange)"/>
  <text x="490" y="225" font-size="14" fill="#ff9800" font-weight="bold">φ̂</text>

  <!-- Pequeño arco indicando phi -->
  <path d="M 410 200 A 18 18 0 0 0 425 195" stroke="#ff9800" stroke-width="1.5" fill="none"/>
  <text x="395" y="195" font-size="12" fill="#ff9800">φ</text>

  <!-- Anotación: phi es el ángulo desde el eje x -->
  <path d="M 230 280 A 70 70 0 0 1 285 215" stroke="#666" stroke-width="1.5" fill="none"/>
  <text x="240" y="270" font-size="12" fill="#666">φ</text>

  <!-- Eje x de referencia -->
  <line x1="100" y1="280" x2="550" y2="280" stroke="#666" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="555" y="285" font-size="12" fill="#666">x</text>

  <!-- Ecuaciones cartesianas -->
  <rect x="50" y="370" width="500" height="60" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" rx="5"/>
  <text x="300" y="395" font-size="15" text-anchor="middle" fill="#333" font-family="monospace">x = r·cos(φ),    y = r·sin(φ)</text>
  <text x="300" y="418" font-size="15" text-anchor="middle" fill="#333" font-family="monospace">r̂ = (cos φ, sin φ),    φ̂ = (-sin φ, cos φ)</text>

  <!-- Panel 2: Los 4 términos de la aceleración -->
  <rect x="620" y="70" width="560" height="380" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="900" y="100" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Los 4 Términos de a = (a_r, a_φ)
  </text>

  <!-- Ecuación grande -->
  <rect x="650" y="120" width="500" height="60" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" rx="5"/>
  <text x="900" y="155" font-size="16" text-anchor="middle" fill="#333" font-family="monospace">
    a_r = r̈ − r·φ̇²     a_φ = r·φ̈ + 2·ṙ·φ̇
  </text>

  <!-- Término 1: r̈ (aceleración radial pura) -->
  <text x="650" y="210" font-size="14" font-weight="bold" fill="#4caf50">① r̈</text>
  <text x="700" y="210" font-size="13" fill="#333">→ cambio en el módulo de r</text>
  <text x="700" y="226" font-size="11" fill="#666">(alejándose o acercándose al origen)</text>

  <!-- Término 2: -r·φ̇² (centrípeta) -->
  <text x="650" y="255" font-size="14" font-weight="bold" fill="#f44336">② −r·φ̇²</text>
  <text x="720" y="255" font-size="13" fill="#333">→ aceleración centrípeta</text>
  <text x="720" y="271" font-size="11" fill="#666">(apunta hacia el centro, módulo v²/r)</text>

  <!-- Término 3: r·φ̈ (aceleración angular) -->
  <text x="650" y="300" font-size="14" font-weight="bold" fill="#ff9800">③ r·φ̈</text>
  <text x="720" y="300" font-size="13" fill="#333">→ cambio en velocidad tangencial</text>
  <text x="720" y="316" font-size="11" fill="#666">(aceleración angular transversal)</text>

  <!-- Término 4: 2·ṙ·φ̇ (Coriolis) -->
  <text x="650" y="345" font-size="14" font-weight="bold" fill="#9c27b0">④ 2·ṙ·φ̇</text>
  <text x="720" y="345" font-size="13" fill="#333">→ aceleración de CORIOLIS</text>
  <text x="720" y="361" font-size="11" fill="#666">(solo si ṙ≠0 y φ̇≠0 simultáneamente)</text>

  <!-- Texto destacado abajo -->
  <rect x="650" y="385" width="500" height="50" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="900" y="408" font-size="13" text-anchor="middle" fill="#e65100" font-weight="bold">
    El término 2·ṙ·φ̇ conecta con la fuerza de Coriolis (U7)
  </text>
  <text x="900" y="425" font-size="11" text-anchor="middle" fill="#666">
    Aparece solo si la partícula se aleja del origen mientras gira
  </text>

  <!-- Panel 3: Ejemplo de trayectoria en espiral -->
  <rect x="20" y="470" width="1160" height="290" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="600" y="500" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Ejemplo: Movimiento en Espiral (ṙ > 0, φ̇ > 0)
  </text>

  <!-- Espiral de ejemplo (aproximada con segmentos) -->
  <g transform="translate(600, 650)">
    <!-- Múltiples arcos formando espiral -->
    <path d="M 0,-30 A 30 30 0 0 1 30,0 A 50 50 0 0 1 0,50 A 70 70 0 0 1 -70,0 A 100 100 0 0 1 0,-100 A 130 130 0 0 1 130,0 A 160 160 0 0 1 0,160 A 190 190 0 0 1 -190,0 A 220 220 0 0 1 0,-220"
          fill="none" stroke="#1565c0" stroke-width="3"/>

    <!-- Punto de la partícula -->
    <circle cx="0" cy="-220" r="12" fill="#2196f3" opacity="0.9"/>
    <text x="0" y="-218" font-size="11" text-anchor="middle" fill="white" font-weight="bold">P</text>

    <!-- Vector r -->
    <line x1="0" y1="0" x2="0" y2="-220" stroke="#1565c0" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="10" y="-100" font-size="14" fill="#1565c0" font-weight="bold">r ↗</text>

    <!-- Vector v tangencial -->
    <line x1="0" y1="-220" x2="-50" y2="-210" stroke="#4caf50" stroke-width="3" marker-end="url(#arrowgreen)"/>
    <text x="-60" y="-205" font-size="13" fill="#4caf50" font-weight="bold">v</text>

    <!-- Vector a_centripeta (hacia adentro) -->
    <line x1="0" y1="-220" x2="0" y2="-200" stroke="#f44336" stroke-width="3" marker-end="url(#arrowred)"/>
    <text x="10" y="-205" font-size="13" fill="#f44336" font-weight="bold">a_c</text>

    <!-- Vector a_coriolis (perpendicular a v, en este caso hacia afuera de la espiral) -->
    <line x1="0" y1="-220" x2="40" y2="-200" stroke="#9c27b0" stroke-width="3" marker-end="url(#arrowpurple)"/>
    <text x="50" y="-195" font-size="13" fill="#9c27b0" font-weight="bold">a_Cor</text>
  </g>

  <!-- Texto explicativo de la espiral -->
  <text x="180" y="560" font-size="14" fill="#333">En una espiral con r y φ crecientes:</text>
  <text x="180" y="580" font-size="13" fill="#333">• ṙ &gt; 0  (se aleja del origen)</text>
  <text x="180" y="598" font-size="13" fill="#333">• φ̇ &gt; 0  (gira)</text>
  <text x="180" y="616" font-size="13" fill="#9c27b0" font-weight="bold">• Coriolis ≠ 0  (ambos factores presentes)</text>

  <text x="180" y="650" font-size="13" fill="#333">La aceleración total tiene 4 componentes:</text>
  <text x="180" y="668" font-size="12" fill="#4caf50">① r̂: alejamiento + centrípeta</text>
  <text x="180" y="685" font-size="12" fill="#9c27b0">② φ̂: angular + Coriolis</text>
  <text x="180" y="702" font-size="11" fill="#666" font-style="italic">Si r = cte (MCU): ṙ = 0, solo hay centrípeta y angular.</text>
  <text x="180" y="720" font-size="11" fill="#666" font-style="italic">Si φ̇ = 0 (mov. radial puro): no hay centrípeta ni Coriolis.</text>
  <text x="180" y="738" font-size="11" fill="#666" font-style="italic">Solo si ṙ≠0 y φ̇≠0 simultáneamente hay Coriolis.</text>

  <!-- Defs para flechas -->
  <defs>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4caf50"/>
    </marker>
    <marker id="arroworange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
    </marker>
    <marker id="arrowpurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9c27b0"/>
    </marker>
  </defs>
</svg>
