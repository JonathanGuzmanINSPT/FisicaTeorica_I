<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e65100"/>
    </marker>
  </defs>

  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0c5460">Ejercicio 9 — Fuerza resistente $F = -b\,e^{av}$</text>

  <!-- Eje x -->
  <line x1="60" y1="350" x2="650" y2="350" stroke="#222" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="660" y="355" font-size="14" font-style="italic" fill="#222">x</text>

  <!-- Eje v -->
  <line x1="80" y1="430" x2="80" y2="50" stroke="#222" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="65" y="50" font-size="14" font-style="italic" fill="#222">v</text>

  <!-- Canoa (cuerpo) -->
  <path d="M 100 350 Q 105 335 130 335 L 165 335 Q 175 340 175 350 Z" fill="#bbdefb" stroke="#0d47a1" stroke-width="2"/>
  <text x="138" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#0d47a1">canoa</text>

  <!-- Vector velocidad inicial -->
  <line x1="180" y1="343" x2="240" y2="343" stroke="#1565c0" stroke-width="3" marker-end="url(#arr-blue)"/>
  <text x="210" y="333" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">v₀</text>

  <!-- Vector fuerza resistente (opuesto a v) -->
  <line x1="100" y1="358" x2="60" y2="358" stroke="#e65100" stroke-width="3" marker-end="url(#arr-orange)"/>
  <text x="80" y="378" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">F = −b eᵃᵛ</text>

  <!-- Curva v(t): decae logarítmicamente -->
  <path d="M 138 220 Q 250 270 380 310 Q 480 330 600 343" fill="none" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="610" y="338" font-size="12" font-weight="600" fill="#2e7d32">v(t)</text>

  <!-- Grilla -->
  <line x1="80" y1="220" x2="650" y2="220" stroke="#ddd" stroke-width="0.5" stroke-dasharray="2 3"/>
  <line x1="138" y1="220" x2="138" y2="350" stroke="#ddd" stroke-width="0.5" stroke-dasharray="2 3"/>
  <text x="135" y="218" font-size="10" text-anchor="end" fill="#666">v₀</text>

  <!-- Caption -->
  <text x="350" y="450" text-anchor="middle" font-size="11" font-style="italic" fill="#555">
    La resistencia crece exponencialmente con v; la velocidad decae logarítmicamente.
  </text>
</svg>
