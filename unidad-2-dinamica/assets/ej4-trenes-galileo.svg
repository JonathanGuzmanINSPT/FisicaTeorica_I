<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="CMU Serif, Georgia, serif">
  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565c0"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c62828"/>
    </marker>
  </defs>

  <rect width="600" height="320" fill="#fafafa" rx="8"/>

  <text x="300" y="30" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">Transformaciones de Galileo — Velocidad relativa</text>

  <!-- Vía superior -->
  <line x1="40" y1="120" x2="560" y2="120" stroke="#999" stroke-width="3" stroke-dasharray="10,5"/>

  <!-- Vía inferior -->
  <line x1="40" y1="210" x2="560" y2="210" stroke="#999" stroke-width="3" stroke-dasharray="10,5"/>

  <!-- Tren A (→ 60 km/h) sobre vía superior -->
  <rect x="80" y="85" width="130" height="50" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <text x="145" y="113" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565c0" text-anchor="middle">Tren A</text>
  <line x1="210" y1="110" x2="280" y2="110" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <text x="270" y="102" font-family="serif" font-size="12" fill="#1565c0" text-anchor="middle" font-style="italic">v_A = 60 km/h</text>

  <!-- Tren B (← 80 km/h) sobre vía inferior -->
  <rect x="350" y="175" width="130" height="50" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="2.5"/>
  <text x="415" y="203" font-family="sans-serif" font-size="13" font-weight="bold" fill="#c62828" text-anchor="middle">Tren B</text>
  <line x1="350" y1="200" x2="280" y2="200" stroke="#c62828" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <text x="298" y="192" font-family="serif" font-size="12" fill="#c62828" text-anchor="middle" font-style="italic">v_B = 80 km/h</text>

  <!-- Sistemas de referencia -->
  <text x="55" y="60" font-family="serif" font-size="14" font-weight="bold" fill="#333">S (Tierra)</text>
  <line x1="55" y1="68" x2="80" y2="68" stroke="#333" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="58" y="80" font-family="serif" font-size="11" fill="#666">x (hacia la derecha positiva)</text>

  <text x="55" y="155" font-family="serif" font-size="13" font-weight="bold" fill="#1565c0">S' (Tren A)</text>
  <text x="55" y="240" font-family="serif" font-size="13" font-weight="bold" fill="#c62828">S" (Tren B)</text>

  <!-- Fórmula -->
  <rect x="30" y="260" width="540" height="50" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1.5"/>
  <text x="300" y="282" font-family="serif" font-size="14" fill="#333" text-anchor="middle">v_{B/A} = v_B − v_A = (−80) − (+60) = −140 km/h</text>
  <text x="300" y="302" font-family="serif" font-size="14" font-weight="bold" fill="#c62828" text-anchor="middle">|v_{B/A}| = 140 km/h</text>
</svg>