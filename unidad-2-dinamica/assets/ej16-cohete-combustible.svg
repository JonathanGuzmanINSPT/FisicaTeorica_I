<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0c5460">Ejercicio 16 — Cohete con combustible finito</text>

  <!-- Plataforma de lanzamiento -->
  <line x1="100" y1="500" x2="500" y2="500" stroke="#444" stroke-width="3"/>
  <rect x="100" y="500" width="20" height="30" fill="#666"/>

  <!-- Cohete (en t=0) -->
  <g id="cohete-inicial">
    <path d="M 290 200 L 290 480 L 250 480 L 250 460 L 280 460 L 280 200 Z" fill="#e0e0e0" stroke="#444" stroke-width="2"/>
    <path d="M 280 200 Q 290 180 300 200" fill="#e0e0e0" stroke="#444" stroke-width="2"/>
    <line x1="270" y1="240" x2="270" y2="460" stroke="#888" stroke-width="1" stroke-dasharray="2 2"/>

    <!-- Tanque de combustible (parte superior) -->
    <rect x="280" y="200" width="20" height="120" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
    <text x="290" y="265" text-anchor="middle" font-size="10" font-weight="700" fill="#0d47a1">combustible</text>
    <text x="290" y="280" text-anchor="middle" font-size="9" fill="#0d47a1">8000 kg</text>

    <!-- Masa estructural -->
    <rect x="270" y="320" width="40" height="160" fill="#fff" stroke="#444" stroke-width="1.5"/>
    <text x="290" y="410" text-anchor="middle" font-size="10" font-weight="700" fill="#444">estructura</text>
    <text x="290" y="425" text-anchor="middle" font-size="9" fill="#444">4000 kg</text>

    <!-- Etiqueta -->
    <text x="230" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#444">t = 0</text>
    <text x="230" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#444">m₀ = 12000 kg</text>
  </g>

  <!-- Gases expulsados (debajo) -->
  <g id="gases">
    <path d="M 280 480 L 270 510 L 280 505 L 290 515 L 300 505 L 310 510 L 300 480" fill="#ff9800" stroke="#e65100" stroke-width="1.5" opacity="0.8"/>
    <path d="M 270 510 L 260 540 L 275 530 L 290 545 L 305 530 L 320 540 L 310 510" fill="#ffc107" stroke="#e65100" stroke-width="1" opacity="0.6"/>
    <!-- Vector velocidad de los gases (hacia abajo) -->
    <line x1="340" y1="495" x2="340" y2="540" stroke="#e65100" stroke-width="2.5" marker-end="url(#arr-red)"/>
    <text x="360" y="525" font-size="12" font-weight="700" fill="#e65100">u = 1500 m/s</text>
    <text x="360" y="540" font-size="10" font-style="italic" fill="#e65100">(gases hacia abajo)</text>
  </g>

  <!-- Vector empuje (hacia arriba) -->
  <line x1="350" y1="350" x2="350" y2="280" stroke="#c62828" stroke-width="3" marker-end="url(#arr-red)"/>
  <text x="370" y="305" font-size="13" font-weight="700" fill="#c62828">E = αu</text>
  <text x="370" y="320" font-size="10" font-style="italic" fill="#c62828">(empuje)</text>

  <!-- Vector peso (hacia abajo) -->
  <line x1="220" y1="350" x2="220" y2="420" stroke="#2e7d32" stroke-width="3" marker-end="url(#arr-green)"/>
  <text x="180" y="395" font-size="12" font-weight="700" fill="#2e7d32">m₀ g</text>

  <!-- Gráfico: velocidad vs tiempo -->
  <g id="grafico">
    <text x="600" y="100" font-size="11" font-weight="700" fill="#0c5460">v(t) durante combustión</text>

    <!-- Ejes -->
    <line x1="500" y1="490" x2="730" y2="490" stroke="#222" stroke-width="1.2" marker-end="url(#ah)"/>
    <line x1="510" y1="540" x2="510" y2="100" stroke="#222" stroke-width="1.2" marker-end="url(#ah)"/>
    <text x="740" y="495" font-size="11" font-style="italic" fill="#222">t</text>
    <text x="500" y="100" font-size="11" font-style="italic" fill="#222">v</text>

    <!-- Curva v(t) = u ln(m0/m(t)) - g t (creciente, cóncava hacia abajo) -->
    <path d="M 510 470 Q 570 400 620 320 Q 670 230 715 130" fill="none" stroke="#1565c0" stroke-width="2.5"/>

    <!-- Marcas -->
    <line x1="610" y1="490" x2="610" y2="130" stroke="#888" stroke-width="0.8" stroke-dasharray="2 3"/>
    <text x="610" y="510" text-anchor="middle" font-size="10" fill="#444">t_c = 53 s</text>
    <text x="610" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">v_c ≈ 1125 m/s</text>
  </g>

  <!-- Caption -->
  <text x="350" y="570" text-anchor="middle" font-size="12" font-style="italic" fill="#555">
    A t = t_c = 53,3 s se agota el combustible. La velocidad del cohete es $v_c = u\ln(m_0/m_f) - g\,t_c \approx 1125$ m/s.
  </text>
</svg>
