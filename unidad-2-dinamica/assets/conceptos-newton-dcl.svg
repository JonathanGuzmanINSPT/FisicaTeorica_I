<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Fondo -->
  <rect width="1200" height="800" fill="#f8f9fa"/>
  
  <!-- Título -->
  <text x="600" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Leyes de Newton y Diagramas de Cuerpo Libre
  </text>
  
  <!-- Panel 1: Tercera Ley - Pares de interacción -->
  <rect x="20" y="70" width="560" height="340" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="300" y="100" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    3ª Ley: Pares de Acción-Reacción
  </text>
  
  <!-- Tierra y Caja -->
  <circle cx="150" cy="300" r="40" fill="#4caf50" opacity="0.7"/>
  <text x="150" y="310" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Tierra</text>
  
  <rect x="130" y="200" width="80" height="60" fill="#2196f3" opacity="0.8"/>
  <text x="170" y="235" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Caja</text>
  
  <!-- Par gravitatorio -->
  <line x1="170" y1="260" x2="170" y2="300" stroke="#f44336" stroke-width="3" marker-end="url(#arrowred)"/>
  <text x="190" y="285" font-size="12" fill="#f44336">F_T→C</text>
  
  <line x1="170" y1="300" x2="170" y2="260" stroke="#f44336" stroke-width="3" marker-end="url(#arrowred)"/>
  <text x="190" y="320" font-size="12" fill="#f44336">F_C→T</text>
  
  <!-- Mesa -->
  <rect x="80" y="360" width="180" height="20" fill="#795548" opacity="0.8"/>
  <text x="170" y="395" font-size="12" text-anchor="middle" fill="#795548">Mesa</text>
  
  <!-- Par de contacto -->
  <line x1="170" y1="360" x2="170" y2="340" stroke="#ff9800" stroke-width="3" marker-end="url(#arroworange)"/>
  <text x="190" y="350" font-size="12" fill="#ff9800">N_M→C</text>
  
  <line x1="170" y1="340" x2="170" y2="360" stroke="#ff9800" stroke-width="3" marker-end="url(#arroworange)"/>
  <text x="190" y="375" font-size="12" fill="#ff9800">N_C→M</text>
  
  <!-- Texto explicativo -->
  <text x="300" y="430" font-size="14" text-anchor="middle" fill="#333">
    Los pares actúan sobre cuerpos diferentes
  </text>
  
  <!-- Panel 2: DCL - Bloque en plano inclinado -->
  <rect x="620" y="70" width="560" height="340" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="900" y="100" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Diagrama de Cuerpo Libre (DCL)
  </text>
  
  <!-- Plano inclinado -->
  <polygon points="700,350 1100,350 700,180" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <text x="1050" y="340" font-size="14" fill="#333">θ</text>
  
  <!-- Bloque -->
  <rect x="840" y="210" width="60" height="40" fill="#2196f3" opacity="0.8" transform="rotate(-30, 870, 230)"/>
  
  <!-- Fuerzas en el DCL -->
  <!-- Peso -->
  <line x1="870" y1="230" x2="870" y2="300" stroke="#f44336" stroke-width="3" marker-end="url(#arrowred)"/>
  <text x="885" y="320" font-size="14" fill="#f44336">mg</text>
  
  <!-- Normal -->
  <line x1="855" y1="220" x2="820" y2="190" stroke="#4caf50" stroke-width="3" marker-end="url(#arrowgreen)"/>
  <text x="800" y="185" font-size="14" fill="#4caf50">N</text>
  
  <!-- Componentes del peso -->
  <line x1="870" y1="260" x2="840" y2="280" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arroworange)"/>
  <text x="820" y="300" font-size="12" fill="#ff9800">mg sinθ</text>
  
  <line x1="870" y1="260" x2="890" y2="235" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arroworange)"/>
  <text x="900" y="225" font-size="12" fill="#ff9800">mg cosθ</text>
  
  <!-- Ejes coordenados -->
  <line x1="870" y1="230" x2="920" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrowblack)"/>
  <text x="930" y="195" font-size="12" fill="#333">x</text>
  
  <line x1="870" y1="230" x2="845" y2="205" stroke="#333" stroke-width="2" marker-end="url(#arrowblack)"/>
  <text x="825" y="200" font-size="12" fill="#333">y</text>
  
  <!-- Panel 3: Rozamiento -->
  <rect x="20" y="440" width="560" height="340" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="300" y="470" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Rozamiento: Estático vs Cinético
  </text>
  
  <!-- Bloque sobre superficie -->
  <rect x="150" y="650" width="100" height="60" fill="#2196f3" opacity="0.8"/>
  <rect x="100" y="720" width="200" height="20" fill="#795548" opacity="0.6"/>
  
  <!-- Fuerza aplicada -->
  <line x1="100" y1="680" x2="50" y2="680" stroke="#9c27b0" stroke-width="3" marker-start="url(#arrowpurple)"/>
  <text x="40" y="675" font-size="14" fill="#9c27b0">F</text>
  
  <!-- Fuerza de rozamiento -->
  <line x1="250" y1="680" x2="300" y2="680" stroke="#ff5722" stroke-width="3" marker-end="url(#arrowdeeporange)"/>
  <text x="310" y="675" font-size="14" fill="#ff5722">f</text>
  
  <!-- Gráfico f vs F -->
  <rect x="400" y="500" width="160" height="160" fill="#f5f5f5" stroke="#333" stroke-width="1"/>
  <text x="480" y="520" font-size="12" text-anchor="middle" fill="#333">f vs F</text>
  
  <!-- Ejes -->
  <line x1="400" y1="640" x2="560" y2="640" stroke="#333" stroke-width="2" marker-end="url(#arrowblack)"/>
  <text x="555" y="660" font-size="10" fill="#333">F</text>
  
  <line x1="400" y1="640" x2="400" y2="500" stroke="#333" stroke-width="2" marker-end="url(#arrowblack)"/>
  <text x="385" y="510" font-size="10" fill="#333">f</text>
  
  <!-- Curva de rozamiento -->
  <!-- Estático: sube lineal -->
  <line x1="400" y1="640" x2="480" y2="580" stroke="#4caf50" stroke-width="2"/>
  
  <!-- Máximo estático -->
  <circle cx="480" cy="580" r="4" fill="#f44336"/>
  <text x="485" y="575" font-size="9" fill="#f44336">μ_s N</text>
  
  <!-- Cinético: constante -->
  <line x1="480" y1="580" x2="540" y2="590" stroke="#ff9800" stroke-width="2"/>
  <text x="545" y="585" font-size="9" fill="#ff9800">μ_k N</text>
  
  <!-- Panel 4: Segunda Ley - Componentes -->
  <rect x="620" y="440" width="560" height="340" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="900" y="470" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    2ª Ley: ΣF = ma en componentes
  </text>
  
  <!-- Coordenadas cartesianas -->
  <line x1="700" y1="650" x2="900" y2="650" stroke="#333" stroke-width="2" marker-end="url(#arrowblack)"/>
  <text x="910" y="655" font-size="14" fill="#333">x</text>
  
  <line x1="700" y1="650" x2="700" y2="450" stroke="#333" stroke-width="2" marker-end="url(#arrowblack)"/>
  <text x="685" y="460" font-size="14" fill="#333">y</text>
  
  <!-- Fuerza y aceleración -->
  <line x1="750" y1="600" x2="850" y2="550" stroke="#f44336" stroke-width="3" marker-end="url(#arrowred)"/>
  <text x="860" y="545" font-size="14" fill="#f44336">F</text>
  
  <line x1="750" y1="600" x2="830" y2="570" stroke="#2196f3" stroke-width="3" marker-end="url(#arrowblue)"/>
  <text x="840" y="565" font-size="14" fill="#2196f3">ma</text>
  
  <!-- Ecuaciones -->
  <rect x="920" y="500" width="240" height="140" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" rx="5"/>
  <text x="1040" y="530" font-size="16" text-anchor="middle" fill="#1565c0" font-weight="bold">Ecuaciones:</text>
  
  <text x="940" y="560" font-size="14" fill="#333" font-family="monospace">ΣF_x = m·a_x</text>
  <text x="940" y="590" font-size="14" fill="#333" font-family="monospace">ΣF_y = m·a_y</text>
  <text x="940" y="620" font-size="14" fill="#333" font-family="monospace">ΣF_z = m·a_z</text>
  
  <text x="930" y="660" font-size="12" fill="#666">
    En coordenadas polares:
  </text>
  <text x="940" y="680" font-size="12" fill="#333" font-family="monospace">ΣF_r = m(r̈ - rφ̇²)</text>
  <text x="940" y="700" font-size="12" fill="#333" font-family="monospace">ΣF_φ = m(rφ̈ + 2ṙφ̇)</text>
  
  <!-- Definiciones de flechas -->
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
    </marker>
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2196f3"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4caf50"/>
    </marker>
    <marker id="arroworange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff9800"/>
    </marker>
    <marker id="arrowpurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9c27b0"/>
    </marker>
    <marker id="arrowdeeporange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff5722"/>
    </marker>
    <marker id="arrowblack" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
