<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" width="700" height="420">
  <rect width="700" height="420" fill="#fafafa"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c62828"/>
    </marker>
    <marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565c0"/>
    </marker>
    <marker id="ar3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#e65100"/>
    </marker>
  </defs>

  <text x="350" y="28" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">Transformaciones de Galileo — Velocidad Relativa</text>

  <!-- ====== PANEL SUPERIOR: Trenes ====== -->
  <rect x="10" y="40" width="680" height="170" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="350" y="62" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">Dos trenes en sentidos opuestos</text>

  <!-- Vías -->
  <line x1="30" y1="160" x2="670" y2="160" stroke="#666" stroke-width="2"/>
  <line x1="30" y1="168" x2="670" y2="168" stroke="#666" stroke-width="2"/>
  <line x1="100" y1="160" x2="100" y2="168" stroke="#666" stroke-width="1"/>
  <line x1="300" y1="160" x2="300" y2="168" stroke="#666" stroke-width="1"/>
  <line x1="500" y1="160" x2="500" y2="168" stroke="#666" stroke-width="1"/>
  <line x1="600" y1="160" x2="600" y2="168" stroke="#666" stroke-width="1"/>

  <!-- Tren 1 (→) -->
  <rect x="80" y="120" width="120" height="40" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <circle cx="95" cy="162" r="10" fill="#555"/>
  <circle cx="185" cy="162" r="10" fill="#555"/>
  <text x="140" y="145" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1565c0" text-anchor="middle">Tren 1</text>
  <text x="140" y="110" font-family="serif" font-size="12" fill="#1565c0" text-anchor="middle">v₁ = 60 km/h</text>
  <!-- Flecha v1 -->
  <line x1="200" y1="130" x2="250" y2="130" stroke="#1565c0" stroke-width="2" marker-end="url(#ar2)"/>

  <!-- Tren 2 (←) -->
  <rect x="470" y="120" width="120" height="40" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <circle cx="485" cy="162" r="10" fill="#555"/>
  <circle cx="575" cy="162" r="10" fill="#555"/>
  <text x="530" y="145" font-family="sans-serif" font-size="13" font-weight="bold" fill="#c62828" text-anchor="middle">Tren 2</text>
  <text x="530" y="110" font-family="serif" font-size="12" fill="#c62828" text-anchor="middle">v₂ = 80 km/h</text>
  <!-- Flecha v2 (←) -->
  <line x1="470" y1="130" x2="420" y2="130" stroke="#c62828" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Cálculo -->
  <rect x="270" y="72" width="130" height="30" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="335" y="91" font-family="serif" font-size="12" font-style="italic" fill="#e65100" text-anchor="middle">v₂/₁ = v₂ − v₁ = −140 km/h</text>

  <!-- ====== PANEL INFERIOR IZQUIERDO: Péndulo en vagón ====== -->
  <rect x="10" y="220" width="330" height="190" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="175" y="242" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">Péndulo en vagón acelerado (Ej 5)</text>

  <!-- Vagón -->
  <rect x="40" y="250" width="270" height="80" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <!-- Techo -->
  <line x1="40" y1="250" x2="310" y2="250" stroke="#666" stroke-width="2"/>
  <!-- Ruedas -->
  <circle cx="65" cy="330" r="10" fill="#555"/>
  <circle cx="285" cy="330" r="10" fill="#555"/>

  <!-- Piso -->
  <line x1="40" y1="330" x2="310" y2="330" stroke="#666" stroke-width="2"/>

  <!-- Péndulo -->
  <line x1="175" y1="250" x2="155" y2="300" stroke="#333" stroke-width="2"/>
  <circle cx="155" cy="300" r="8" fill="#c62828"/>
  <text x="150" y="320" font-family="serif" font-size="12" fill="#c62828" text-anchor="middle">m</text>

  <!-- Ángulo θ -->
  <path d="M 175 260 Q 170 275 162 280" fill="none" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#ar3)"/>
  <text x="178" y="278" font-family="serif" font-size="13" font-style="italic" fill="#2e7d32">θ</text>

  <!-- Fuerzas (desde SRI vías) -->
  <!-- mg -->
  <line x1="155" y1="300" x2="155" y2="340" stroke="#c62828" stroke-width="2" marker-end="url(#arr)"/>
  <text x="138" y="352" font-family="serif" font-size="11" font-style="italic" fill="#c62828">mg</text>
  <!-- T -->
  <line x1="155" y1="300" x2="175" y2="250" stroke="#1565c0" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="180" y="295" font-family="serif" font-size="11" font-style="italic" fill="#1565c0">T</text>

  <!-- Aceleración del vagón -->
  <text x="175" y="380" font-family="serif" font-size="12" fill="#e65100" text-anchor="middle">a_v = 5 m/s²</text>
  <line x1="175" y1="385" x2="220" y2="385" stroke="#e65100" stroke-width="2" marker-end="url(#ar3)"/>

  <!-- ====== PANEL INFERIOR DERECHO: Centrifugadora ====== -->
  <rect x="350" y="220" width="340" height="190" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="520" y="242" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">Centrifugadora (Ej 6)</text>

  <!-- Tambor circular -->
  <circle cx="520" cy="310" r="60" fill="none" stroke="#333" stroke-width="2.5"/>
  <circle cx="520" cy="310" r="55" fill="none" stroke="#ccc" stroke-width="0.5"/>

  <!-- Eje central -->
  <circle cx="520" cy="310" r="6" fill="#666"/>

  <!-- Cuerpo en r/2 -->
  <circle cx="490" cy="280" r="8" fill="#c62828"/>
  <text x="488" y="270" font-family="serif" font-size="10" fill="#c62828" text-anchor="middle">m</text>
  <line x1="520" y1="310" x2="490" y2="280" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="500" y="286" font-family="serif" font-size="10" fill="#666">r/2</text>

  <!-- Flecha de rotación ω -->
  <path d="M 565 275 A 50 50 0 0 1 570 300" fill="none" stroke="#e65100" stroke-width="1.5" marker-end="url(#ar3)"/>
  <text x="575" y="270" font-family="serif" font-size="11" font-style="italic" fill="#e65100">ω</text>

  <!-- Fuerza centrífuga (desde SNI) -->
  <line x1="490" y1="280" x2="470" y2="260" stroke="#c62828" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="450" y="255" font-family="serif" font-size="10" fill="#c62828">F_cf</text>

  <!-- Trayectoria desde SRI -->
  <path d="M 490 280 Q 520 250 550 280" fill="none" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="530" y="252" font-family="serif" font-size="9" fill="#1565c0">Desde SRI: sigue la tangente</text>

  <text x="520" y="398" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">SNI rotante: fuerza centrífuga "empuja" hacia el borde</text>

</svg>