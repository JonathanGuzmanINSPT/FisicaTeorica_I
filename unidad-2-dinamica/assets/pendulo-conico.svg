<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Fondo -->
  <rect width="1200" height="800" fill="#f8f9fa"/>

  <!-- Título -->
  <text x="600" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Péndulo Cónico: Equilibrio rotacional
  </text>

  <!-- Panel 1: Sistema físico -->
  <rect x="20" y="70" width="580" height="500" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="310" y="100" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Configuración geométrica
  </text>

  <!-- Soporte superior -->
  <rect x="270" y="130" width="80" height="15" fill="#795548"/>
  <text x="310" y="125" font-size="12" text-anchor="middle" fill="#795548">Soporte</text>

  <!-- Punto de suspensión O -->
  <circle cx="310" cy="160" r="4" fill="#333"/>
  <text x="320" y="160" font-size="13" fill="#333">O</text>

  <!-- Eje vertical punteado -->
  <line x1="310" y1="160" x2="310" y2="500" stroke="#666" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="320" y="490" font-size="12" fill="#666">eje z</text>

  <!-- Cuerda (inclinada) -->
  <line x1="310" y1="160" x2="200" y2="400" stroke="#ff5722" stroke-width="3"/>
  <text x="240" y="280" font-size="14" fill="#ff5722" font-weight="bold">l</text>

  <!-- Masa m -->
  <circle cx="200" cy="400" r="22" fill="#2196f3" opacity="0.8"/>
  <text x="200" y="406" font-size="14" text-anchor="middle" fill="white" font-weight="bold">m</text>

  <!-- Vector r (proyección horizontal) -->
  <line x1="310" y1="160" x2="200" y2="400" stroke="#1565c0" stroke-width="0" opacity="0"/>
  <line x1="310" y1="400" x2="200" y2="400" stroke="#4caf50" stroke-width="3" marker-end="url(#arrowgreen)"/>
  <text x="250" y="395" font-size="14" fill="#4caf50" font-weight="bold">r = l·sin α</text>

  <!-- Vector vertical (altura h) -->
  <line x1="310" y1="160" x2="310" y2="400" stroke="#9c27b0" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="320" y="290" font-size="12" fill="#9c27b0">h = l·cos α</text>

  <!-- Ángulo α -->
  <path d="M 285 280 A 30 30 0 0 0 295 290" stroke="#f44336" stroke-width="2" fill="none"/>
  <text x="270" y="295" font-size="14" fill="#f44336" font-weight="bold">α</text>

  <!-- Trayectoria circular (vista superior) - elipse -->
  <ellipse cx="310" cy="400" rx="110" ry="20" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="420" y="403" font-size="12" fill="#ff9800">circunferencia</text>
  <text x="420" y="418" font-size="12" fill="#ff9800">de radio r</text>

  <!-- Velocidad tangencial v -->
  <line x1="200" y1="400" x2="170" y2="420" stroke="#2196f3" stroke-width="3" marker-end="url(#arrowblue)"/>
  <text x="140" y="440" font-size="13" fill="#2196f3" font-weight="bold">v = ωr</text>

  <!-- Ecuación clave -->
  <rect x="50" y="450" width="520" height="100" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" rx="5"/>
  <text x="310" y="478" font-size="15" text-anchor="middle" fill="#333" font-family="monospace">
    Condición de equilibrio rotacional:
  </text>
  <text x="310" y="503" font-size="18" text-anchor="middle" fill="#1565c0" font-weight="bold" font-family="monospace">
    cos(α) = g / (l·ω²)
  </text>
  <text x="310" y="528" font-size="13" text-anchor="middle" fill="#666" font-style="italic">
    Velocidad angular crítica: ω_c = √(g/l)
  </text>

  <!-- Panel 2: DCL y fuerzas -->
  <rect x="620" y="70" width="560" height="500" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="900" y="100" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Diagrama de Cuerpo Libre (DCL)
  </text>

  <!-- Masa m -->
  <circle cx="800" cy="370" r="25" fill="#2196f3" opacity="0.8"/>
  <text x="800" y="377" font-size="14" text-anchor="middle" fill="white" font-weight="bold">m</text>

  <!-- Cuerda con tensión T (hacia el centro arriba) -->
  <line x1="800" y1="370" x2="900" y2="170" stroke="#ff5722" stroke-width="3"/>
  <text x="870" y="270" font-size="14" fill="#ff5722" font-weight="bold">T (a lo largo de la cuerda)</text>

  <!-- Peso mg (hacia abajo) -->
  <line x1="800" y1="370" x2="800" y2="450" stroke="#f44336" stroke-width="3" marker-end="url(#arrowred)"/>
  <text x="810" y="430" font-size="14" fill="#f44336" font-weight="bold">mg</text>

  <!-- Componente vertical de T -->
  <line x1="800" y1="370" x2="800" y2="320" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowpurple)" stroke-dasharray="4,2"/>
  <text x="810" y="350" font-size="12" fill="#9c27b0">T·cos α</text>
  <text x="810" y="335" font-size="10" fill="#9c27b0">(compensa mg)</text>

  <!-- Componente horizontal de T (centrípeta) -->
  <line x1="800" y1="370" x2="900" y2="370" stroke="#4caf50" stroke-width="3" marker-end="url(#arrowgreen)"/>
  <text x="820" y="365" font-size="13" fill="#4caf50" font-weight="bold">T·sin α</text>
  <text x="820" y="395" font-size="11" fill="#4caf50">(centrípeta: = m·ω²·r)</text>

  <!-- Ecuaciones de equilibrio -->
  <rect x="650" y="460" width="500" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="900" y="487" font-size="14" text-anchor="middle" fill="#333" font-weight="bold">Segunda ley de Newton</text>
  <text x="900" y="510" font-size="14" text-anchor="middle" fill="#333" font-family="monospace">Vertical:  T·cos α − mg = 0</text>
  <text x="900" y="533" font-size="14" text-anchor="middle" fill="#333" font-family="monospace">Horizontal: T·sin α = m·ω²·r</text>
  <text x="900" y="552" font-size="11" text-anchor="middle" fill="#666">Dividiendo: tan α = ω²·r/g = ω²·l·sin α / g</text>

  <!-- Panel inferior: comparación con péndulo simple -->
  <rect x="20" y="595" width="1160" height="180" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="600" y="625" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Comparación con el Péndulo Simple
  </text>

  <!-- Péndulo simple -->
  <g transform="translate(250, 730)">
    <line x1="0" y1="-60" x2="0" y2="0" stroke="#333" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#2196f3" opacity="0.8"/>
    <line x1="-20" y1="0" x2="0" y2="0" stroke="#f44336" stroke-width="2" marker-end="url(#arrowred)"/>
    <text x="10" y="0" font-size="12" fill="#f44336">mg</text>
    <text x="-100" y="-30" font-size="13" font-weight="bold" fill="#333">Péndulo simple</text>
    <text x="-100" y="-10" font-size="11" fill="#666">ω₀ = √(g/l)</text>
    <text x="-100" y="10" font-size="11" fill="#666">Oscila en plano vertical</text>
  </g>

  <!-- Péndulo cónico -->
  <g transform="translate(700, 730)">
    <line x1="0" y1="-60" x2="-25" y2="0" stroke="#ff5722" stroke-width="2"/>
    <circle cx="-25" cy="0" r="12" fill="#2196f3" opacity="0.8"/>
    <line x1="-25" y1="0" x2="-25" y2="25" stroke="#f44336" stroke-width="2" marker-end="url(#arrowred)"/>
    <text x="-15" y="20" font-size="12" fill="#f44336">mg</text>
    <ellipse cx="-25" cy="0" rx="40" ry="8" fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="20" y="-30" font-size="13" font-weight="bold" fill="#333">Péndulo cónico</text>
    <text x="20" y="-10" font-size="11" fill="#666">ω_c = √(g/l) = ω₀</text>
    <text x="20" y="10" font-size="11" fill="#666">Gira con velocidad angular cte</text>
  </g>

  <!-- Conclusión -->
  <text x="600" y="755" font-size="12" text-anchor="middle" fill="#1565c0" font-weight="bold">
    La frecuencia crítica del péndulo cónico coincide con la del péndulo simple
  </text>

  <!-- Defs -->
  <defs>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4caf50"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
    </marker>
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2196f3"/>
    </marker>
    <marker id="arrowpurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9c27b0"/>
    </marker>
  </defs>
</svg>
