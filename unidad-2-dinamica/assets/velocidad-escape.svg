<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Fondo -->
  <rect width="1200" height="800" fill="#f8f9fa"/>

  <!-- Título -->
  <text x="600" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Velocidad de Escape: Conservación de Energía
  </text>

  <!-- Panel 1: Lanzamiento desde un planeta -->
  <rect x="20" y="70" width="560" height="500" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="300" y="100" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Lanzamiento vertical desde la Tierra
  </text>

  <!-- Planeta (semicírculo) -->
  <path d="M 80 480 A 220 220 0 0 1 520 480" fill="#4caf50" opacity="0.6"/>
  <path d="M 80 480 A 220 220 0 0 1 520 480" fill="none" stroke="#2e7d32" stroke-width="2"/>
  <text x="300" y="540" font-size="14" text-anchor="middle" fill="#1b5e20" font-weight="bold">Tierra (M, R)</text>

  <!-- Centro del planeta -->
  <circle cx="300" cy="480" r="3" fill="#333"/>
  <text x="310" y="495" font-size="11" fill="#333">centro</text>

  <!-- Radio R -->
  <line x1="300" y1="480" x2="300" y2="260" stroke="#1565c0" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="310" y="370" font-size="13" fill="#1565c0" font-weight="bold">R</text>

  <!-- Cohete en superficie -->
  <polygon points="300,260 295,275 305,275" fill="#f44336" opacity="0.9"/>
  <rect x="293" y="275" width="14" height="10" fill="#2196f3"/>
  <line x1="300" y1="260" x2="300" y2="220" stroke="#f44336" stroke-width="3" marker-end="url(#arrowred)"/>
  <text x="320" y="240" font-size="13" fill="#f44336" font-weight="bold">v_esc</text>

  <!-- Trayectoria parabólica simplificada (línea recta ascendente) -->
  <line x1="300" y1="260" x2="450" y2="100" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="455" y="105" font-size="11" fill="#ff9800" font-style="italic">trayectoria</text>

  <!-- Flechas de gravedad -->
  <line x1="250" y1="350" x2="250" y2="400" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowpurple)"/>
  <text x="225" y="380" font-size="11" fill="#9c27b0">g</text>

  <!-- Conservación de energía -->
  <rect x="50" y="445" width="500" height="115" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" rx="5"/>
  <text x="300" y="472" font-size="13" text-anchor="middle" font-weight="bold" fill="#333">Conservación de energía mecánica</text>
  <text x="300" y="495" font-size="13" text-anchor="middle" fill="#333" font-family="monospace">½·m·v_i² − G·M·m/R = ½·m·v_f² − G·M·m/r_f</text>
  <text x="300" y="517" font-size="13" text-anchor="middle" fill="#333" font-style="italic">En el infinito: v_f = 0, r_f → ∞</text>
  <text x="300" y="540" font-size="16" text-anchor="middle" fill="#1565c0" font-weight="bold" font-family="monospace">v_esc = √(2·G·M/R)</text>

  <!-- Panel 2: Tabla de valores -->
  <rect x="620" y="70" width="560" height="500" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="900" y="100" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Velocidades de escape (cuerpos del sistema solar)
  </text>

  <!-- Tabla -->
  <g transform="translate(660, 130)">
    <!-- Cabecera -->
    <rect x="0" y="0" width="480" height="30" fill="#1565c0" opacity="0.15" stroke="#1565c0"/>
    <text x="20" y="20" font-size="13" font-weight="bold" fill="#1565c0">Cuerpo</text>
    <text x="200" y="20" font-size="13" font-weight="bold" fill="#1565c0">M/R</text>
    <text x="350" y="20" font-size="13" font-weight="bold" fill="#1565c0">v_esc</text>

    <!-- Filas -->
    <line x1="0" y1="35" x2="480" y2="35" stroke="#1565c0" stroke-width="0.5"/>
    <text x="20" y="55" font-size="13" fill="#333">Tierra</text>
    <text x="200" y="55" font-size="12" fill="#666">1.00 (ref.)</text>
    <text x="350" y="55" font-size="13" font-weight="bold" fill="#d32f2f">11.2 km/s</text>

    <line x1="0" y1="65" x2="480" y2="65" stroke="#ccc" stroke-width="0.5"/>
    <text x="20" y="85" font-size="13" fill="#333">Luna</text>
    <text x="200" y="85" font-size="12" fill="#666">~0.045</text>
    <text x="350" y="85" font-size="13" font-weight="bold" fill="#d32f2f">2.4 km/s</text>

    <line x1="0" y1="95" x2="480" y2="95" stroke="#ccc" stroke-width="0.5"/>
    <text x="20" y="115" font-size="13" fill="#333">Marte</text>
    <text x="200" y="115" font-size="12" fill="#666">~0.20</text>
    <text x="350" y="115" font-size="13" font-weight="bold" fill="#d32f2f">5.0 km/s</text>

    <line x1="0" y1="125" x2="480" y2="125" stroke="#ccc" stroke-width="0.5"/>
    <text x="20" y="145" font-size="13" fill="#333">Júpiter</text>
    <text x="200" y="145" font-size="12" fill="#666">~64</text>
    <text x="350" y="145" font-size="13" font-weight="bold" fill="#d32f2f">59.5 km/s</text>

    <line x1="0" y1="155" x2="480" y2="155" stroke="#ccc" stroke-width="0.5"/>
    <text x="20" y="175" font-size="13" fill="#333">Sol (superficie)</text>
    <text x="200" y="175" font-size="12" fill="#666">~3050</text>
    <text x="350" y="175" font-size="13" font-weight="bold" fill="#d32f2f">618 km/s</text>

    <line x1="0" y1="185" x2="480" y2="185" stroke="#1565c0" stroke-width="1"/>
  </g>

  <!-- Propiedad clave: v_esc = √2 · v_orb -->
  <rect x="660" y="345" width="480" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="900" y="372" font-size="14" text-anchor="middle" font-weight="bold" fill="#e65100">
    Relación con velocidad orbital
  </text>
  <text x="900" y="395" font-size="13" text-anchor="middle" fill="#333" font-family="monospace">
    v_esc = √2 · v_orb,rasante
  </text>
  <text x="900" y="418" font-size="12" text-anchor="middle" fill="#666" font-style="italic">
    Para órbita circular rasante: v_orb = √(G·M/R)
  </text>
  <text x="900" y="436" font-size="11" text-anchor="middle" fill="#c2185b">
    Factor clásico: 11.2 / 7.9 ≈ 1.414 = √2
  </text>

  <!-- Propiedad notable -->
  <rect x="660" y="465" width="480" height="95" fill="#e8f5e9" stroke="#4caf50" stroke-width="1" rx="5"/>
  <text x="900" y="492" font-size="14" text-anchor="middle" font-weight="bold" fill="#2e7d32">
    Propiedad fundamental
  </text>
  <text x="900" y="514" font-size="12" text-anchor="middle" fill="#333">
    v_esc <strong>NO depende de la masa m</strong> del cohete.
  </text>
  <text x="900" y="532" font-size="12" text-anchor="middle" fill="#333">
    Solo depende de las propiedades del planeta (M, R).
  </text>
  <text x="900" y="552" font-size="11" text-anchor="middle" fill="#666" font-style="italic">
    En relatividad, hay que corregir la energía potencial.
  </text>

  <!-- Panel inferior: anticipo de U4 -->
  <rect x="20" y="595" width="1160" height="180" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="600" y="625" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    🔗 Anticipo de la Unidad 4: Gravitación
  </text>

  <!-- Conexión con U4 -->
  <text x="50" y="665" font-size="13" fill="#333">
    En la <strong>Unidad 4</strong> estudiaremos:
  </text>
  <text x="50" y="687" font-size="12" fill="#333">• Ley de gravitación universal: F = G·M·m/r²</text>
  <text x="50" y="706" font-size="12" fill="#333">• Energía potencial gravitatoria: U(r) = -G·M·m/r</text>
  <text x="50" y="725" font-size="12" fill="#333">• Órbitas elípticas (Kepler) y velocidad areolar constante</text>
  <text x="50" y="744" font-size="12" fill="#333">• Velocidad de escape como caso particular de órbita parabólica (e=1)</text>

  <text x="500" y="665" font-size="13" fill="#333" font-weight="bold">Tipos de órbitas según energía total:</text>
  <g transform="translate(500, 680)">
    <ellipse cx="0" cy="0" rx="15" ry="8" fill="none" stroke="#4caf50" stroke-width="2"/>
    <text x="25" y="3" font-size="11" fill="#333">Elíptica (E &lt; 0)</text>

    <path d="M 0 18 Q 80 10 200 18" fill="none" stroke="#2196f3" stroke-width="2"/>
    <text x="220" y="22" font-size="11" fill="#333">Parabólica (E = 0) → escape</text>

    <path d="M 0 40 Q 80 28 200 32 Q 250 34 280 30" fill="none" stroke="#f44336" stroke-width="2"/>
    <text x="300" y="40" font-size="11" fill="#333">Hipérbolica (E &gt; 0) → exceso de escape</text>
  </g>

  <text x="600" y="765" font-size="11" text-anchor="middle" fill="#666" font-style="italic">
    La velocidad de escape corresponde al caso límite parabólico: energía total exactamente cero.
  </text>

  <!-- Defs -->
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
    </marker>
    <marker id="arrowpurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9c27b0"/>
    </marker>
  </defs>
</svg>
