<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e65100"/>
    </marker>
  </defs>

  <!-- ============== PANEL IZQUIERDO: SRI (Tierra) ============== -->
  <g id="panel-sri">
    <text x="225" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0c5460">SRI: Sistema fijo a las vías (inercial)</text>

    <!-- Ejes coordenados fijos a la Tierra -->
    <line x1="40" y1="460" x2="430" y2="460" stroke="#222" stroke-width="1.5" marker-end="url(#ah)"/>
    <line x1="60" y1="490" x2="60" y2="40" stroke="#222" stroke-width="1.5" marker-end="url(#ah)"/>
    <text x="438" y="465" font-size="14" font-style="italic" fill="#222">X (Tierra)</text>
    <text x="48" y="38" font-size="14" font-style="italic" fill="#222">Y</text>

    <!-- Rieles -->
    <line x1="60" y1="455" x2="430" y2="455" stroke="#444" stroke-width="3" stroke-dasharray="14 6"/>
    <line x1="60" y1="465" x2="430" y2="465" stroke="#444" stroke-width="3" stroke-dasharray="14 6"/>

    <!-- Vagón (rectángulo) -->
    <rect x="170" y="220" width="220" height="160" fill="#f5f5f5" stroke="#444" stroke-width="2"/>
    <!-- Techo -->
    <line x1="170" y1="220" x2="390" y2="220" stroke="#444" stroke-width="2"/>
    <!-- Ruedas -->
    <circle cx="210" cy="392" r="14" fill="#fff" stroke="#444" stroke-width="2"/>
    <circle cx="350" cy="392" r="14" fill="#fff" stroke="#444" stroke-width="2"/>

    <!-- Etiqueta vagón -->
    <text x="280" y="415" text-anchor="middle" font-size="11" fill="#555">vagón</text>

    <!-- Vector aceleración del vagón -->
    <line x1="400" y1="280" x2="455" y2="280" stroke="#c62828" stroke-width="3" marker-end="url(#arr-red)"/>
    <text x="430" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">a_v = 5 m/s²</text>

    <!-- Punto de suspensión (techo) -->
    <circle cx="280" cy="220" r="3" fill="#000"/>
    <!-- Hilo del péndulo, inclinado hacia atrás (opuesto a aceleración) -->
    <line x1="280" y1="220" x2="245" y2="340" stroke="#222" stroke-width="1.8"/>
    <!-- Esfera del péndulo -->
    <circle cx="245" cy="340" r="14" fill="#bbdefb" stroke="#0d47a1" stroke-width="2"/>
    <text x="245" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#0d47a1">m</text>

    <!-- Línea vertical de referencia (punteada) -->
    <line x1="280" y1="220" x2="280" y2="360" stroke="#888" stroke-width="1" stroke-dasharray="4 4"/>
    <!-- Arco del ángulo theta -->
    <path d="M 280 320 A 40 40 0 0 0 263 314" fill="none" stroke="#7b1fa2" stroke-width="1.5"/>
    <text x="262" y="300" font-size="14" font-style="italic" font-weight="700" fill="#7b1fa2">θ</text>

    <!-- Vector peso (hacia abajo) -->
    <line x1="245" y1="358" x2="245" y2="410" stroke="#2e7d32" stroke-width="3" marker-end="url(#arr-green)"/>
    <text x="225" y="395" font-size="13" font-weight="700" fill="#2e7d32">P = m g</text>

    <!-- Vector tensión (a lo largo del hilo hacia el pivote) -->
    <line x1="245" y1="335" x2="280" y2="220" stroke="#1565c0" stroke-width="3" marker-end="url(#arr-blue)"/>
    <text x="305" y="265" font-size="13" font-weight="700" fill="#1565c0">T</text>

    <!-- Vector aceleración de la masa (= aceleración del vagón) -->
    <line x1="265" y1="340" x2="320" y2="340" stroke="#c62828" stroke-width="2.5" stroke-dasharray="4 3" marker-end="url(#arr-red)"/>
    <text x="295" y="335" font-size="11" font-weight="600" fill="#c62828">a_m = a_v</text>

    <!-- Caption -->
    <text x="225" y="500" text-anchor="middle" font-size="11" font-style="italic" fill="#555">El péndulo se inclina "hacia atrás" (opuesto al movimiento).</text>
  </g>

  <!-- ============== PANEL DERECHO: SNI (vagón) ============== -->
  <g id="panel-sni">
    <text x="685" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0c5460">SNI: Sistema fijo al vagón (no inercial)</text>

    <!-- Ejes del vagón (girados con el vagón? No: ejes del SNI paralelos a SRI, solo se traslada) -->
    <line x1="490" y1="460" x2="880" y2="460" stroke="#222" stroke-width="1.5" marker-end="url(#ah)"/>
    <line x1="510" y1="490" x2="510" y2="40" stroke="#222" stroke-width="1.5" marker-end="url(#ah)"/>
    <text x="888" y="465" font-size="14" font-style="italic" fill="#222">X' (vagón)</text>
    <text x="498" y="38" font-size="14" font-style="italic" fill="#222">Y'</text>

    <!-- Rieles -->
    <line x1="510" y1="455" x2="880" y2="455" stroke="#444" stroke-width="3" stroke-dasharray="14 6"/>
    <line x1="510" y1="465" x2="880" y2="465" stroke="#444" stroke-width="3" stroke-dasharray="14 6"/>

    <!-- Vagón -->
    <rect x="620" y="220" width="220" height="160" fill="#f5f5f5" stroke="#444" stroke-width="2"/>
    <line x1="620" y1="220" x2="840" y2="220" stroke="#444" stroke-width="2"/>
    <circle cx="660" cy="392" r="14" fill="#fff" stroke="#444" stroke-width="2"/>
    <circle cx="800" cy="392" r="14" fill="#fff" stroke="#444" stroke-width="2"/>
    <text x="730" y="415" text-anchor="middle" font-size="11" fill="#555">vagón</text>

    <!-- Vector aceleración del vagón (referencia) -->
    <line x1="850" y1="280" x2="905" y2="280" stroke="#c62828" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arr-red)"/>
    <text x="880" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#c62828">a_v</text>

    <!-- Punto de suspensión -->
    <circle cx="730" cy="220" r="3" fill="#000"/>
    <!-- Hilo inclinado -->
    <line x1="730" y1="220" x2="695" y2="340" stroke="#222" stroke-width="1.8"/>
    <circle cx="695" cy="340" r="14" fill="#bbdefb" stroke="#0d47a1" stroke-width="2"/>
    <text x="695" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#0d47a1">m</text>

    <!-- Vertical de referencia -->
    <line x1="730" y1="220" x2="730" y2="360" stroke="#888" stroke-width="1" stroke-dasharray="4 4"/>
    <path d="M 730 320 A 40 40 0 0 0 713 314" fill="none" stroke="#7b1fa2" stroke-width="1.5"/>
    <text x="712" y="300" font-size="14" font-style="italic" font-weight="700" fill="#7b1fa2">θ</text>

    <!-- Peso -->
    <line x1="695" y1="358" x2="695" y2="410" stroke="#2e7d32" stroke-width="3" marker-end="url(#arr-green)"/>
    <text x="675" y="395" font-size="13" font-weight="700" fill="#2e7d32">P = m g</text>

    <!-- Tensión -->
    <line x1="695" y1="335" x2="730" y2="220" stroke="#1565c0" stroke-width="3" marker-end="url(#arr-blue)"/>
    <text x="755" y="265" font-size="13" font-weight="700" fill="#1565c0">T</text>

    <!-- Fuerza ficticia (opuesta a la aceleración del vagón) -->
    <line x1="678" y1="340" x2="618" y2="340" stroke="#e65100" stroke-width="3" marker-end="url(#arr-orange)"/>
    <text x="630" y="332" font-size="12" font-weight="700" fill="#e65100">F_fict = −m a_v</text>

    <!-- Equilibrio: a'=0 -->
    <text x="850" y="200" text-anchor="middle" font-size="11" font-style="italic" fill="#c62828">a' = 0</text>
    <text x="850" y="215" text-anchor="middle" font-size="11" font-style="italic" fill="#c62828">(reposo en S')</text>

    <!-- Caption -->
    <text x="685" y="500" text-anchor="middle" font-size="11" font-style="italic" fill="#555">Aparece F_fict opuesta a a_v; la suma de fuerzas se anula.</text>
  </g>

  <!-- Título general -->
  <text x="450" y="15" text-anchor="middle" font-size="14" font-weight="700" fill="#444">Ejercicio 5 — Péndulo en vagón con aceleración a_v = 5 m/s²</text>
</svg>
