<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <rect width="500" height="300" fill="#fafafa"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c62828"/>
    </marker>
    <marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565c0"/>
    </marker>
    <marker id="ar3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2e7d32"/>
    </marker>
  </defs>

  <text x="250" y="25" font-family="sans-serif" font-size="15" font-weight="bold" fill="#333" text-anchor="middle">Caída Libre con Corrección de Coriolis (Ej 7)</text>

  <!-- Representación Tierra -->
  <circle cx="120" cy="230" r="70" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="120" y="235" font-family="serif" font-size="13" font-weight="bold" fill="#2e7d32" text-anchor="middle">Tierra</text>

  <!-- Eje de rotación -->
  <line x1="120" y1="130" x2="120" y2="300" stroke="#666" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="120" cy="130" r="3" fill="#333"/>
  <text x="125" y="128" font-family="serif" font-size="11" font-style="italic" fill="#333">N</text>
  <circle cx="120" cy="300" r="3" fill="#333"/>
  <text x="125" y="310" font-family="serif" font-size="11" font-style="italic" fill="#333">S</text>

  <!-- ω de rotación -->
  <path d="M 165 175 A 55 55 0 0 1 170 190" fill="none" stroke="#e65100" stroke-width="1.5" marker-end="url(#ar3)"/>
  <text x="175" y="172" font-family="serif" font-size="12" font-style="italic" fill="#e65100">ω</text>

  <!-- Punto en superficie -->
  <circle cx="170" cy="220" r="4" fill="#1565c0"/>
  <text x="178" y="218" font-family="serif" font-size="11" fill="#1565c0">P</text>

  <!-- Sistema de referencia local -->
  <line x1="170" y1="220" x2="170" y2="195" stroke="#c62828" stroke-width="2" marker-end="url(#arr)"/>
  <text x="160" y="193" font-family="serif" font-size="12" font-style="italic" fill="#c62828">k</text>
  <line x1="170" y1="220" x2="195" y2="215" stroke="#1565c0" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="198" y="218" font-family="serif" font-size="12" font-style="italic" fill="#1565c0">j (este)</text>
  <line x1="170" y1="220" x2="185" y2="200" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#ar3)"/>
  <text x="190" y="198" font-family="serif" font-size="11" font-style="italic" fill="#2e7d32">i (sur)</text>

  <!-- Partícula cayendo -->
  <circle cx="290" cy="100" r="6" fill="#c62828"/>
  <text x="295" y="95" font-family="serif" font-size="12" fill="#c62828">m</text>

  <!-- Línea de caída vertical -->
  <line x1="290" y1="100" x2="290" y2="240" stroke="#c62828" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="295" y="175" font-family="serif" font-size="11" fill="#c62828" text-anchor="start">z = h − ½gt²</text>

  <!-- Desviación hacia el este -->
  <line x1="290" y1="240" x2="310" y2="240" stroke="#1565c0" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="315" y="245" font-family="serif" font-size="11" fill="#1565c0">y = (⅓)ωg t³ cos φ</text>

  <!-- Altura h -->
  <line x1="270" y1="100" x2="270" y2="260" stroke="#666" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="265" y="180" font-family="serif" font-size="11" font-style="italic" fill="#666">h</text>

  <!-- Latitud -->
  <path d="M 170 220 A 60 60 0 0 1 180 235" fill="none" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="155" y="250" font-family="serif" font-size="12" font-style="italic" fill="#7b1fa2">φ</text>

  <!-- Resultados clave -->
  <rect x="340" y="120" width="150" height="120" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="415" y="142" font-family="sans-serif" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">Resultados</text>
  <text x="415" y="165" font-family="serif" font-size="11" fill="#333" text-anchor="middle">z = h − ½gt²</text>
  <text x="415" y="185" font-family="serif" font-size="11" fill="#333" text-anchor="middle">y = (ωgt³/3) cos φ</text>
  <text x="415" y="205" font-family="serif" font-size="10" fill="#555" text-anchor="middle">x = 0 (meridiano)</text>
  <line x1="355" y1="215" x2="475" y2="215" stroke="#ddd" stroke-width="0.5"/>
  <text x="415" y="232" font-family="sans-serif" font-size="10" fill="#e65100" text-anchor="middle">⚠️ Desviación máxima en el ecuador</text>

</svg>