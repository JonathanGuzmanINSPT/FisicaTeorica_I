<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 540" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0c5460">Ejercicio 15 — Cohete en plataforma: despegue</text>

  <!-- Plataforma de lanzamiento -->
  <line x1="100" y1="450" x2="500" y2="450" stroke="#444" stroke-width="3"/>
  <rect x="100" y="450" width="20" height="30" fill="#666"/>
  <text x="60" y="475" font-size="11" font-style="italic" fill="#444">plataforma</text>

  <!-- Cohete -->
  <g id="cohete">
    <path d="M 290 170 L 290 430 L 250 430 L 250 410 L 280 410 L 280 170 Z" fill="#e0e0e0" stroke="#444" stroke-width="2"/>
    <path d="M 280 170 Q 290 150 300 170" fill="#e0e0e0" stroke="#444" stroke-width="2"/>
    <line x1="270" y1="200" x2="270" y2="410" stroke="#888" stroke-width="1" stroke-dasharray="2 2"/>
  </g>

  <!-- Etiqueta del cohete -->
  <text x="220" y="310" text-anchor="middle" font-size="13" font-weight="700" fill="#444">cohete</text>
  <text x="220" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#444">m₀ = 1000 kg</text>

  <!-- Gases expulsados -->
  <path d="M 280 430 L 270 460 L 280 455 L 290 465 L 300 455 L 310 460 L 300 430" fill="#ff9800" stroke="#e65100" stroke-width="1.5" opacity="0.8"/>
  <path d="M 270 460 L 260 490 L 275 480 L 290 495 L 305 480 L 320 490 L 310 460" fill="#ffc107" stroke="#e65100" stroke-width="1" opacity="0.6"/>

  <!-- Vector velocidad de los gases (hacia abajo) -->
  <line x1="340" y1="445" x2="340" y2="495" stroke="#e65100" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <text x="360" y="475" font-size="12" font-weight="700" fill="#e65100">u (gases)</text>
  <text x="360" y="490" font-size="10" font-style="italic" fill="#e65100">α = 1 kg/s</text>

  <!-- Vector empuje (hacia arriba) -->
  <line x1="350" y1="320" x2="350" y2="250" stroke="#c62828" stroke-width="3" marker-end="url(#arr-red)"/>
  <text x="370" y="280" font-size="13" font-weight="700" fill="#c62828">E = αu</text>
  <text x="370" y="298" font-size="10" font-style="italic" fill="#c62828">(empuje)</text>

  <!-- Vector peso (hacia abajo) -->
  <line x1="220" y1="320" x2="220" y2="395" stroke="#2e7d32" stroke-width="3" marker-end="url(#arr-green)"/>
  <text x="180" y="365" font-size="13" font-weight="700" fill="#2e7d32">P = m₀g</text>

  <!-- Condición de despegue (caja a la derecha) -->
  <g id="condicion">
    <rect x="500" y="120" width="170" height="160" fill="#fff3e0" stroke="#e65100" stroke-width="2" rx="6"/>
    <text x="585" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#0c5460">Despegue</text>
    <text x="510" y="170" font-size="11" font-weight="600" fill="#222">αu ≥ m₀g</text>
    <text x="510" y="195" font-size="11" font-weight="600" fill="#222">u ≥ m₀g/α</text>
    <text x="510" y="225" font-size="11" font-weight="700" fill="#c62828">u_min = 9810 m/s</text>
    <text x="510" y="250" font-size="10" font-style="italic" fill="#444">≈ Mach 29</text>
    <text x="510" y="270" font-size="9" font-style="italic" fill="#444">(¡no es realista!)</text>
  </g>

  <!-- Caption -->
  <text x="350" y="520" text-anchor="middle" font-size="12" font-style="italic" fill="#555">
    El cohete despega cuando el empuje αu iguala o supera al peso m₀g.
  </text>
</svg>
