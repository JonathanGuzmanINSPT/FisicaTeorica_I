<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8e44ad"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Ejercicio 3 — Bloques apilados con polea fija</text>

  <!-- ==================== SISTEMA PRINCIPAL ==================== -->

  <!-- Mesa / superficie -->
  <rect x="50" y="180" width="400" height="15" fill="#8B7355" stroke="#5C4033" stroke-width="2"/>
  <!-- Patas de la mesa -->
  <rect x="70" y="195" width="12" height="120" fill="#8B7355" stroke="#5C4033" stroke-width="1"/>
  <rect x="418" y="195" width="12" height="120" fill="#8B7355" stroke="#5C4033" stroke-width="1"/>
  <!-- Piso -->
  <line x1="30" y1="315" x2="500" y2="315" stroke="#555" stroke-width="2"/>
  <line x1="30" y1="315" x2="500" y2="320" stroke="#555" stroke-width="1"/>

  <!-- Bloque m2 (base) -->
  <rect x="140" y="110" width="160" height="70" fill="#7fb3d8" stroke="#2980b9" stroke-width="2" rx="3"/>
  <text x="220" y="150" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a5276">m₂</text>

  <!-- Bloque m1 (arriba de m2) -->
  <rect x="170" y="60" width="100" height="50" fill="#a9dfbf" stroke="#27ae60" stroke-width="2" rx="3"/>
  <text x="220" y="92" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e8449">m₁</text>

  <!-- Polea fija en el borde de la mesa -->
  <circle cx="460" cy="175" r="18" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="460" cy="175" r="4" fill="#333"/>
  <!-- Soporte de la polea -->
  <line x1="460" y1="157" x2="460" y2="140" stroke="#333" stroke-width="3"/>
  <line x1="445" y1="140" x2="475" y2="140" stroke="#333" stroke-width="3"/>

  <!-- Cuerda: horizontal desde m2 hasta la polea -->
  <line x1="300" y1="145" x2="442" y2="175" stroke="#e67e22" stroke-width="3"/>
  <!-- Cuerda: vertical desde la polea hasta m3 -->
  <line x1="478" y1="175" x2="478" y2="280" stroke="#e67e22" stroke-width="3"/>

  <!-- Bloque m3 (colgante) -->
  <rect x="438" y="280" width="80" height="60" fill="#f5b7b1" stroke="#e74c3c" stroke-width="2" rx="3"/>
  <text x="478" y="315" text-anchor="middle" font-size="20" font-weight="bold" fill="#c0392b">m₃</text>

  <!-- ==================== DCL de m1+m2 (izquierda) ==================== -->

  <text x="120" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">DCL de m₁ + m₂</text>

  <!-- Punto central para DCL -->
  <circle cx="120" cy="385" r="5" fill="#333"/>

  <!-- Peso (m1+m2)g hacia abajo -->
  <line x1="120" y1="385" x2="120" y2="425" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  <text x="135" y="420" font-size="12" fill="#e74c3c">(m₁+m₂)g</text>

  <!-- Normal hacia arriba -->
  <line x1="120" y1="385" x2="120" y2="350" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
  <text x="135" y="347" font-size="12" fill="#3498db">N</text>

  <!-- Tensión hacia la derecha -->
  <line x1="120" y1="385" x2="165" y2="385" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="170" y="381" font-size="12" fill="#27ae60">T</text>

  <!-- Rozamiento hacia la izquierda -->
  <line x1="120" y1="385" x2="75" y2="385" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrowhead-purple)"/>
  <text x="40" y="381" font-size="12" fill="#8e44ad">fₖ</text>

  <!-- ==================== DCL de m3 (derecha) ==================== -->

  <text x="478" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">DCL de m₃</text>

  <!-- Punto central para DCL -->
  <circle cx="478" cy="385" r="5" fill="#333"/>

  <!-- Peso m3g hacia abajo -->
  <line x1="478" y1="385" x2="478" y2="425" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  <text x="495" y="420" font-size="12" fill="#e74c3c">m₃g</text>

  <!-- Tensión hacia arriba -->
  <line x1="478" y1="385" x2="478" y2="350" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="495" y="347" font-size="12" fill="#27ae60">T</text>

  <!-- Aceleración -->
  <text x="350" y="465" text-anchor="middle" font-size="12" fill="#666">→ a (m₁+m₂) &amp;nbsp;&amp;nbsp;&amp;nbsp; ↓ a (m₃)</text>

</svg>
