<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 380" width="650" height="380">
  <rect width="650" height="380" fill="#fafafa"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c62828"/>
    </marker>
    <marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565c0"/>
    </marker>
    <marker id="ar3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- Título -->
  <text x="325" y="28" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">Diagramas de Cuerpo Libre (DCL) — Pares de Interacción</text>

  <!-- =============== PANEL IZQUIERDO: Caja sobre mesa =============== -->
  <rect x="10" y="42" width="310" height="330" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="165" y="65" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">Caja en reposo sobre una mesa</text>

  <!-- Mesa -->
  <rect x="60" y="200" width="210" height="18" rx="2" fill="#8d6e63" stroke="#5d4037" stroke-width="1"/>
  <!-- Pata izquierda -->
  <rect x="70" y="218" width="12" height="60" fill="#8d6e63" stroke="#5d4037" stroke-width="1"/>
  <!-- Pata derecha -->
  <rect x="200" y="218" width="12" height="60" fill="#8d6e63" stroke="#5d4037" stroke-width="1"/>
  <text x="165" y="298" font-family="serif" font-size="13" font-style="italic" fill="#5d4037" text-anchor="middle">Mesa</text>
  <!-- Piso -->
  <line x1="55" y1="280" x2="275" y2="280" stroke="#999" stroke-width="1.5"/>

  <!-- Caja -->
  <rect x="125" y="150" width="80" height="50" rx="3" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="165" y="180" font-family="serif" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">Caja</text>

  <!-- Fuerzas sobre la caja (DCL caja) -->
  <!-- Peso (mg) -->
  <line x1="165" y1="150" x2="165" y2="120" stroke="#c62828" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="170" y="118" font-family="serif" font-size="14" font-style="italic" fill="#c62828">P = mg</text>

  <!-- Normal (N) -->
  <line x1="165" y1="200" x2="165" y2="225" stroke="#1565c0" stroke-width="2.5" marker-end="url(#ar2)"/>
  <text x="170" y="238" font-family="serif" font-size="14" font-style="italic" fill="#1565c0">N</text>

  <!-- Anotación: La normal y el peso NO son acción-reacción -->
  <text x="165" y="325" font-family="sans-serif" font-size="11" fill="#666" text-anchor="middle">⚠️ Peso y Normal actúan sobre la caja → NO son par acción-reacción</text>

  <!-- =============== PANEL DERECHO: Pares de interacción =============== -->
  <rect x="330" y="42" width="310" height="330" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="485" y="65" font-family="sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">Pares de Interacción (3ª Ley)</text>

  <!-- Caja pequeña -->
  <rect x="410" y="150" width="50" height="40" rx="3" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="435" y="174" font-family="serif" font-size="11" fill="#1565c0" text-anchor="middle">Caja</text>

  <!-- Mesa -->
  <rect x="390" y="220" width="130" height="15" rx="2" fill="#8d6e63" stroke="#5d4037" stroke-width="1.5"/>
  <text x="455" y="260" font-family="serif" font-size="11" font-style="italic" fill="#5d4037" text-anchor="middle">Mesa</text>

  <!-- Tierra (representación) -->
  <circle cx="525" cy="300" r="30" fill="none" stroke="#4caf50" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="525" y="305" font-family="serif" font-size="11" fill="#4caf50" text-anchor="middle">Tierra</text>

  <!-- Par 1: Tierra-Caja (gravitatorio) -->
  <path d="M 435 150 Q 480 120 525 160" fill="none" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="525" y1="160" x2="435" y2="150" stroke="#c62828" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="490" y="135" font-family="serif" font-size="10" fill="#c62828" text-anchor="middle">mg</text>

  <path d="M 435 150 Q 480 120 525 160" fill="none" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="435" y1="150" x2="525" y2="160" stroke="#c62828" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="500" y="152" font-family="serif" font-size="9" fill="#c62828" text-anchor="middle">(reacción)</text>

  <!-- Par 2: Mesa-Caja (normal) -->
  <line x1="435" y1="190" x2="455" y2="218" stroke="#1565c0" stroke-width="1.5"/>
  <line x1="455" y1="218" x2="435" y2="190" stroke="#1565c0" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="455" y="200" font-family="serif" font-size="10" fill="#1565c0">N</text>

  <!-- Par 3: Tierra-Mesa (gravitatorio) -->
  <path d="M 455 235 Q 490 300 525 280" fill="none" stroke="#2e7d32" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="498" y="275" font-family="serif" font-size="9" fill="#2e7d32">M_g</text>

  <!-- Leyenda -->
  <rect x="350" y="315" width="270" height="45" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="485" y="332" font-family="sans-serif" font-size="11" font-weight="bold" fill="#e65100" text-anchor="middle">✅ Cada interacción genera DOS fuerzas</text>
  <text x="485" y="348" font-family="sans-serif" font-size="10" fill="#e65100" text-anchor="middle">que actúan sobre CUERPOS DISTINTOS</text>

</svg>