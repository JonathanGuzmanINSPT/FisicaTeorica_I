<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Fondo -->
  <rect width="1200" height="800" fill="#f8f9fa"/>

  <!-- Título -->
  <text x="600" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Péndulo con Fricción Viscosa: EDO Amortiguada
  </text>

  <!-- Panel 1: Sistema y DCL -->
  <rect x="20" y="70" width="560" height="380" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="300" y="100" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Péndulo en medio viscoso
  </text>

  <!-- Soporte -->
  <rect x="270" y="130" width="80" height="15" fill="#795548"/>
  <text x="310" y="125" font-size="12" text-anchor="middle" fill="#795548">Soporte</text>

  <!-- Eje pivote -->
  <circle cx="310" cy="155" r="3" fill="#333"/>

  <!-- Cuerda inclinada (oscilando) -->
  <line x1="310" y1="155" x2="200" y2="320" stroke="#ff5722" stroke-width="3"/>
  <text x="240" y="240" font-size="14" fill="#ff5722" font-weight="bold">l</text>

  <!-- Masa -->
  <circle cx="200" cy="320" r="22" fill="#2196f3" opacity="0.8"/>
  <text x="200" y="327" font-size="14" text-anchor="middle" fill="white" font-weight="bold">m</text>

  <!-- Vector velocidad tangencial -->
  <line x1="200" y1="320" x2="170" y2="290" stroke="#4caf50" stroke-width="3" marker-end="url(#arrowgreen)"/>
  <text x="135" y="285" font-size="13" fill="#4caf50" font-weight="bold">v = l·θ̇</text>

  <!-- Vector fuerza viscosa -b·v (opuesta a v) -->
  <line x1="200" y1="320" x2="230" y2="350" stroke="#9c27b0" stroke-width="3" marker-end="url(#arrowpurple)"/>
  <text x="245" y="355" font-size="13" fill="#9c27b0" font-weight="bold">F_visc = -b·v</text>

  <!-- Vector peso -->
  <line x1="200" y1="320" x2="200" y2="380" stroke="#f44336" stroke-width="3" marker-end="url(#arrowred)"/>
  <text x="210" y="375" font-size="14" fill="#f44336" font-weight="bold">mg</text>

  <!-- Vector tensión -->
  <line x1="200" y1="320" x2="310" y2="155" stroke="#ff5722" stroke-width="0" opacity="0.5"/>
  <line x1="200" y1="320" x2="285" y2="180" stroke="#ff5722" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="270" y="180" font-size="11" fill="#ff5722">T</text>

  <!-- Ecuación clave del péndulo amortiguado -->
  <rect x="50" y="395" width="500" height="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" rx="5"/>
  <text x="300" y="420" font-size="15" text-anchor="middle" fill="#333" font-family="monospace">
    θ̈ + (b/m)·θ̇ + (g/l)·sin θ = 0
  </text>

  <!-- Panel 2: Los tres regímenes de amortiguamiento -->
  <rect x="620" y="70" width="560" height="380" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="900" y="100" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Tres Regímenes (lineal: sin θ ≈ θ)
  </text>

  <!-- Subamortiguado (b² < 4mk) -->
  <text x="650" y="135" font-size="14" font-weight="bold" fill="#4caf50">① Subamortiguado (β &lt; ω₀)</text>
  <text x="650" y="155" font-size="11" fill="#666">β = b/(2m), ω₀ = √(g/l)</text>
  <g transform="translate(650, 165)">
    <line x1="0" y1="0" x2="280" y2="0" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#333" stroke-width="1"/>
    <line x1="280" y1="0" x2="280" y2="-20" stroke="#333" stroke-width="1"/>
    <path d="M 0,-15 Q 35,-30 70,-15 Q 105,-25 140,-10 Q 175,-18 210,-7 Q 245,-12 280,-5" fill="none" stroke="#4caf50" stroke-width="2"/>
    <text x="290" y="-3" font-size="11" fill="#333">t</text>
    <text x="-25" y="-3" font-size="11" fill="#333">θ</text>
  </g>
  <text x="650" y="220" font-size="11" fill="#4caf50">Oscilaciones con amplitud decreciente: θ(t) = A·e^(-βt)·cos(ω_d·t)</text>

  <!-- Críticamente amortiguado (b² = 4mk) -->
  <text x="650" y="245" font-size="14" font-weight="bold" fill="#ff9800">② Críticamente amortiguado (β = ω₀)</text>
  <g transform="translate(650, 255)">
    <line x1="0" y1="0" x2="280" y2="0" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#333" stroke-width="1"/>
    <line x1="280" y1="0" x2="280" y2="-20" stroke="#333" stroke-width="1"/>
    <path d="M 0,-15 Q 50,-25 100,-12 Q 200,-3 280,-1" fill="none" stroke="#ff9800" stroke-width="2"/>
    <text x="290" y="-3" font-size="11" fill="#333">t</text>
  </g>
  <text x="650" y="310" font-size="11" fill="#ff9800">Vuelve al equilibrio sin oscilar, en el menor tiempo posible</text>

  <!-- Sobreamortiguado (b² > 4mk) -->
  <text x="650" y="335" font-size="14" font-weight="bold" fill="#f44336">③ Sobreamortiguado (β &gt; ω₀)</text>
  <g transform="translate(650, 345)">
    <line x1="0" y1="0" x2="280" y2="0" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="-20" stroke="#333" stroke-width="1"/>
    <line x1="280" y1="0" x2="280" y2="-20" stroke="#333" stroke-width="1"/>
    <path d="M 0,-15 Q 200,-18 280,-3" fill="none" stroke="#f44336" stroke-width="2"/>
    <text x="290" y="-3" font-size="11" fill="#333">t</text>
  </g>
  <text x="650" y="400" font-size="11" fill="#f44336">Vuelve al equilibrio muy lentamente, sin oscilar</text>
  <text x="650" y="418" font-size="11" fill="#666" font-style="italic">Para nuestro péndulo con b = 0.1: régimen subamortiguado</text>

  <!-- Panel inferior: Conexión con Lagrange -->
  <rect x="20" y="475" width="1160" height="300" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="600" y="505" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Conexión con el formalismo de Lagrange
  </text>

  <!-- Paso 1: Lagrangiano (parte conservativa) -->
  <rect x="50" y="525" width="350" height="80" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" rx="5"/>
  <text x="225" y="552" font-size="14" text-anchor="middle" font-weight="bold" fill="#1565c0">Lagrangiano (sin fricción)</text>
  <text x="225" y="578" font-size="13" text-anchor="middle" fill="#333" font-family="monospace">L = ½m·l²·θ̇² + mgl·cos θ</text>
  <text x="225" y="598" font-size="11" text-anchor="middle" fill="#666" font-style="italic">No incluye la fricción</text>

  <!-- Paso 2: Fuerza generalizada -->
  <rect x="425" y="525" width="350" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
  <text x="600" y="552" font-size="14" text-anchor="middle" font-weight="bold" fill="#ff9800">Fuerza generalizada Q_θ</text>
  <text x="600" y="578" font-size="13" text-anchor="middle" fill="#333" font-family="monospace">Q_θ = -b·l²·θ̇</text>
  <text x="600" y="598" font-size="11" text-anchor="middle" fill="#666" font-style="italic">Opuesta a la velocidad angular</text>

  <!-- Paso 3: Ecuación final -->
  <rect x="800" y="525" width="350" height="80" fill="#e8f5e9" stroke="#4caf50" stroke-width="1" rx="5"/>
  <text x="975" y="552" font-size="14" text-anchor="middle" font-weight="bold" fill="#4caf50">Euler-Lagrange con Q_θ</text>
  <text x="975" y="578" font-size="13" text-anchor="middle" fill="#333" font-family="monospace">θ̈ + (b/m)·θ̇ + (g/l)·sin θ = 0</text>
  <text x="975" y="598" font-size="11" text-anchor="middle" fill="#666" font-style="italic">Ecuación amortiguada no lineal</text>

  <!-- Ecuación vectorial con flechas -->
  <line x1="400" y1="565" x2="425" y2="565" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowblue)"/>
  <line x1="775" y1="565" x2="800" y2="565" stroke="#1565c0" stroke-width="2" marker-end="url(#arrowblue)"/>

  <!-- Conexión con U5 -->
  <rect x="50" y="630" width="1100" height="125" fill="#fce4ec" stroke="#c2185b" stroke-width="1" rx="5"/>
  <text x="600" y="660" font-size="15" text-anchor="middle" font-weight="bold" fill="#c2185b">
    🔗 Anticipo de la Unidad 5: Movimiento Oscilatorio
  </text>
  <text x="600" y="685" font-size="13" text-anchor="middle" fill="#333">
    Esta es exactamente la ecuación del oscilador armónico amortiguado.
  </text>
  <text x="600" y="705" font-size="13" text-anchor="middle" fill="#333" font-family="monospace">
    Para pequeñas oscilaciones:  θ̈ + 2β·θ̇ + ω₀²·θ = 0
  </text>
  <text x="600" y="725" font-size="12" text-anchor="middle" fill="#666" font-style="italic">
    Con β = b/(2m) y ω₀² = g/l. Los tres regímenes se desarrollan en U5.
  </text>
  <text x="600" y="745" font-size="11" text-anchor="middle" fill="#c2185b">
    La fricción (no conservativa) no deriva de un potencial U, por eso entra como Q_θ
  </text>

  <!-- Defs -->
  <defs>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4caf50"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
    </marker>
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1565c0"/>
    </marker>
    <marker id="arrowpurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9c27b0"/>
    </marker>
  </defs>
</svg>
