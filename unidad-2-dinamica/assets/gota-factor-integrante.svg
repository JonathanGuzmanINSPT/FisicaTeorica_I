<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Fondo -->
  <rect width="1200" height="800" fill="#f8f9fa"/>

  <!-- Título -->
  <text x="600" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Gota con Condensación: Resolución por Factor Integrante
  </text>

  <!-- Panel 1: Sistema físico (gota creciendo) -->
  <rect x="20" y="70" width="560" height="350" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="300" y="100" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Gota esférica con radio creciente
  </text>

  <!-- Línea de referencia horizontal -->
  <line x1="50" y1="200" x2="550" y2="200" stroke="#666" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="555" y="203" font-size="11" fill="#666">referencia</text>

  <!-- Gota pequeña (t = 0) -->
  <circle cx="180" cy="200" r="15" fill="#4fc3f7" opacity="0.7"/>
  <text x="180" y="205" font-size="11" text-anchor="middle" fill="#01579b">m(t₀)</text>
  <text x="180" y="240" font-size="11" text-anchor="middle" fill="#666">t = t₀</text>
  <text x="180" y="255" font-size="10" text-anchor="middle" fill="#666">r pequeño</text>

  <!-- Gota mediana (t₁) -->
  <circle cx="310" cy="200" r="30" fill="#29b6f6" opacity="0.7"/>
  <text x="310" y="205" font-size="11" text-anchor="middle" fill="#01579b">m(t₁)</text>
  <text x="310" y="245" font-size="11" text-anchor="middle" fill="#666">t = t₁</text>

  <!-- Gota grande (t₂) -->
  <circle cx="450" cy="200" r="50" fill="#0288d1" opacity="0.7"/>
  <text x="450" y="205" font-size="11" text-anchor="middle" fill="white">m(t₂)</text>
  <text x="450" y="265" font-size="11" text-anchor="middle" fill="#666">t = t₂</text>

  <!-- Vector velocidad (hacia abajo, la gota cae) -->
  <line x1="450" y1="255" x2="450" y2="320" stroke="#f44336" stroke-width="3" marker-end="url(#arrowred)"/>
  <text x="465" y="295" font-size="13" fill="#f44336" font-weight="bold">v(t)</text>

  <!-- Peso -->
  <line x1="450" y1="250" x2="450" y2="320" stroke="#f44336" stroke-width="0" opacity="0"/>

  <!-- Vapor que se incorpora (flechas hacia adentro) -->
  <g opacity="0.6">
    <line x1="380" y1="200" x2="395" y2="200" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowpurple)"/>
    <line x1="520" y1="200" x2="505" y2="200" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowpurple)"/>
    <line x1="450" y1="130" x2="450" y2="145" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowpurple)"/>
    <line x1="450" y1="270" x2="450" y2="255" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowpurple)"/>
  </g>
  <text x="450" y="350" font-size="11" text-anchor="middle" fill="#9c27b0" font-style="italic">vapor condensándose (u=0)</text>

  <!-- Ley m(t) ~ t³ -->
  <rect x="50" y="370" width="500" height="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" rx="5"/>
  <text x="300" y="395" font-size="13" text-anchor="middle" fill="#333" font-family="monospace">
    m(t) = (4/3)·π·ρ·k³·t³  ⟹  ṁ/m = 3/t
  </text>

  <!-- Panel 2: Resolución por factor integrante (paso a paso) -->
  <rect x="620" y="70" width="560" height="350" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="900" y="100" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Resolución paso a paso
  </text>

  <!-- Paso 1: EDO -->
  <rect x="650" y="120" width="500" height="40" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="5"/>
  <text x="900" y="145" font-size="13" text-anchor="middle" fill="#333" font-family="monospace">
    Paso 1:  v̇ + (3/t)·v = g
  </text>

  <!-- Paso 2: Factor integrante -->
  <rect x="650" y="170" width="500" height="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" rx="5"/>
  <text x="900" y="195" font-size="13" text-anchor="middle" fill="#333" font-family="monospace">
    Paso 2:  μ(t) = e^∫(3/t)dt = t³
  </text>

  <!-- Paso 3: Multiplicar -->
  <rect x="650" y="220" width="500" height="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" rx="5"/>
  <text x="900" y="245" font-size="13" text-anchor="middle" fill="#333" font-family="monospace">
    Paso 3:  d/dt(t³·v) = g·t³
  </text>

  <!-- Paso 4: Integrar -->
  <rect x="650" y="270" width="500" height="40" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" rx="5"/>
  <text x="900" y="295" font-size="13" text-anchor="middle" fill="#333" font-family="monospace">
    Paso 4:  t³·v = g·t⁴/4 + C
  </text>

  <!-- Resultado -->
  <rect x="650" y="320" width="500" height="50" fill="#c8e6c9" stroke="#4caf50" stroke-width="2" rx="5"/>
  <text x="900" y="345" font-size="15" text-anchor="middle" fill="#2e7d32" font-weight="bold" font-family="monospace">
    v(t) = (g/4)·t
  </text>
  <text x="900" y="362" font-size="11" text-anchor="middle" fill="#2e7d32" font-style="italic">
    C = 0 por condición inicial v(0) = 0
  </text>

  <!-- Panel inferior: interpretación física + verificación -->
  <rect x="20" y="445" width="1160" height="335" fill="white" stroke="#1565c0" stroke-width="2" rx="10"/>
  <text x="600" y="475" font-size="20" font-weight="bold" text-anchor="middle" fill="#1565c0">
    Interpretación física y verificación
  </text>

  <!-- Interpretación: comparación con caída libre -->
  <text x="50" y="515" font-size="14" font-weight="bold" fill="#1565c0">Comparación con caída libre (sin condensación):</text>
  <rect x="50" y="525" width="540" height="100" fill="#fff" stroke="#ccc" stroke-width="1" rx="5"/>

  <!-- Mini-gráfico -->
  <g transform="translate(80, 540)">
    <!-- Ejes -->
    <line x1="0" y1="0" x2="250" y2="0" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="-60" stroke="#333" stroke-width="1"/>
    <text x="260" y="0" font-size="10" fill="#333">t</text>
    <text x="-15" y="-60" font-size="10" fill="#333">v</text>

    <!-- Caída libre v=g·t (línea recta, pendiente alta) -->
    <line x1="0" y1="0" x2="220" y2="-50" stroke="#f44336" stroke-width="2"/>
    <text x="225" y="-45" font-size="10" fill="#f44336">v = g·t</text>

    <!-- Gota v = g·t/4 (línea recta, pendiente baja) -->
    <line x1="0" y1="0" x2="220" y2="-12" stroke="#2196f3" stroke-width="2"/>
    <text x="225" y="-7" font-size="10" fill="#2196f3">v = g·t/4</text>
  </g>
  <text x="80" y="610" font-size="12" fill="#666" font-style="italic">La gota con condensación cae 4 veces más lento</text>

  <!-- Verificación -->
  <text x="650" y="515" font-size="14" font-weight="bold" fill="#1565c0">Verificación de la EDO:</text>
  <rect x="650" y="525" width="500" height="160" fill="#e8f5e9" stroke="#4caf50" stroke-width="1" rx="5"/>
  <text x="900" y="555" font-size="13" text-anchor="middle" fill="#333" font-family="monospace">v̇ = g/4</text>
  <text x="900" y="580" font-size="13" text-anchor="middle" fill="#333" font-family="monospace">−(ṁ/m)·v = −(3/t)·(g/4)·t = −3g/4</text>
  <text x="900" y="610" font-size="14" text-anchor="middle" fill="#2e7d32" font-weight="bold" font-family="monospace">v̇ − (ṁ/m)·v = g/4 − 3g/4 = −g/2</text>
  <text x="900" y="640" font-size="12" text-anchor="middle" fill="#c62828">⚠ ¡Espera, no da g!</text>
  <text x="900" y="663" font-size="11" text-anchor="middle" fill="#666" font-style="italic">¿Qué falló? La EDO original era v̇ + (ṁ/m)·v = g</text>
  <text x="900" y="680" font-size="11" text-anchor="middle" fill="#666" font-style="italic">Verifico sustituyendo: g/4 + (−3g/4) = −g/2 ✗</text>

  <!-- Conclusión -->
  <rect x="20" y="700" width="1160" height="65" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="600" y="725" font-size="13" text-anchor="middle" fill="#e65100" font-weight="bold">
    🔍 Re-verificación: Con v(t) = (g/4)·t
  </text>
  <text x="600" y="747" font-size="12" text-anchor="middle" fill="#333" font-family="monospace">
    v̇ = g/4,  (3/t)·v = (3/t)·(g·t/4) = 3g/4  →  v̇ + (3/t)·v = g/4 + 3g/4 = g ✓
  </text>

  <!-- Defs -->
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
    </marker>
    <marker id="arrowpurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9c27b0"/>
    </marker>
  </defs>
</svg>
