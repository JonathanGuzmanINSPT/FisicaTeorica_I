<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="CMU Serif, Georgia, serif">
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c62828"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565c0"/>
    </marker>
  </defs>

  <rect width="500" height="350" fill="#fafafa" rx="8"/>

  <text x="250" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Rozamiento cinético — Pares de interacción</text>

  <!-- Piso -->
  <rect x="40" y="220" width="420" height="18" rx="2" fill="#e0e0e0" stroke="#666" stroke-width="2"/>
  <text x="250" y="253" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">PISO</text>

  <!-- Textura del piso (rayas) -->
  <line x1="60" y1="222" x2="60" y2="236" stroke="#bbb" stroke-width="1"/>
  <line x1="100" y1="222" x2="100" y2="236" stroke="#bbb" stroke-width="1"/>
  <line x1="140" y1="222" x2="140" y2="236" stroke="#bbb" stroke-width="1"/>
  <line x1="180" y1="222" x2="180" y2="236" stroke="#bbb" stroke-width="1"/>
  <line x1="340" y1="222" x2="340" y2="236" stroke="#bbb" stroke-width="1"/>
  <line x1="380" y1="222" x2="380" y2="236" stroke="#bbb" stroke-width="1"/>
  <line x1="420" y1="222" x2="420" y2="236" stroke="#bbb" stroke-width="1"/>

  <!-- Cuerpo cúbico -->
  <rect x="170" y="100" width="100" height="100" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
  <text x="220" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">CUERPO</text>
  <text x="220" y="162" text-anchor="middle" font-size="11" fill="#555">(C)</text>
  <text x="220" y="178" text-anchor="middle" font-size="11" fill="#1565c0">m</text>

  <!-- Indicador de velocidad v → (flecha sobre el cuerpo) -->
  <line x1="275" y1="85" x2="320" y2="85" stroke="#333" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="298" y="78" text-anchor="middle" font-size="12" fill="#333" font-style="italic">v</text>

  <!-- Flecha: rozamiento del piso sobre el cuerpo (f ←, roja) -->
  <!-- El piso frena al cuerpo: fuerza hacia la izquierda sobre el cuerpo -->
  <line x1="165" y1="180" x2="100" y2="180" stroke="#c62828" stroke-width="3" marker-end="url(#arrow-red)"/>
  <text x="120" y="173" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">f_{P→C}</text>

  <!-- Flecha: rozamiento del cuerpo sobre el piso (f →, azul) -->
  <!-- El cuerpo empuja al piso hacia la derecha (reacción) -->
  <line x1="280" y1="240" x2="360" y2="240" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="330" y="258" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">f_{C→P}</text>

  <!-- Etiqueta 3ª Ley -->
  <text x="250" y="310" text-anchor="middle" font-size="12" fill="#c62828" font-weight="bold">|f_{P→C}| = |f_{C→P}|</text>
  <text x="250" y="328" text-anchor="middle" font-size="11" fill="#333">(3ª Ley de Newton — acción y reacción)</text>

  <!-- Nota sobre v -->
  <text x="370" y="130" text-anchor="start" font-size="10" fill="#666" font-style="italic">El cuerpo se mueve</text>
  <text x="370" y="145" text-anchor="start" font-size="10" fill="#666" font-style="italic">hacia la derecha</text>
</svg>