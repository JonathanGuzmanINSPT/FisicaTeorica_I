<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 480" font-family="CMU Serif, Georgia, serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c62828"/>
    </marker>
    <marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565c0"/>
    </marker>
    <marker id="ar3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#e65100"/>
    </marker>
    <marker id="ar4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7b1fa2"/>
    </marker>
  </defs>

  <rect width="650" height="480" fill="#fafafa" rx="8"/>

  <!-- Título -->
  <text x="325" y="30" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">Ejercicio 3 — Polea fija y polea móvil</text>

  <!-- ============ ESTRUCTURA ============ -->
  <!-- Soporte superior -->
  <rect x="300" y="40" width="10" height="30" fill="#666"/>
  <line x1="260" y1="40" x2="350" y2="40" stroke="#666" stroke-width="2"/>

  <!-- Polea fija -->
  <circle cx="305" cy="75" r="14" fill="none" stroke="#666" stroke-width="2"/>
  <circle cx="305" cy="75" r="3" fill="#333"/>
  <text x="305" y="60" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">Polea fija</text>

  <!-- Cuerda lado izquierdo (m₁) -->
  <line x1="296" y1="89" x2="296" y2="200" stroke="#444" stroke-width="2"/>
  <!-- Cuerda lado derecho (va a polea móvil) -->
  <line x1="314" y1="89" x2="314" y2="180" stroke="#444" stroke-width="2"/>
  <!-- Tramo horizontal de la cuerda -->
  <line x1="314" y1="180" x2="260" y2="180" stroke="#444" stroke-width="2"/>
  <!-- Tramo que baja a la polea móvil -->
  <line x1="260" y1="180" x2="260" y2="220" stroke="#444" stroke-width="2"/>

  <!-- Polea móvil -->
  <circle cx="260" cy="235" r="12" fill="none" stroke="#666" stroke-width="2"/>
  <circle cx="260" cy="235" r="3" fill="#333"/>
  <text x="260" y="215" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">Polea móvil</text>

  <!-- Cuerda de la polea móvil a m₃ -->
  <line x1="260" y1="247" x2="260" y2="300" stroke="#444" stroke-width="2"/>

  <!-- ============ MASAS ============ -->
  <!-- m₁ -->
  <rect x="276" y="200" width="40" height="35" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="296" y="222" font-family="serif" font-size="13" font-weight="bold" fill="#1565c0" text-anchor="middle">m₁</text>
  <text x="296" y="195" font-family="serif" font-size="10" fill="#1565c0" text-anchor="middle">5 kg</text>

  <!-- m₂ -->
  <rect x="380" y="120" width="40" height="35" rx="4" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="400" y="142" font-family="serif" font-size="13" font-weight="bold" fill="#c62828" text-anchor="middle">m₂</text>
  <text x="400" y="115" font-family="serif" font-size="10" fill="#c62828" text-anchor="middle">15 kg</text>

  <!-- m₃ -->
  <rect x="240" y="310" width="40" height="35" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="260" y="332" font-family="serif" font-size="13" font-weight="bold" fill="#e65100" text-anchor="middle">m₃</text>
  <text x="260" y="302" font-family="serif" font-size="10" fill="#e65100" text-anchor="middle">10+Δm kg</text>

  <!-- Cuerda de m₂ hacia la polea fija -->
  <line x1="400" y1="120" x2="400" y2="89" stroke="#444" stroke-width="2"/>
  <!-- Conexión de m₂ con la polea fija -->
  <line x1="400" y1="89" x2="350" y2="89" stroke="#444" stroke-width="2"/>
  <circle cx="350" cy="89" r="3" fill="#444"/>
  <line x1="350" y1="89" x2="314" y2="89" stroke="#444" stroke-width="2"/>

  <!-- ============ FLECHAS Y ACELERACIONES ============ -->
  <!-- a₁ -->
  <line x1="296" y1="200" x2="296" y2="175" stroke="#1565c0" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="286" y="182" font-family="serif" font-size="11" font-style="italic" fill="#1565c0">a₁</text>

  <!-- a₂ -->
  <line x1="400" y1="120" x2="400" y2="95" stroke="#c62828" stroke-width="2" marker-end="url(#arr)"/>
  <text x="410" y="105" font-family="serif" font-size="11" font-style="italic" fill="#c62828">a₂</text>

  <!-- a₃ -->
  <line x1="260" y1="345" x2="260" y2="375" stroke="#e65100" stroke-width="2" marker-end="url(#ar3)"/>
  <text x="270" y="368" font-family="serif" font-size="11" font-style="italic" fill="#e65100">a₃</text>

  <!-- ============ DCL Y ECUACIONES ============ -->
  <rect x="440" y="55" width="195" height="130" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="538" y="75" font-family="sans-serif" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">Diagramas de Cuerpo Libre</text>

  <!-- m₁ -->
  <rect x="455" y="85" width="80" height="22" rx="3" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="495" y="100" font-family="serif" font-size="11" fill="#333" text-anchor="middle">m₁: T − m₁g = m₁a₁</text>

  <!-- m₂ -->
  <rect x="455" y="112" width="90" height="22" rx="3" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="500" y="127" font-family="serif" font-size="11" fill="#333" text-anchor="middle">m₂: m₂g − T = m₂a₂</text>

  <!-- m₃ -->
  <rect x="455" y="139" width="90" height="22" rx="3" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="500" y="154" font-family="serif" font-size="11" fill="#333" text-anchor="middle">m₃: m₃g − 2T = m₃a₃</text>

  <!-- Ligadura -->
  <rect x="440" y="170" width="195" height="22" rx="3" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1"/>
  <text x="538" y="185" font-family="serif" font-size="11" fill="#7b1fa2" text-anchor="middle">Ligadura: a₁ = a₂ (opuestos en polea fija)</text>

  <!-- ============ LEYENDA DE FUERZAS ============ -->
  <rect x="440" y="200" width="195" height="70" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="538" y="218" font-family="sans-serif" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">Pares de interacción</text>
  <line x1="455" y1="233" x2="470" y2="233" stroke="#c62828" stroke-width="2"/>
  <text x="475" y="237" font-family="serif" font-size="10" fill="#333">T en cuerda (Tierra↔masas)</text>
  <line x1="455" y1="250" x2="470" y2="250" stroke="#7b1fa2" stroke-width="2"/>
  <text x="475" y="254" font-family="serif" font-size="10" fill="#333">Reacción normal en poleas</text>

  <!-- ============ RESULTADOS ============ -->
  <rect x="50" y="400" width="550" height="65" rx="6" fill="#fffde7" stroke="#f9a825" stroke-width="2"/>
  <text x="325" y="422" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e65100" text-anchor="middle">Resultados (g = 9,8 m/s²)</text>
  <text x="325" y="442" font-family="serif" font-size="12" fill="#333" text-anchor="middle">Δm₃ = 5 kg → m₃′ = 15 kg &nbsp;&nbsp;|&nbsp;&nbsp; T = 58,8 N &nbsp;&nbsp;|&nbsp;&nbsp; a₁ = a₂ = 2,0 m/s² &nbsp;&nbsp;|&nbsp;&nbsp; a₃ = 2,0 m/s²</text>
  <text x="325" y="458" font-family="serif" font-size="10" fill="#666" text-anchor="middle">Verificación: m₁ sube, m₂ baja (polea fija) — m₃ baja (polea móvil)</text>
</svg>